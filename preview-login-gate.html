<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"/>
  <title>[미리보기] 로그인 게이트</title>
  <meta name="theme-color" content="#7c3aed"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;}body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
    input,select,textarea{font-size:16px!important;}
    .banner{position:fixed;top:10px;left:10px;right:10px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12px;color:#92400e;line-height:1.5;z-index:50;display:flex;justify-content:space-between;align-items:center;gap:8px;max-width:420px;margin:0 auto;}
    .toggle{background:#92400e;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;font-weight:700;flex-shrink:0;}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState}=React;
const won=n=>(Math.abs(n||0)).toLocaleString('ko-KR')+'원';

const th={primary:'#8b5cf6',light:'#c4b5fd',bg:'#fbfaff',card:'#fff',grad:'linear-gradient(135deg,#7c3aed,#a78bfa)',text:'#374151',sub:'#9ca3af',border:'#ede9fe',green:'#059669'};

// ── 로그인 게이트 ───────────────────────────────────────────
function LoginGate({onLogin}){
  return (
    <div style={{minHeight:'100vh',background:th.grad,display:'flex',alignItems:'center',justifyContent:'center',padding:20,paddingTop:80}}>
      <div style={{background:'#fff',borderRadius:24,padding:'36px 28px 28px',maxWidth:360,width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,0.25)',textAlign:'center'}}>
        <div style={{fontSize:56,marginBottom:10}}>🏠</div>
        <div style={{fontSize:22,fontWeight:800,color:th.text,marginBottom:6,letterSpacing:-0.5}}>내집마련</div>
        <div style={{fontSize:12,color:th.sub,marginBottom:28,lineHeight:1.6}}>
          매달 돈 흐름을 똑똑하게 관리하는<br/>개인 가계부
        </div>

        <button onClick={onLogin} style={{width:'100%',background:'#fff',border:'1.5px solid #dadce0',borderRadius:14,padding:'12px',fontSize:14,fontWeight:600,color:'#3c4043',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:20,fontFamily:'inherit'}}>
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
          </svg>
          Google로 시작하기
        </button>

        <div style={{fontSize:11,color:th.sub,background:'#f9fafb',borderRadius:10,padding:'12px 14px',textAlign:'left',lineHeight:1.9}}>
          ☁️ <b style={{color:th.text}}>기기 바꿔도 자동 복구</b> — 같은 계정으로 로그인하면 내 데이터 그대로<br/>
          🔒 <b style={{color:th.text}}>내 데이터는 내 계정에만</b> — 다른 사람에게 공유 안 됨<br/>
          ✨ <b style={{color:th.text}}>가족·연인과 함께</b> — 각자 계정으로 자기 지갑 관리
        </div>

        <div style={{fontSize:10,color:th.sub,marginTop:16,opacity:.8}}>
          로그인 후 11개의 기본 고정지출 예시(유튜브·월세 등)가 시작점으로 제공돼요.<br/>자유롭게 편집·삭제해서 쓰세요.
        </div>
      </div>
    </div>
  );
}

function Preview(){
  return (
    <div>
      <div className="banner">
        <div>🧪 <b>미리보기</b> — 로그인 게이트 시안. 버튼은 실제 구글 로그인 팝업이 뜨지 않고 안내 alert만 뜹니다. 로그인 후엔 지금 쓰시는 앱 화면이 그대로 뜹니다.</div>
      </div>
      <LoginGate onLogin={()=>alert('✅ 실제 배포 후에는 여기서 구글 계정 선택 팝업이 뜨고, 로그인 완료 시 지금 쓰시는 앱 화면으로 바로 들어갑니다.')}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Preview/>);
</script>
</body>
</html>
