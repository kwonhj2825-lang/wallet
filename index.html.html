const dkey=d=>{const dt=d instanceof Date?d:new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};

]);
const isHol=d=>KR_HOL.has(dkey(d));
function getNextMK(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1;return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
const fxActForMon=(fx,mk)=>fx.filter(f=>!f.df||mk<f.df);
const isNW=d=>{const w=d.getDay();return w===0||w===6||isHol(d);};
function getSalDay(y,m){const d=new Date(y,m-1,21);while(isNW(d))d.setDate(d.getDate()-1);return d;}
function getCycle(y,m){
  const start=getSalDay(y,m);const nm=m===12?1:m+1,ny=m===12?y+1:y,ns=getSalDay(ny,nm);
  const end=new Date(ns);end.setDate(end.getDate()-1);
  const f=d=>`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  const dm=m===12?1:m+1,dy=m===12?y+1:y;
  return{start,end,y,m,label:`${dy}년 ${dm}월`,range:`${f(start)} ~ ${f(end)}`};
}
function getCurCycle(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,sd=getSalDay(y,m);return n>=sd?getCycle(y,m):getCycle(m===1?y-1:y,m===1?12:m-1);}
const getFxOvDay=(f,mp,dim,ov)=>{const o=ov[mp]?.[f.id];if(!o)return Math.min(f.day,dim);if(typeof o==='number')return Math.min(o,dim);return Math.min(o.day??f.day,dim);};
const getFxOvAmt=(f,mp,ov)=>{const o=ov[mp]?.[f.id];if(!o||typeof o==='number')return f.amount;return o.amount??f.amount;};

const CC=['#a78bfa','#f9a8d4','#86efac','#7dd3fc','#fde68a','#fca5a5','#6ee7b7','#fbbf24','#c4b5fd','#94a3b8'];

const STATS_EXCL=new Set(['투자','저금통']);

function Cd(th,x={}){return{background:th.card,borderRadius:16,padding:'14px',boxShadow:'0 2px 10px rgba(0,0,0,0.06)',marginBottom:10,...x};}
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const lv=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}};
const applyAcct=(t,sign,base)=>{const k=ACCT_CATS[t.cat];if(!k||!base[k])return base;const d=sign*(t.tp==='exp'?t.amt:-t.amt);return{...base,[k]:{...base[k],current:base[k].current+d}};};

// ★ 시뮬레이션 입력 — SettingsTab 밖에 정의해야 re-mount 버그 없음
function NumInp({label,val,onChange,unit,th}){
  return(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:12,color:th.sub,marginBottom:4}}>{label}</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <input type="number" value={val} min={0}
          onChange={e=>{e.stopPropagation();onChange(Number(e.target.value));}}

          style={{flex:1,border:`2px solid ${th.border}`,borderRadius:12,padding:'10px 12px',outline:'none',background:th.card,color:th.text,width:'100%'}}/>

      </div>

  );
}

// ── App ──────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState(0);
  const[appName,setAppName]=useState('내집마련');
  const[sal,setSal]=useState(3600000);
  const[salOv,setSalOv]=useState({});
  const[fx,setFx]=useState(FX0);
  const[iv,setIv]=useState(IV0);
  const[txns,setTxns]=useState([]);
  const[wg,setWg]=useState({target:150000000,year:2029,month:12,name:'결혼 자금'});
  const[theme,setTheme]=useState('lavender');
  const[initAdj,setInitAdj]=useState(0);
  const[fxOv,setFxOv]=useState({});
  const[cats,setCats]=useState(CATS_I);
  const[incCats,setIncCats]=useState(INC_I);
  const[fxCats,setFxCats]=useState(FX_CATS_I);
  const[simData,setSimData]=useState({sal:3600000,salRate:30,bonus:0,bonusRate:50});
  const[ivOv,setIvOv]=useState({});
  const[rdy,setRdy]=useState(false);
  const[modal,setModal]=useState(null);
  const[noti,setNoti]=useState(null);

  useEffect(()=>{
    [['hj9-sal',setSal],['hj9-salOv',setSalOv],['hj9-tx',setTxns],['hj9-wg',setWg],
     ['hj9-theme',setTheme],['hj9-adj',setInitAdj],['hj9-fxov',setFxOv],
     ['hj9-appname',setAppName],['hj9-cats',setCats],['hj9-incCats',setIncCats],['hj9-fxCats',setFxCats],['hj9-simdata',setSimData]
    ].forEach(([k,fn])=>{const v=lv(k);if(v)fn(v);});
    const sivo=lv('hj9-ivov');if(sivo)setIvOv(sivo);
    const sfx=lv('hj9-fx');if(sfx)setFx(sfx.map(f=>({...f,df:f.df||f.deletedFrom||null})));
    const si=lv('hj9-iv');if(si)setIv({...IV0,...si});
    if([10,20,30].includes(TDN)){const ln=lv('hj9-lastnoti');if(!ln||ln!==TODAY){setNoti('📊 오늘은 투자 내역 업데이트 날이에요! 자산 탭에서 잔고를 업데이트해 주세요 💜');sv('hj9-lastnoti',TODAY);}}
    setRdy(true);
  },[]);

  const us=(k,fn)=>v=>{fn(v);sv(k,v);};
  const uAppName=us('hj9-appname',setAppName);
  const uSal=us('hj9-sal',setSal),uSalOv=us('hj9-salOv',setSalOv),uFx=us('hj9-fx',setFx);
  const uIv=v=>{setIv(v);sv('hj9-iv',v);};
  const uWg=us('hj9-wg',setWg),uAdj=us('hj9-adj',setInitAdj),uTheme=us('hj9-theme',setTheme);
  const uFxOv=us('hj9-fxov',setFxOv),uCats=us('hj9-cats',setCats),uIncCats=us('hj9-incCats',setIncCats);
  const uFxCats=us('hj9-fxCats',setFxCats),uSimData=us('hj9-simdata',setSimData);
  const uIvOv=us('hj9-ivov',setIvOv);

  const addTx=t=>{const n=[...txns,t];setTxns(n);sv('hj9-tx',n);uIv(applyAcct(t,1,iv));};
  const delTx=id=>{const t=txns.find(x=>x.id===id);const n=txns.filter(x=>x.id!==id);setTxns(n);sv('hj9-tx',n);if(t)uIv(applyAcct(t,-1,iv));};
  const updateTx=t=>{const old=txns.find(x=>x.id===t.id);let ni=iv;if(old)ni=applyAcct(old,-1,ni);ni=applyAcct(t,1,ni);const n=txns.map(x=>x.id===t.id?t:x);setTxns(n);sv('hj9-tx',n);uIv(ni);};
  const getIcon=name=>[...cats,...incCats].find(c=>c.name===name)?.icon||'📦';

  const th=THEMES[theme]||THEMES.lavender;
  const pr=getCurCycle();
  const salMK=dkey(pr.start).slice(0,7);
  const curSal=salOv[salMK]||sal;
  const fxSum=fxActForMon(fx,salMK).reduce((s,f)=>s+f.amount,0);
  const getIvAmt=(key,mk)=>ivOv[mk]?.[key]??iv[key].monthly;
  const ivDed=getIvAmt('youth',salMK)+getIvAmt('funds',salMK)+getIvAmt('stocks',salMK);
  const baseA=curSal-fxSum-ivDed;
  const pTx=txns.filter(t=>{const d=new Date(t.date);return d>=pr.start&&d<=pr.end;});
  // ★ 신용카드(credit)/법인카드(biz) 구분
  const spnt=pTx.filter(t=>t.tp==='exp'&&(!t.payType||t.payType==='cash')).reduce((s,t)=>s+t.amt,0);
  const incd=pTx.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const creditPending=pTx.filter(t=>t.tp==='exp'&&t.payType==='credit').reduce((s,t)=>s+t.amt,0);
  const avail=baseA-initAdj-spnt+incd;
  const spPct=Math.min(100,baseA>0?((initAdj+spnt-incd)/baseA)*100:0);
  const wFund=iv.stocks.current+iv.funds.current+iv.youth.current;
  const tAss=wFund+iv.pension.current+iv.parking.current+(iv.savings_jar?.current||0);

// ── 가계부 탭 ─────────────────────────────────────────────────
function LedgerTab({txns,delTx,updateTx,setModal,th,fx,fxOv,curSal,salOv,salMK,uSalOv,sal,iv,ivOv,uIvOv,getIcon,cats,incCats}){
  const initVC=()=>{const c=getCurCycle();return{y:c.y,m:c.m};};
  const[vc,setVc]=useState(initVC);
  const[sel,setSel]=useState(TODAY);
  const[txFilter,setTxFilter]=useState('all');
  const[statsFx,setStatsFx]=useState(true); // 소비통계 고정비용 포함 여부

  const cycle=getCycle(vc.y,vc.m);
  const cycSalMK=dkey(cycle.start).slice(0,7);
  const cycSal=salOv[cycSalMK]||sal;
  const prevC=()=>setVc(({y,m})=>({y:m===1?y-1:y,m:m===1?12:m-1}));
  const nextC=()=>setVc(({y,m})=>({y:m===12?y+1:y,m:m===12?1:m+1}));

  const getInvAmt=key=>ivOv[cycSalMK]?.[key]??iv[key].monthly;
  const INV_ITEMS=[{name:'주식 투자',amount:getInvAmt('stocks'),icon:'📈',ivKey:'stocks',def:iv.stocks.monthly},{name:'펀드 투자',amount:getInvAmt('funds'),icon:'💼',ivKey:'funds',def:iv.funds.monthly},{name:'청년도약계좌',amount:getInvAmt('youth'),icon:'🏦',ivKey:'youth',def:iv.youth.monthly}].filter(i=>i.def>0);
  const ivTotal=INV_ITEMS.reduce((s,i)=>s+i.amount,0);

  const cells=[];
  for(let i=0;i<cycle.start.getDay();i++)cells.push(null);
  let cd=new Date(cycle.start);while(cd<=cycle.end){cells.push(new Date(cd));cd=new Date(cd);cd.setDate(cd.getDate()+1);}

  const dm={};
  txns.forEach(t=>{if(!dm[t.date])dm[t.date]={e:0,i:0};if(t.tp==='exp')dm[t.date].e+=t.amt;else dm[t.date].i+=t.amt;});
  cells.forEach(cellD=>{if(!cellD)return;const dk=dkey(cellD),cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fxActForMon(fx,mp).forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){if(!dm[dk])dm[dk]={e:0,i:0};dm[dk].e+=getFxOvAmt(f,mp,fxOv);}});});
  const salDk=dkey(cycle.start);
  if(!dm[salDk])dm[salDk]={e:0,i:0};dm[salDk].i+=cycSal;
  if(ivTotal>0)dm[salDk].e=(dm[salDk].e||0)+ivTotal;

  const cyTxns=txns.filter(t=>{const d=new Date(t.date);return d>=cycle.start&&d<=cycle.end;});
  let cyFxTotal=0,cyFxByCat={};
  cells.forEach(cellD=>{if(!cellD)return;const cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fxActForMon(fx,mp).forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){const a=getFxOvAmt(f,mp,fxOv);cyFxTotal+=a;cyFxByCat[f.cat]=(cyFxByCat[f.cat]||0)+a;}});});
  const cyTxExp=cyTxns.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const cyTxInc=cyTxns.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const cyTotalExp=cyTxExp+cyFxTotal+ivTotal;
  const cyTotalInc=cyTxInc+cycSal;
  // ★ 순 소비: 고정지출·투자·법인카드 제외, 현금+신용카드만
  const cyPersonalSpnt=cyTxns.filter(t=>t.tp==='exp'&&t.payType!=='biz'&&t.cat!=='저금통').reduce((s,t)=>s+t.amt,0);

  // ★ 소비 통계 (투자/저금통 제외, 고정비용 toggle)
  const statsTxByCat={};
  cyTxns.filter(t=>t.tp==='exp'&&!STATS_EXCL.has(t.cat)).forEach(t=>{statsTxByCat[t.cat]=(statsTxByCat[t.cat]||0)+t.amt;});
  const statsMap=statsFx?{...cyFxByCat,...statsTxByCat}:{...statsTxByCat};
  const statsTotal=Object.values(statsMap).reduce((s,v)=>s+v,0);

  const selTx=txns.filter(t=>t.date===sel).sort((a,b)=>a.id-b.id);
  const selD=new Date(sel),inCycle=selD>=cycle.start&&selD<=cycle.end;
  const selCm=selD.getMonth()+1,selCy=selD.getFullYear();
  const selMp=`${selCy}-${String(selCm).padStart(2,'0')}`,selDim=new Date(selCy,selCm,0).getDate();
  const selFx=inCycle?fxActForMon(fx,selMp).filter(f=>getFxOvDay(f,selMp,selDim,fxOv)===selD.getDate()):[];
  const isSalDay=sel===salDk;
  const selTxExp=selTx.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const selTxInc=selTx.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const selFxTotal=selFx.reduce((s,f)=>s+getFxOvAmt(f,selMp,fxOv),0);
  const filteredTx=txFilter==='all'?selTx:selTx.filter(t=>t.tp===txFilter);
  const showFx=txFilter==='all'||txFilter==='exp',showSal=txFilter==='all'||txFilter==='inc',showInv=isSalDay&&showFx;
  const hasAny=(showFx&&selFx.length>0)||showInv||(showSal&&isSalDay)||filteredTx.length>0;

  return(<div>
    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <button onClick={prevC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>‹</button>
        <div style={{textAlign:'center'}}><div style={{fontSize:14,fontWeight:700,color:th.text}}>{cycle.label}</div><div style={{fontSize:10,color:th.primary,fontWeight:600,marginTop:1}}>{cycle.range}</div></div>
        <button onClick={nextC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',margin:'8px 0 4px'}}>
        {['일','월','화','수','목','금','토'].map((d,i)=>(<div key={d} style={{textAlign:'center',fontSize:10,fontWeight:600,padding:'4px 0',color:i===0?'#ef4444':i===6?'#3b82f6':th.sub}}>{d}</div>))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {cells.map((cellD,i)=>{
          if(!cellD)return <div key={`e${i}`}/>;
          const dk=dkey(cellD),isSel=sel===dk,isT=dk===TODAY,isH=isHol(cellD)||cellD.getDay()===0,isSat=cellD.getDay()===6,is2=cellD.getMonth()!==cycle.start.getMonth(),dd=dm[dk];
          const tc=isSel?'#fff':isT?th.primary:isH?'#ef4444':isSat?'#3b82f6':th.text;
          return(<div key={dk} onClick={()=>setSel(dk)} style={{cursor:'pointer',borderRadius:10,padding:'3px 1px',background:isSel?th.primary:is2?`${th.border}cc`:'transparent',textAlign:'center',minHeight:52}}>
            <div style={{fontSize:11,fontWeight:isT?800:500,color:tc}}>{cellD.getDate()}</div>
            {is2&&!isSel&&<div style={{fontSize:7,color:th.sub,opacity:.6}}>{cellD.getMonth()+1}월</div>}
            {dd?.e>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':'#dc2626',lineHeight:1.2}}>-{cw(dd.e)}</div>}
            {dd?.i>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':th.green,lineHeight:1.2}}>+{cw(dd.i)}</div>}
          </div>);
        })}
      </div>
      {/* ★ 달력 하단: 수입 → 지출 → 순소비 순서 */}
      <div style={{borderTop:`1px solid ${th.border}`,marginTop:10,paddingTop:10,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4}}>

      {/* ★ 고정지출 - 통일된 편집 버튼 */}
      {showFx&&selFx.map(f=>{const effAmt=getFxOvAmt(f,selMp,fxOv),isOv=!!(fxOv[selMp]?.[f.id]);return(<div key={f.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>📌</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{f.name}</span><span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>고정</span>{isOv&&<span style={{fontSize:9,color:'#ea580c',background:'#fff7ed',borderRadius:6,padding:'1px 5px',fontWeight:600}}>수정됨</span>}</div><div style={{fontSize:10,color:th.sub}}>기본 {f.day}일 / {won(f.amount)}</div></div><div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}><span style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>-{won(effAmt)}</span><button onClick={()=>setModal({type:'fxmonth',fxId:f.id,fxName:f.name,fxDefaultDay:f.day,fxDefaultAmt:f.amount,monthKey:selMp})} style={{border:'none',background:th.border,borderRadius:8,padding:'3px 7px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>편집</button></div></div>);})}
      {filteredTx.map(t=><TxRow key={t.id} t={t} onEdit={t=>setModal({type:'txn',editTx:t})} getIcon={getIcon} th={th}/>)}
      {!hasAny&&<div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'20px 0'}}>내역 없음 · 추가해 보세요 🌟</div>}
      {hasAny&&(<div style={{borderTop:`1px solid ${th.border}`,paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}><span style={{color:'#dc2626'}}>지출 -{won(selTxExp+selFxTotal+(isSalDay&&showFx?ivTotal:0))}</span><span style={{color:th.green}}>수입 +{won(selTxInc+(isSalDay&&showSal?cycSal:0))}</span></div>)}
    </div>

    {/* ★ 소비 통계 - 투자/저금통 제외, 고정비용 toggle */}
    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

          <button onClick={()=>setStatsFx(true)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:10,cursor:'pointer',fontWeight:600,background:statsFx?th.primary:th.border,color:statsFx?'#fff':th.sub}}>고정 포함</button>
          <button onClick={()=>setStatsFx(false)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:10,cursor:'pointer',fontWeight:600,background:!statsFx?th.primary:th.border,color:!statsFx?'#fff':th.sub}}>고정 제외</button>
        </div>
      </div>
      {Object.keys(statsMap).length===0?<div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'16px 0'}}>이번 달 지출 내역이 없어요 🌱</div>:
      Object.entries(statsMap).sort((a,b)=>b[1]-a[1]).map(([cat,amt],i)=>{const pct=statsTotal>0?(amt/statsTotal*100).toFixed(1):'0';return(<div key={cat} style={{marginBottom:10}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:16}}>{getIcon(cat)||'📦'}</span><span style={{fontSize:12,fontWeight:600,color:th.text}}>{cat}</span></div><div><span style={{fontSize:12,fontWeight:700,color:th.primary}}>{won(amt)}</span><span style={{fontSize:10,color:th.sub,marginLeft:6}}>{pct}%</span></div></div><div style={{background:th.border,borderRadius:999,height:8,overflow:'hidden'}}><div style={{background:CC[i%CC.length],height:'100%',width:`${pct}%`,borderRadius:999}}/></div></div>);})}
      {statsTotal>0&&<div style={{borderTop:`1px solid ${th.border}`,paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}><span style={{color:th.sub}}>{statsFx?'고정 포함':'고정 제외'} 합계</span><span style={{color:'#dc2626'}}>{won(statsTotal)}</span></div>}
    </div>
  </div>);
}

// ── 고정지출 탭 ─────────────────────────────────────────────
function FixedTab({fx,fxSum,uFx,setModal,fxCats,th}){
  const activeFx=fx.filter(f=>!f.df);
  const byCat={};activeFx.forEach(f=>{byCat[f.cat]=byCat[f.cat]||[];byCat[f.cat].push(f);});
  const getCatIcon=name=>{const c=fxCats.find(x=>(typeof x==='string'?x:x.name)===name);return typeof c==='object'?c.icon||'📌':'📌';};
  return(<div><div style={{background:th.grad,borderRadius:16,padding:'16px',color:'#fff',marginBottom:10}}><div style={{fontSize:11,opacity:.85}}>📌 매월 고정 지출 합계</div><div style={{fontSize:28,fontWeight:800,marginTop:4}}>{won(fxSum)}</div><div style={{fontSize:10,opacity:.7,marginTop:2}}>{activeFx.length}개 항목</div></div>
    <button onClick={()=>setModal({type:'fx',data:null})} style={{width:'100%',background:th.border,border:`2px dashed ${th.light}`,borderRadius:14,padding:'12px',fontSize:12,color:th.primary,cursor:'pointer',fontWeight:700,marginBottom:10}}>+ 새 고정 지출 추가</button>
    {Object.entries(byCat).map(([cat,items])=>(<div key={cat} style={Cd(th)}><div style={{fontSize:11,fontWeight:700,color:th.sub,marginBottom:8}}>{getCatIcon(cat)} {cat}</div>{items.map(f=>(<div key={f.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:th.text}}>{f.name}</div><div style={{fontSize:10,color:th.sub}}>매월 {f.day}일 · {won(f.amount)}</div></div><div style={{display:'flex',gap:4}}>
      <button onClick={()=>setModal({type:'fx',data:f})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>편집</button>
      <button onClick={()=>{const nxt=getNextMK();uFx(fx.map(x=>x.id===f.id?{...x,df:nxt}:x));}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:'#dc2626',fontWeight:600}}>삭제</button>
    </div></div>))}</div>))}</div>);
}

    <div style={Cd(th)}><div style={{fontSize:12,fontWeight:700,color:th.text,marginBottom:8}}>📈 투자 현황</div>{[['stocks','📈'],['funds','💼'],['youth','🏦'],['pension','🔒']].map(([key,ic])=>(<div key={key} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:40,height:40,borderRadius:14,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{ic}</div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:th.text}}>{iv[key].name}</div><div style={{fontSize:10,color:th.sub}}>월 {won(iv[key].monthly)} 납입</div></div><div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:800,color:th.primary}}>{won(iv[key].current)}</div><button onClick={()=>setModal({type:'iv',key})} style={{border:'none',background:'none',fontSize:9,color:th.sub,cursor:'pointer',padding:0}}>수정</button></div></div>))}
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:40,height:40,borderRadius:14,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>💳</div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:th.text}}>{iv.parking.name}</div><div style={{fontSize:10,color:th.sub}}>지출 선택시 자동 연동</div></div><div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:800,color:th.green}}>{won(iv.parking.current)}</div><button onClick={()=>setModal({type:'iv',key:'parking'})} style={{border:'none',background:'none',fontSize:9,color:th.sub,cursor:'pointer',padding:0}}>수정</button></div></div>
      <div style={{display:'flex',alignItems:'center',gap:12,paddingTop:10}}><div style={{width:40,height:40,borderRadius:14,background:'#fce7f333',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🐷</div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:th.text}}>저금통</div><div style={{fontSize:10,color:th.sub}}>지출→저금 / 수입→인출 자동 연동</div></div><div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:800,color:'#f472b6'}}>{won(iv.savings_jar?.current||0)}</div><button onClick={()=>setModal({type:'iv',key:'savings_jar'})} style={{border:'none',background:'none',fontSize:9,color:th.sub,cursor:'pointer',padding:0}}>수정</button></div></div>

// ── 설정 탭 ────────────────────────────────────────────────────
function SettingsTab({sal,curSal,salMK,salOv,uSal,uSalOv,cats,incCats,uCats,uIncCats,fxCats,uFxCats,simData,uSimData,setModal,wFund,wg,mLeft,th}){
  // ★ 시뮬레이션: 입력값 localStorage에 자동 저장
  const ss=simData?.sal??sal, sr=simData?.salRate??30, sb=simData?.bonus??0, sbr=simData?.bonusRate??50;
  const setSs=v=>uSimData({...simData,sal:v});
  const setSr=v=>uSimData({...simData,salRate:v});
  const setSb=v=>uSimData({...simData,bonus:v});
  const setSbr=v=>uSimData({...simData,bonusRate:v});
  const yearsLeft=mLeft/12;
  const simResult=(ss*sr/100*12+sb*sbr/100)*yearsLeft;
  const projTotal=wFund+simResult,diff=projTotal-wg.target;

  const[openCat,setOpenCat]=useState(null);
  // CatSection: 접기/펼치기 컴포넌트
  const CatSection=({title,open,onToggle,onAdd,children})=>(<div style={Cd(th,{cursor:'default'})}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',userSelect:'none'}} onClick={onToggle}><div style={{fontSize:13,fontWeight:700,color:th.text}}>{title}</div><div style={{display:'flex',alignItems:'center',gap:6}}>{open&&<button onClick={e=>{e.stopPropagation();onAdd();}} style={{background:th.primary,color:'#fff',border:'none',borderRadius:20,padding:'3px 10px',fontSize:11,cursor:'pointer',fontWeight:700}}>+ 추가</button>}<span style={{fontSize:13,color:th.sub,transition:'transform .2s',display:'inline-block',transform:open?'rotate(180deg)':'none'}}>▼</span></div></div>{open&&<div style={{marginTop:10}}>{children}</div>}</div>);
  const CatRow=({c,onEdit,onDel})=>(<div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}>
    <span style={{fontSize:22,width:32,textAlign:'center'}}>{c.icon}</span>
    <div style={{flex:1,fontSize:13,fontWeight:600,color:th.text}}>{c.name}</div>
    <button onClick={()=>onEdit(c)} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>편집</button>
    <button onClick={()=>onDel(c.id||c)} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:'#dc2626',fontWeight:600}}>삭제</button>
  </div>);

  return(<div>
    <div style={{background:th.grad,borderRadius:16,padding:'16px',color:'#fff',marginBottom:10}}><div style={{fontSize:14,fontWeight:800}}>⚙️ 설정</div><div style={{fontSize:11,opacity:.8,marginTop:4}}>월급 · 카테고리 · 시뮬레이션</div></div>

    {/* 데이터 보존 안내 */}
    <div style={{...Cd(th),background:`${th.green}11`,border:`1.5px solid ${th.border}`,fontSize:11,color:th.text,lineHeight:1.8}}>
      💾 <b>입력한 내역은 이 앱을 삭제하기 전까지 영구 보존돼요.</b><br/>
      코드 수정·재배포해도 기록은 사라지지 않아요. 단, 기본 월급·고정비용을 바꾸면 이전 달의 가용금액 계산이 변경될 수 있어요. 이를 방지하려면 각 달에 "이번달 월급 수정" 기능을 사용하세요.
    </div>

    {/* 월급 설정 */}
    <div style={Cd(th)}>
      <div style={{fontSize:13,fontWeight:700,color:th.text,marginBottom:12}}>💰 월급 설정</div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${th.border}`}}><div><div style={{fontSize:12,fontWeight:600,color:th.text}}>기본 월급</div><div style={{fontSize:10,color:th.sub}}>매달 기본으로 적용되는 값</div></div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:13,fontWeight:700,color:th.primary}}>{won(sal)}</span><button onClick={()=>setModal({type:'sal'})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>수정</button></div></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0'}}><div><div style={{fontSize:12,fontWeight:600,color:th.text}}>이번 달 월급 ({salMK})</div><div style={{fontSize:10,color:th.sub}}>{salOv[salMK]?'✅ 수정됨':'기본값 적용 중'}</div></div><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:13,fontWeight:700,color:salOv[salMK]?'#ea580c':th.primary}}>{won(curSal)}</span><button onClick={()=>setModal({type:'salOv',monthKey:salMK,curVal:curSal,defaultSal:sal})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>수정</button>{salOv[salMK]&&<button onClick={()=>{const n={...salOv};delete n[salMK];uSalOv(n);}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:'#dc2626',fontWeight:600}}>초기화</button>}</div></div>
    </div>

    {/* ★ 카테고리 섹션 - 접기/펼치기 */}
    <CatSection title="💸 지출 카테고리" open={openCat==='exp'} onToggle={()=>setOpenCat(openCat==='exp'?null:'exp')} onAdd={()=>setModal({type:'catEdit',cat:null,onSave:nc=>uCats([...cats,{id:Date.now(),...nc}])})}>
      {cats.map(c=><CatRow key={c.id} c={c} onEdit={c=>setModal({type:'catEdit',cat:c,onSave:u=>uCats(cats.map(x=>x.id===c.id?{...x,...u}:x))})} onDel={id=>uCats(cats.filter(x=>x.id!==id))}/>)}
    </CatSection>

      {incCats.map(c=><CatRow key={c.id} c={c} onEdit={c=>setModal({type:'catEdit',cat:c,onSave:u=>uIncCats(incCats.map(x=>x.id===c.id?{...x,...u}:x))})} onDel={id=>uIncCats(incCats.filter(x=>x.id!==id))}/>)}

    </CatSection>

    {/* ★ 저축 시뮬레이션 - NumInp를 top-level로 정의해서 re-mount 버그 없음 */}
    <div style={Cd(th)}>
      <div style={{fontSize:13,fontWeight:700,color:th.text,marginBottom:12}}>📊 저축 시뮬레이션</div>
      <div style={{fontSize:10,color:th.sub,background:th.border,borderRadius:10,padding:'8px 12px',marginBottom:12,lineHeight:1.7}}>
        💡 (월급×저축비율×12 + 성과금×저축비율) × {yearsLeft.toFixed(2)}년<br/>목표까지 남은 기간: <b style={{color:th.primary}}>{mLeft}개월</b>
      </div>
      <NumInp label="월급 (원)" val={ss} onChange={setSs} th={th}/>
      <NumInp label="월급 저축 비율" val={sr} onChange={setSr} unit="%" th={th}/>
      <NumInp label="연간 예상 성과금 (원)" val={sb} onChange={setSb} th={th}/>
      <NumInp label="성과금 저축 비율" val={sbr} onChange={setSbr} unit="%" th={th}/>
      <div style={{background:`${th.primary}11`,borderRadius:14,padding:'14px',border:`1.5px solid ${th.border}`,marginTop:4}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
          <div style={{background:th.card,borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:10,color:th.sub}}>예상 추가 저축액</div><div style={{fontSize:15,fontWeight:800,color:th.primary,marginTop:4}}>{won(Math.round(simResult))}</div></div>
          <div style={{background:th.card,borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:10,color:th.sub}}>예상 결혼 자금 합계</div><div style={{fontSize:15,fontWeight:800,color:th.green,marginTop:4}}>{won(Math.round(projTotal))}</div></div>
        </div>
        <div style={{background:th.card,borderRadius:12,padding:'10px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style={{fontSize:12,color:th.sub}}>목표 {won(wg.target)} 대비</span><span style={{fontSize:14,fontWeight:800,color:diff>=0?th.green:'#dc2626'}}>{diff>=0?`✅ +${won(Math.round(diff))} 달성!`:`⚠️ ${won(Math.round(Math.abs(diff)))} 부족`}</span></div>

      </div>
    </div>


  </div>);
}

// ── 모달 ────────────────────────────────────────────────────
function Modals(props){
  const{modal,setModal,appName,uAppName,sal,uSal,salOv,uSalOv,txns,addTx,updateTx,delTx,fx,uFx,iv,uIv,ivOv,uIvOv,wg,uWg,th,theme,uTheme,initAdj,uAdj,baseA,fxOv,uFxOv,cats,incCats,fxCats,uFxCats}=props;
  const close=()=>setModal(null);
  const OV={position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'};
  const SH={background:th.card,borderRadius:'24px 24px 0 0',padding:'24px 20px',paddingBottom:`calc(24px + var(--sab))`,width:'100%',maxWidth:480,boxSizing:'border-box',maxHeight:'90vh',overflowY:'auto'};
  const I={width:'100%',border:`2px solid ${th.border}`,borderRadius:12,padding:'12px 14px',boxSizing:'border-box',outline:'none',fontFamily:'inherit',background:th.card,color:th.text,display:'block'};
  const p={OV,SH,I,close,th};
  if(modal.type==='appName')return <AppNameM {...p} appName={appName} uAppName={uAppName}/>;
  if(modal.type==='sal')return <SalM {...p} sal={sal} uSal={uSal}/>;
  if(modal.type==='salOv')return <SalOvM {...p} monthKey={modal.monthKey} curVal={modal.curVal} defaultSal={modal.defaultSal} salOv={salOv} uSalOv={uSalOv}/>;
  if(modal.type==='txn')return <TxM {...p} addTx={addTx} updateTx={updateTx} delTx={delTx} editTx={modal.editTx} initDate={modal.data?.date} cats={cats} incCats={incCats}/>;
  if(modal.type==='fx')return <FxM {...p} fx={fx} uFx={uFx} item={modal.data} fxCats={fxCats}/>;
  if(modal.type==='iv')return <IvM {...p} iv={iv} uIv={uIv} ivKey={modal.key}/>;
  if(modal.type==='wg')return <WgM {...p} wg={wg} uWg={uWg}/>;
  if(modal.type==='theme')return <ThemeM {...p} theme={theme} uTheme={uTheme}/>;
  if(modal.type==='adj')return <AdjM {...p} baseA={baseA} initAdj={initAdj} uAdj={uAdj}/>;
  if(modal.type==='fxmonth')return <FxMonthM {...p} fxId={modal.fxId} fxName={modal.fxName} fxDefaultDay={modal.fxDefaultDay} fxDefaultAmt={modal.fxDefaultAmt} monthKey={modal.monthKey} fxOv={fxOv} uFxOv={uFxOv}/>;
  if(modal.type==='ivOv')return <IvOvM {...p} iv={iv} ivOv={ivOv} uIvOv={uIvOv} ivKey={modal.ivKey} ivName={modal.ivName} monthKey={modal.monthKey} defaultAmt={modal.defaultAmt}/>;
  if(modal.type==='catEdit')return <CatEditM {...p} cat={modal.cat} onSave={modal.onSave}/>;
  if(modal.type==='fxCatEdit')return <FxCatEditM {...p} cat={modal.cat} idx={modal.idx} fxCats={fxCats} uFxCats={uFxCats}/>;
  return null;
}

function SalM({OV,SH,I,close,th,sal,uSal}){const[v,setV]=useState(sal);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:10,color:th.text}}>💰 기본 월급 수정</div><input type="number" value={v} onChange={e=>setV(Number(e.target.value))} style={{...I,marginBottom:14}}/><button onClick={()=>{if(v>0){uSal(v);close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}
function SalOvM({OV,SH,I,close,th,monthKey,curVal,defaultSal,salOv,uSalOv}){const[v,setV]=useState(curVal);const isOv=!!salOv[monthKey];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>💰 이번 달 월급 수정</div><div style={{fontSize:11,color:th.sub,marginBottom:10}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경 · 기본: {won(defaultSal)}</div><input type="number" value={v} onChange={e=>setV(e.target.value)} style={{...I,marginBottom:14}}/><button onClick={()=>{uSalOv({...salOv,[monthKey]:Number(v)});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>{isOv&&<button onClick={()=>{const n={...salOv};delete n[monthKey];uSalOv(n);close();}} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}</div></div>);}

function TxM({OV,SH,I,close,th,addTx,updateTx,delTx,editTx,initDate,cats,incCats}){
  const isEdit=!!editTx;
  const[tp,setTp]=useState(editTx?.tp||'exp');
  const[amt,setAmt]=useState(editTx?.amt||'');
  const[cat,setCat]=useState(editTx?.cat||cats[0]?.name||'식비');
  const[memo,setMemo]=useState(editTx?.memo||'');
  const[date,setDate]=useState(editTx?.date||initDate||TODAY);
  const[payType,setPayType]=useState(editTx?.payType||'cash');
  const iCats=tp==='exp'?cats:incCats;
  const save=()=>{if(!amt||Number(amt)<=0)return;const t={...(editTx||{}),id:editTx?.id||Date.now(),date,tp,amt:Number(amt),cat,memo,payType:tp==='exp'?payType:'cash'};isEdit?updateTx(t):addTx(t);close();};
  const acctTip=ACCT_CATS[cat];
  const tipMsg=acctTip==='savings_jar'?'🐷 지출→저금통 이동 / 수입→인출':acctTip==='parking'?'💳 지출→파킹 이동 / 수입→인출':null;
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{isEdit?'✏️ 내역 수정':'📝 내역 추가'}</div>{isEdit&&<button onClick={()=>{delTx(editTx.id);close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}</div>
    <div style={{display:'flex',gap:8,marginBottom:12}}>{[['exp','💸 지출'],['inc','💰 수입']].map(([v,lb])=>(<button key={v} onClick={()=>{setTp(v);if(!isEdit)setCat((v==='exp'?cats:incCats)[0]?.name||'기타');}} style={{flex:1,border:'none',borderRadius:12,padding:'10px',fontSize:12,fontWeight:700,cursor:'pointer',background:tp===v?th.primary:th.border,color:tp===v?'#fff':th.sub}}>{lb}</button>))}</div>
    {/* ★ 날짜/금액 너비 통일 */}
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...I,marginBottom:10}}/>
    <input type="number" placeholder="금액 (원)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...I,marginBottom:10}}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10}}>{iCats.map(c=>(<button key={c.id} onClick={()=>setCat(c.name)} style={{border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:cat===c.name?th.primary:th.border,color:cat===c.name?'#fff':th.primary,fontWeight:600}}>{c.icon} {c.name}</button>))}</div>
    {tipMsg&&<div style={{fontSize:10,color:th.primary,background:th.border,borderRadius:8,padding:'6px 10px',marginBottom:10}}>{tipMsg}</div>}
    {/* ★ 신용카드/법인카드 선택 (지출일 때만) */}
    {tp==='exp'&&(<div style={{marginBottom:10}}>
      <div style={{fontSize:11,color:th.sub,marginBottom:6}}>결제 방법</div>
      <div style={{display:'flex',gap:6}}>
        {[['cash','💵 현금/체크'],['credit','💳 신용카드'],['biz','🏢 법인카드']].map(([v,lb])=>(<button key={v} onClick={()=>setPayType(v)} style={{flex:1,border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:payType===v?th.primary:th.border,color:payType===v?'#fff':th.text,fontWeight:600}}>{lb}</button>))}
      </div>
      {payType==='credit'&&<div style={{fontSize:10,color:'#92400e',background:'#fef3c7',borderRadius:8,padding:'6px 10px',marginTop:6}}>💳 신용카드 → 대시보드에 청구 예정으로 표시, 가용금액에서 즉시 차감되지 않아요</div>}
      {payType==='biz'&&<div style={{fontSize:10,color:'#1e40af',background:'#dbeafe',borderRadius:8,padding:'6px 10px',marginTop:6}}>🏢 법인카드 → 개인 가용금액에 영향 없음. 수입으로 입금도 함께 기록해주세요</div>}
    </div>)}
    <input type="text" placeholder="메모 (선택)" value={memo} onChange={e=>setMemo(e.target.value)} style={{...I,marginBottom:14}}/>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{isEdit?'수정 저장':'추가하기'}</button>
  </div></div>);
}

function CatEditM({OV,SH,I,close,th,cat,onSave}){
  const[name,setName]=useState(cat?.name||'');const[icon,setIcon]=useState(cat?.icon||'📦');
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:16,color:th.text}}>{cat?'✏️ 카테고리 수정':'➕ 카테고리 추가'}</div>
    <div style={{display:'flex',gap:10,marginBottom:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>아이콘</div><input value={icon} onChange={e=>setIcon(e.target.value)} style={{...I,textAlign:'center'}} placeholder="🍚"/></div>
      <div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>이름</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="카테고리명" style={I}/></div>
    </div>
    <div style={{fontSize:11,color:th.sub,background:th.border,borderRadius:8,padding:'8px 12px',marginBottom:14,lineHeight:2}}>💡 이모지 예시: 🍚☕🛍️🚇📱🏠🎬💊💳🐷📦💰💸✈️🎮💄🐕🎵</div>
    <button onClick={()=>{if(!name.trim())return;onSave({name:name.trim(),icon:icon.trim()||'📦'});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{cat?'저장':'추가'}</button>
  </div></div>);
}

function FxCatEditM({OV,SH,I,close,th,cat,idx,fxCats,uFxCats}){
  const catName=typeof cat==='string'?cat:(cat?.name||'');
  const catIcon=typeof cat==='string'?'📌':(cat?.icon||'📌');
  const[v,setV]=useState(catName);
  const[ic,setIc]=useState(catIcon);
  const save=()=>{
    if(!v.trim())return;
    const item={name:v.trim(),icon:ic.trim()||'📌'};
    const n=cat!==null&&cat!==undefined?fxCats.map((x,i)=>i===idx?item:x):[...fxCats,item];
    uFxCats(n);close();
  };
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>{cat?'✏️ 고정지출 카테고리 수정':'➕ 고정지출 카테고리 추가'}</div>
    <div style={{display:'flex',gap:10,marginBottom:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>아이콘</div><input value={ic} onChange={e=>setIc(e.target.value)} style={{...I,textAlign:'center'}} placeholder="📌"/></div>
      <div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>이름</div><input value={v} onChange={e=>setV(e.target.value)} placeholder="카테고리명" style={I}/></div>
    </div>
    <div style={{fontSize:11,color:th.sub,background:th.border,borderRadius:8,padding:'8px 12px',marginBottom:14,lineHeight:2}}>💡 아이콘 예시: 📱🏠🛡️📡🚌🏦🛒📦🏥🎬✈️</div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{cat?'저장':'추가'}</button>
  </div></div>);
}

function FxM({OV,SH,I,close,th,fx,uFx,item,fxCats}){
  const[name,setName]=useState(item?.name||'');const[amt,setAmt]=useState(item?.amount||'');const[day,setDay]=useState(item?.day||1);const[cat,setCat]=useState(item?.cat||fxCats[0]||'생활비');
  const save=()=>{if(!name||!amt||Number(amt)<=0)return;uFx(item?fx.map(f=>f.id===item.id?{...f,name,amount:Number(amt),day:Number(day),cat}:f):[...fx,{id:Date.now(),name,amount:Number(amt),day:Number(day),cat}]);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{item?'✏️ 고정지출 수정':'➕ 고정지출 추가'}</div>{item&&<button onClick={()=>{uFx(fx.filter(f=>f.id!==item.id));close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}</div>
    <input placeholder="항목명" value={name} onChange={e=>setName(e.target.value)} style={{...I,marginBottom:10}}/>
    <input type="number" placeholder="금액 (원)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...I,marginBottom:10}}/>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>기본 지출일</div><input type="number" min="1" max="31" value={day} onChange={e=>setDay(e.target.value)} style={I}/></div>
      <div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>카테고리</div><select value={cat} onChange={e=>setCat(e.target.value)} style={{...I}}>{(fxCats.length?fxCats:FX_CATS_I).map(c=><option key={c}>{c}</option>)}</select></div>
    </div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button>
  </div></div>);
}

function FxMonthM({OV,SH,I,close,th,fxId,fxName,fxDefaultDay,fxDefaultAmt,monthKey,fxOv,uFxOv}){
  const ov=fxOv[monthKey]?.[fxId];const[d,setD]=useState(typeof ov==='number'?ov:(ov?.day??fxDefaultDay));const[a,setA]=useState(typeof ov==='number'?fxDefaultAmt:(ov?.amount??fxDefaultAmt));const isOv=!!ov;
  const save=()=>{uFxOv({...fxOv,[monthKey]:{...(fxOv[monthKey]||{}),[fxId]:{day:Number(d),amount:Number(a)}}});close();};
  const reset=()=>{const n={...fxOv};if(n[monthKey]){delete n[monthKey][fxId];if(!Object.keys(n[monthKey]).length)delete n[monthKey];}uFxOv(n);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>📌 {fxName} — 이번 달 편집</div>
    <div style={{fontSize:11,color:th.sub,marginBottom:14,lineHeight:1.6}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경돼요.<br/>기본: {fxDefaultDay}일 / {won(fxDefaultAmt)}</div>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>출금일</div><input type="number" min="1" max="31" value={d} onChange={e=>setD(e.target.value)} style={I}/></div>
      <div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>금액</div><input type="number" value={a} onChange={e=>setA(e.target.value)} style={I}/></div>
    </div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>
    {isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}
  </div></div>);
}

function IvM({OV,SH,I,close,th,iv,uIv,ivKey}){const item=iv[ivKey]||{name:ivKey,current:0,monthly:0};const[cur,setCur]=useState(item.current);const[mo,setMo]=useState(item.monthly);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>✏️ {item.name} 수정</div><div style={{fontSize:11,color:th.sub,marginBottom:4}}>현재 잔액</div><input type="number" value={cur} onChange={e=>setCur(e.target.value)} style={{...I,marginBottom:10}}/>{item.monthly>0&&<><div style={{fontSize:11,color:th.sub,marginBottom:4}}>월 납입액</div><input type="number" value={mo} onChange={e=>setMo(e.target.value)} style={{...I,marginBottom:10}}/></>}<button onClick={()=>{uIv({...iv,[ivKey]:{...item,current:Number(cur),monthly:Number(mo)}});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginTop:4}}>저장</button></div></div>);}
function WgM({OV,SH,I,close,th,wg,uWg}){const[t,setT]=useState(wg.target);const[y,setY]=useState(wg.year);const[m,setM]=useState(wg.month||12);const[n,setN]=useState(wg.name||'결혼 자금');const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>💍 목표 수정</div><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 이름</div><input value={n} onChange={e=>setN(e.target.value)} placeholder="결혼 자금" style={{...I,marginBottom:10}}/><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 금액</div><input type="number" value={t} onChange={e=>setT(e.target.value)} style={{...I,marginBottom:10}}/><div style={{display:'flex',gap:10,marginBottom:14}}><div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 연도</div><input type="number" value={y} min={2025} max={2040} onChange={e=>setY(e.target.value)} style={I}/></div><div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 월</div><select value={m} onChange={e=>setM(Number(e.target.value))} style={{...I,padding:'12px 6px'}}>{MO.map((lb,i)=><option key={i+1} value={i+1}>{lb}</option>)}</select></div></div><button onClick={()=>{if(t>0&&y>2024){uWg({target:Number(t),year:Number(y),month:Number(m),name:n.trim()||'결혼 자금'});close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}
function AdjM({OV,SH,I,close,th,baseA,initAdj,uAdj}){const[v,setV]=useState(baseA-initAdj);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>💰 이번 달 잔액 설정</div><div style={{fontSize:12,color:th.sub,marginBottom:14}}>기본 가용 금액: <b style={{color:th.primary}}>{won(baseA)}</b></div><input type="number" value={v} onChange={e=>setV(e.target.value)} style={{...I,marginBottom:6}}/><div style={{fontSize:11,color:th.sub,marginBottom:16}}>→ 이미 쓴 금액 <b style={{color:'#dc2626'}}>{won(Math.max(0,baseA-Number(v)))}</b> 반영</div><button onClick={()=>{uAdj(Math.max(0,baseA-Number(v)));close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>적용하기</button></div></div>);}
function ThemeM({OV,SH,close,th,theme,uTheme}){const groups=[['기본 테마',Object.values(THEMES).slice(0,10)],['🎨 패턴 테마',Object.values(THEMES).slice(10)]];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>🎨 테마 선택 (15가지)</div>{groups.map(([gname,list])=>(<div key={gname} style={{marginBottom:14}}><div style={{fontSize:11,color:th.sub,fontWeight:600,marginBottom:8}}>{gname}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>{list.map(t=>(<button key={t.id} onClick={()=>{uTheme(t.id);close();}} style={{border:`3px solid ${theme===t.id?t.primary:'transparent'}`,borderRadius:14,padding:'10px',cursor:'pointer',background:t.bg,backgroundImage:t.pat||'none',backgroundSize:t.patSz||'auto',textAlign:'center'}}><div style={{background:t.grad,borderRadius:8,height:26,marginBottom:6}}/><div style={{fontSize:11,fontWeight:700,color:t.text}}>{t.name}</div>{theme===t.id&&<div style={{fontSize:9,color:t.primary,marginTop:2,fontWeight:600}}>✓ 현재</div>}</button>))}</div></div>))}</div></div>);}

function IvOvM({OV,SH,I,close,th,iv,ivOv,uIvOv,ivKey,ivName,monthKey,defaultAmt}){
  const ov=ivOv[monthKey]?.[ivKey];
  const[v,setV]=useState(ov??defaultAmt);
  const isOv=ov!==undefined;
  const save=()=>{uIvOv({...ivOv,[monthKey]:{...(ivOv[monthKey]||{}),[ivKey]:Number(v)}});close();};
  const reset=()=>{const n={...ivOv};if(n[monthKey]){delete n[monthKey][ivKey];if(!Object.keys(n[monthKey]).length)delete n[monthKey];}uIvOv(n);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>{ivName} — 이번 달 편집</div>
    <div style={{fontSize:11,color:th.sub,marginBottom:14,lineHeight:1.6}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경돼요.<br/>기본: {won(defaultAmt)}</div>
    <input type="number" value={v} onChange={e=>setV(e.target.value)} style={{...I,marginBottom:14}}/>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>
    {isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}
  </div></div>);
}

function AppNameM({OV,SH,I,close,th,appName,uAppName}){const[v,setV]=useState(appName);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:10,color:th.text}}>🏠 가계부 이름 수정</div><input value={v} onChange={e=>setV(e.target.value)} placeholder="가계부 이름" style={{...I,marginBottom:14}}/><button onClick={()=>{if(v.trim()){uAppName(v.trim());close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
