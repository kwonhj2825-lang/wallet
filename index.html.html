const isHol=d=>KR_HOL.has(dkey(d));
function getNextMK(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1;return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
const fxActForMon=(fx,mk)=>fx.filter(f=>!f.df||mk<f.df);
const isNW=d=>{const w=d.getDay();return w===0||w===6||isHol(d);};
function getSalDay(y,m){const d=new Date(y,m-1,21);while(isNW(d))d.setDate(d.getDate()-1);return d;}
function getCycle(y,m){
  const start=getSalDay(y,m);const nm=m===12?1:m+1,ny=m===12?y+1:y,ns=getSalDay(ny,nm);
  const end=new Date(ns);end.setDate(end.getDate()-1);
  const f=d=>`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  const dm=m===12?1:m+1,dy=m===12?y+1:y;
  return{start,end,y,m,label:`${dy}л…„ ${dm}мӣ”`,range:`${f(start)} ~ ${f(end)}`};
}
function getCurCycle(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,sd=getSalDay(y,m);return n>=sd?getCycle(y,m):getCycle(m===1?y-1:y,m===1?12:m-1);}

  const baseA=curSal-fxSum-ivDed;

  const spnt=pTx.filter(t=>t.tp==='exp'&&(!t.payType||t.payType==='cash')).reduce((s,t)=>s+t.amt,0);

  const wFund=iv.stocks.current+iv.funds.current+iv.youth.current;

  const ctx={appName,uAppName,sal,curSal,salOv,salMK,uSal,uSalOv,fx,iv,txns,pr,pTx,fxSum,ivDed,baseA,avail,spnt,incd,spPct,creditPending,billingLabel,wFund,tAss,wg,dLeft,dayB,needMo,saveGap,mLeft,uFx,uIv,uWg,uAdj,addTx,delTx,updateTx,initAdj,fxOv,uFxOv,cats,incCats,uCats,uIncCats,fxCats,uFxCats,simData,uSimData,getIcon,modal,setModal,th,theme,uTheme};

// в”Җв”Җ к°Җкі„л¶Җ нғӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function LedgerTab({txns,delTx,updateTx,setModal,th,fx,fxOv,curSal,salOv,salMK,uSalOv,sal,iv,getIcon,cats,incCats}){
  const initVC=()=>{const c=getCurCycle();return{y:c.y,m:c.m};};
  const[vc,setVc]=useState(initVC);
  const[sel,setSel]=useState(TODAY);
  const[txFilter,setTxFilter]=useState('all');
  const[statsFx,setStatsFx]=useState(true); // мҶҢл№„нҶөкі„ кі м •л№„мҡ© нҸ¬н•Ё м—¬л¶Җ

  const cycle=getCycle(vc.y,vc.m);
  const cycSalMK=dkey(cycle.start).slice(0,7);
  const cycSal=salOv[cycSalMK]||sal;
  const prevC=()=>setVc(({y,m})=>({y:m===1?y-1:y,m:m===1?12:m-1}));
  const nextC=()=>setVc(({y,m})=>({y:m===12?y+1:y,m:m===12?1:m+1}));

  const INV_ITEMS=[{name:'мЈјмӢқ нҲ¬мһҗ',amount:iv.stocks.monthly,icon:'рҹ“Ҳ'},{name:'нҺҖл“ң нҲ¬мһҗ',amount:iv.funds.monthly,icon:'рҹ’ј'},{name:'мІӯл…„лҸ„м•Ҫкі„мўҢ',amount:iv.youth.monthly,icon:'рҹҸҰ'}].filter(i=>i.amount>0);
  const ivTotal=INV_ITEMS.reduce((s,i)=>s+i.amount,0);

  const cells=[];
  for(let i=0;i<cycle.start.getDay();i++)cells.push(null);
  let cd=new Date(cycle.start);while(cd<=cycle.end){cells.push(new Date(cd));cd=new Date(cd);cd.setDate(cd.getDate()+1);}

  const dm={};
  txns.forEach(t=>{if(!dm[t.date])dm[t.date]={e:0,i:0};if(t.tp==='exp')dm[t.date].e+=t.amt;else dm[t.date].i+=t.amt;});
  cells.forEach(cellD=>{if(!cellD)return;const dk=dkey(cellD),cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fxActForMon(fx,mp).forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){if(!dm[dk])dm[dk]={e:0,i:0};dm[dk].e+=getFxOvAmt(f,mp,fxOv);}});});
  const salDk=dkey(cycle.start);
  if(!dm[salDk])dm[salDk]={e:0,i:0};dm[salDk].i+=cycSal;
  if(ivTotal>0)dm[salDk].e=(dm[salDk].e||0)+ivTotal;

  const cyTxns=txns.filter(t=>{const d=new Date(t.date);return d>=cycle.start&&d<=cycle.end;});
  let cyFxTotal=0,cyFxByCat={};
  cells.forEach(cellD=>{if(!cellD)return;const cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fxActForMon(fx,mp).forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){const a=getFxOvAmt(f,mp,fxOv);cyFxTotal+=a;cyFxByCat[f.cat]=(cyFxByCat[f.cat]||0)+a;}});});

  const statsMap=statsFx?{...cyFxByCat,...statsTxByCat}:{...statsTxByCat};
  const statsTotal=Object.values(statsMap).reduce((s,v)=>s+v,0);

  const selTx=txns.filter(t=>t.date===sel).sort((a,b)=>a.id-b.id);

      {/* вҳ… лӢ¬л Ҙ н•ҳлӢЁ: мҲҳмһ… вҶ’ м§Җм¶ң вҶ’ мҲңмҶҢл№„ мҲңм„ң */}

        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>мҙқ м§Җм¶ң</div><div style={{fontSize:11,fontWeight:800,color:'#dc2626',marginTop:2}}>-{won(cyTotalExp)}</div><div style={{fontSize:8,color:th.sub}}>кі м •+нҲ¬мһҗ нҸ¬н•Ё</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>мҲң мҶҢл№„</div><div style={{fontSize:11,fontWeight:800,color:cyTotalExp-cyTotalInc>0?'#dc2626':th.green,marginTop:2}}>{won(Math.abs(cyTotalExp-cyTotalInc))}</div></div>

    </div>

    {/* мқјлі„ лӮҙм—ӯ */}
    <div style={Cd(th)}>

      {showInv&&INV_ITEMS.map(inv=>(<div key={inv.name} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:`${th.primary}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{inv.icon}</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{inv.name}</span><span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>нҲ¬мһҗ</span></div><div style={{fontSize:10,color:th.sub}}>мӣ”кёүмқј мһҗлҸҷ м¶ңкёҲ</div></div><span style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>-{won(inv.amount)}</span></div>))}
      {/* вҳ… кі м •м§Җм¶ң - нҶөмқјлҗң нҺём§‘ лІ„нҠј */}
      {showFx&&selFx.map(f=>{const effAmt=getFxOvAmt(f,selMp,fxOv),isOv=!!(fxOv[selMp]?.[f.id]);return(<div key={f.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>рҹ“Ң</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{f.name}</span><span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>кі м •</span>{isOv&&<span style={{fontSize:9,color:'#ea580c',background:'#fff7ed',borderRadius:6,padding:'1px 5px',fontWeight:600}}>мҲҳм •лҗЁ</span>}</div><div style={{fontSize:10,color:th.sub}}>кё°ліё {f.day}мқј / {won(f.amount)}</div></div><div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}><span style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>-{won(effAmt)}</span><button onClick={()=>setModal({type:'fxmonth',fxId:f.id,fxName:f.name,fxDefaultDay:f.day,fxDefaultAmt:f.amount,monthKey:selMp})} style={{border:'none',background:th.border,borderRadius:8,padding:'3px 7px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>нҺём§‘</button></div></div>);})}
      {filteredTx.map(t=><TxRow key={t.id} t={t} onEdit={t=>setModal({type:'txn',editTx:t})} getIcon={getIcon} th={th}/>)}
      {!hasAny&&<div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'20px 0'}}>лӮҙм—ӯ м—ҶмқҢ В· м¶”к°Җн•ҙ ліҙм„ёмҡ” рҹҢҹ</div>}
      {hasAny&&(<div style={{borderTop:`1px solid ${th.border}`,paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}><span style={{color:'#dc2626'}}>м§Җм¶ң -{won(selTxExp+selFxTotal+(isSalDay&&showFx?ivTotal:0))}</span><span style={{color:th.green}}>мҲҳмһ… +{won(selTxInc+(isSalDay&&showSal?cycSal:0))}</span></div>)}
    </div>

    {/* вҳ… мҶҢл№„ нҶөкі„ - нҲ¬мһҗ/м ҖкёҲнҶө м ңмҷё, кі м •л№„мҡ© toggle */}
    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:th.text}}>рҹ“Ҡ {cycle.label} мҶҢл№„ нҶөкі„</div>

          <button onClick={()=>setStatsFx(true)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:10,cursor:'pointer',fontWeight:600,background:statsFx?th.primary:th.border,color:statsFx?'#fff':th.sub}}>кі м • нҸ¬н•Ё</button>
          <button onClick={()=>setStatsFx(false)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:10,cursor:'pointer',fontWeight:600,background:!statsFx?th.primary:th.border,color:!statsFx?'#fff':th.sub}}>кі м • м ңмҷё</button>
        </div>
      </div>
      {Object.keys(statsMap).length===0?<div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'16px 0'}}>мқҙлІҲ лӢ¬ м§Җм¶ң лӮҙм—ӯмқҙ м—Ҷм–ҙмҡ” рҹҢұ</div>:
      Object.entries(statsMap).sort((a,b)=>b[1]-a[1]).map(([cat,amt],i)=>{const pct=statsTotal>0?(amt/statsTotal*100).toFixed(1):'0';return(<div key={cat} style={{marginBottom:10}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:16}}>{getIcon(cat)||'рҹ“Ұ'}</span><span style={{fontSize:12,fontWeight:600,color:th.text}}>{cat}</span></div><div><span style={{fontSize:12,fontWeight:700,color:th.primary}}>{won(amt)}</span><span style={{fontSize:10,color:th.sub,marginLeft:6}}>{pct}%</span></div></div><div style={{background:th.border,borderRadius:999,height:8,overflow:'hidden'}}><div style={{background:CC[i%CC.length],height:'100%',width:`${pct}%`,borderRadius:999}}/></div></div>);})}
      {statsTotal>0&&<div style={{borderTop:`1px solid ${th.border}`,paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}><span style={{color:th.sub}}>{statsFx?'кі м • нҸ¬н•Ё':'кі м • м ңмҷё'} н•©кі„</span><span style={{color:'#dc2626'}}>{won(statsTotal)}</span></div>}
    </div>
  </div>);
}

// в”Җв”Җ кі м •м§Җм¶ң нғӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  return(<div><div style={{background:th.grad,borderRadius:16,padding:'16px',color:'#fff',marginBottom:10}}><div style={{fontSize:11,opacity:.85}}>рҹ“Ң л§Өмӣ” кі м • м§Җм¶ң н•©кі„</div><div style={{fontSize:28,fontWeight:800,marginTop:4}}>{won(fxSum)}</div><div style={{fontSize:10,opacity:.7,marginTop:2}}>{activeFx.length}к°ң н•ӯлӘ©</div></div>

    {Object.entries(byCat).map(([cat,items])=>(<div key={cat} style={Cd(th)}><div style={{fontSize:11,fontWeight:700,color:th.sub,marginBottom:8}}>{getCatIcon(cat)} {cat}</div>{items.map(f=>(<div key={f.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:th.text}}>{f.name}</div><div style={{fontSize:10,color:th.sub}}>л§Өмӣ” {f.day}мқј В· {won(f.amount)}</div></div><div style={{display:'flex',gap:4}}>
      <button onClick={()=>setModal({type:'fx',data:f})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>нҺём§‘</button>
      <button onClick={()=>{const nxt=getNextMK();uFx(fx.map(x=>x.id===f.id?{...x,df:nxt}:x));}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:'#dc2626',fontWeight:600}}>мӮӯм ң</button>
    </div></div>))}</div>))}</div>);
}

// в”Җв”Җ м„Өм • нғӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function SettingsTab({sal,curSal,salMK,salOv,uSal,uSalOv,cats,incCats,uCats,uIncCats,fxCats,uFxCats,simData,uSimData,setModal,wFund,wg,mLeft,th}){

      мҪ”л“ң мҲҳм •В·мһ¬л°°нҸ¬н•ҙлҸ„ кё°лЎқмқҖ мӮ¬лқјм§Җм§Җ м•Ҡм•„мҡ”. лӢЁ, кё°ліё мӣ”кёүВ·кі м •л№„мҡ©мқ„ л°”кҫёл©ҙ мқҙм „ лӢ¬мқҳ к°Җмҡ©кёҲм•Ў кі„мӮ°мқҙ ліҖкІҪлҗ  мҲҳ мһҲм–ҙмҡ”. мқҙлҘј л°©м§Җн•ҳл Өл©ҙ к°Ғ лӢ¬м—җ "мқҙлІҲлӢ¬ мӣ”кёү мҲҳм •" кё°лҠҘмқ„ мӮ¬мҡ©н•ҳм„ёмҡ”.

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${th.border}`}}><div><div style={{fontSize:12,fontWeight:600,color:th.text}}>кё°ліё мӣ”кёү</div><div style={{fontSize:10,color:th.sub}}>л§ӨлӢ¬ кё°ліёмңјлЎң м Ғмҡ©лҗҳлҠ” к°’</div></div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:13,fontWeight:700,color:th.primary}}>{won(sal)}</span><button onClick={()=>setModal({type:'sal'})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>мҲҳм •</button></div></div>

    </div>

    {/* вҳ… м№ҙн…Ңкі лҰ¬ м„№м…ҳ - м ‘кё°/нҺјм№ҳкё° */}
    <CatSection title="рҹ’ё м§Җм¶ң м№ҙн…Ңкі лҰ¬" open={openCat==='exp'} onToggle={()=>setOpenCat(openCat==='exp'?null:'exp')} onAdd={()=>setModal({type:'catEdit',cat:null,onSave:nc=>uCats([...cats,{id:Date.now(),...nc}])})}>
      {cats.map(c=><CatRow key={c.id} c={c} onEdit={c=>setModal({type:'catEdit',cat:c,onSave:u=>uCats(cats.map(x=>x.id===c.id?{...x,...u}:x))})} onDel={id=>uCats(cats.filter(x=>x.id!==id))}/>)}

    <CatSection title="рҹ’° мҲҳмһ… м№ҙн…Ңкі лҰ¬" open={openCat==='inc'} onToggle={()=>setOpenCat(openCat==='inc'?null:'inc')} onAdd={()=>setModal({type:'catEdit',cat:null,onSave:nc=>uIncCats([...incCats,{id:Date.now(),...nc}])})}>
      {incCats.map(c=><CatRow key={c.id} c={c} onEdit={c=>setModal({type:'catEdit',cat:c,onSave:u=>uIncCats(incCats.map(x=>x.id===c.id?{...x,...u}:x))})} onDel={id=>uIncCats(incCats.filter(x=>x.id!==id))}/>)}
    </CatSection>
    <CatSection title="рҹ“Ң кі м •м§Җм¶ң м№ҙн…Ңкі лҰ¬" open={openCat==='fx'} onToggle={()=>setOpenCat(openCat==='fx'?null:'fx')} onAdd={()=>setModal({type:'fxCatEdit',cat:null,idx:null,fxCats,uFxCats})}>
      {fxCats.map((c,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{flex:1,fontSize:13,fontWeight:600,color:th.text}}>рҹ“Ң {typeof c==='string'?c:c.name}</div><button onClick={()=>setModal({type:'fxCatEdit',cat:c,idx:i,fxCats,uFxCats})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>нҺём§‘</button><button onClick={()=>uFxCats(fxCats.filter((_,j)=>j!==i))} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:'#dc2626',fontWeight:600}}>мӮӯм ң</button></div>))}
    </CatSection>

    {/* вҳ… м Җм¶• мӢңл®¬л Ҳмқҙм…ҳ - NumInpлҘј top-levelлЎң м •мқҳн•ҙм„ң re-mount лІ„к·ё м—ҶмқҢ */}
    <div style={Cd(th)}>
      <div style={{fontSize:13,fontWeight:700,color:th.text,marginBottom:12}}>рҹ“Ҡ м Җм¶• мӢңл®¬л Ҳмқҙм…ҳ</div>
      <div style={{fontSize:10,color:th.sub,background:th.border,borderRadius:10,padding:'8px 12px',marginBottom:12,lineHeight:1.7}}>
        рҹ’Ў (мӣ”кёүГ—м Җм¶•л№„мңЁГ—12 + м„ұкіјкёҲГ—м Җм¶•л№„мңЁ) Г— {yearsLeft.toFixed(2)}л…„<br/>лӘ©н‘ңк№Ңм§Җ лӮЁмқҖ кё°к°„: <b style={{color:th.primary}}>{mLeft}к°ңмӣ”</b>
      </div>
      <NumInp label="мӣ”кёү (мӣҗ)" val={ss} onChange={setSs} th={th}/>
      <NumInp label="мӣ”кёү м Җм¶• л№„мңЁ" val={sr} onChange={setSr} unit="%" th={th}/>
      <NumInp label="м—°к°„ мҳҲмғҒ м„ұкіјкёҲ (мӣҗ)" val={sb} onChange={setSb} th={th}/>
      <NumInp label="м„ұкіјкёҲ м Җм¶• л№„мңЁ" val={sbr} onChange={setSbr} unit="%" th={th}/>
      <div style={{background:`${th.primary}11`,borderRadius:14,padding:'14px',border:`1.5px solid ${th.border}`,marginTop:4}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
          <div style={{background:th.card,borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:10,color:th.sub}}>мҳҲмғҒ м¶”к°Җ м Җм¶•м•Ў</div><div style={{fontSize:15,fontWeight:800,color:th.primary,marginTop:4}}>{won(Math.round(simResult))}</div></div>
          <div style={{background:th.card,borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:10,color:th.sub}}>мҳҲмғҒ кІ°нҳј мһҗкёҲ н•©кі„</div><div style={{fontSize:15,fontWeight:800,color:th.green,marginTop:4}}>{won(Math.round(projTotal))}</div></div>
        </div>
        <div style={{background:th.card,borderRadius:12,padding:'10px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style={{fontSize:12,color:th.sub}}>лӘ©н‘ң {won(wg.target)} лҢҖл№„</span><span style={{fontSize:14,fontWeight:800,color:diff>=0?th.green:'#dc2626'}}>{diff>=0?`вң… +${won(Math.round(diff))} лӢ¬м„ұ!`:`вҡ пёҸ ${won(Math.round(Math.abs(diff)))} л¶ҖмЎұ`}</span></div>

      </div>
    </div>


  </div>);
}

// в”Җв”Җ лӘЁлӢ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Modals(props){
  const{modal,setModal,appName,uAppName,sal,uSal,salOv,uSalOv,txns,addTx,updateTx,delTx,fx,uFx,iv,uIv,wg,uWg,th,theme,uTheme,initAdj,uAdj,baseA,fxOv,uFxOv,cats,incCats,fxCats,uFxCats}=props;
  const close=()=>setModal(null);
  const OV={position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'};
  const SH={background:th.card,borderRadius:'24px 24px 0 0',padding:'24px 20px',paddingBottom:`calc(24px + var(--sab))`,width:'100%',maxWidth:480,boxSizing:'border-box',maxHeight:'90vh',overflowY:'auto'};
  const I={width:'100%',border:`2px solid ${th.border}`,borderRadius:12,padding:'12px 14px',boxSizing:'border-box',outline:'none',fontFamily:'inherit',background:th.card,color:th.text,display:'block'};
  const p={OV,SH,I,close,th};
  if(modal.type==='appName')return <AppNameM {...p} appName={appName} uAppName={uAppName}/>;
  if(modal.type==='sal')return <SalM {...p} sal={sal} uSal={uSal}/>;
  if(modal.type==='salOv')return <SalOvM {...p} monthKey={modal.monthKey} curVal={modal.curVal} defaultSal={modal.defaultSal} salOv={salOv} uSalOv={uSalOv}/>;
  if(modal.type==='txn')return <TxM {...p} addTx={addTx} updateTx={updateTx} delTx={delTx} editTx={modal.editTx} initDate={modal.data?.date} cats={cats} incCats={incCats}/>;
  if(modal.type==='fx')return <FxM {...p} fx={fx} uFx={uFx} item={modal.data} fxCats={fxCats}/>;
  if(modal.type==='iv')return <IvM {...p} iv={iv} uIv={uIv} ivKey={modal.key}/>;
  if(modal.type==='wg')return <WgM {...p} wg={wg} uWg={uWg}/>;
  if(modal.type==='theme')return <ThemeM {...p} theme={theme} uTheme={uTheme}/>;
  if(modal.type==='adj')return <AdjM {...p} baseA={baseA} initAdj={initAdj} uAdj={uAdj}/>;
  if(modal.type==='fxmonth')return <FxMonthM {...p} fxId={modal.fxId} fxName={modal.fxName} fxDefaultDay={modal.fxDefaultDay} fxDefaultAmt={modal.fxDefaultAmt} monthKey={modal.monthKey} fxOv={fxOv} uFxOv={uFxOv}/>;
  if(modal.type==='catEdit')return <CatEditM {...p} cat={modal.cat} onSave={modal.onSave}/>;
  if(modal.type==='fxCatEdit')return <FxCatEditM {...p} cat={modal.cat} idx={modal.idx} fxCats={fxCats} uFxCats={uFxCats}/>;
  return null;
}

function SalM({OV,SH,I,close,th,sal,uSal}){const[v,setV]=useState(sal);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:10,color:th.text}}>рҹ’° кё°ліё мӣ”кёү мҲҳм •</div><input type="number" value={v} onChange={e=>setV(Number(e.target.value))} style={{...I,marginBottom:14}}/><button onClick={()=>{if(v>0){uSal(v);close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>м ҖмһҘ</button></div></div>);}
function SalOvM({OV,SH,I,close,th,monthKey,curVal,defaultSal,salOv,uSalOv}){const[v,setV]=useState(curVal);const isOv=!!salOv[monthKey];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>рҹ’° мқҙлІҲ лӢ¬ мӣ”кёү мҲҳм •</div><div style={{fontSize:11,color:th.sub,marginBottom:10}}><b style={{color:th.primary}}>{monthKey}</b> мқҙлІҲ лӢ¬л§Ң ліҖкІҪ В· кё°ліё: {won(defaultSal)}</div><input type="number" value={v} onChange={e=>setV(e.target.value)} style={{...I,marginBottom:14}}/><button onClick={()=>{uSalOv({...salOv,[monthKey]:Number(v)});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>мқҙлІҲ лӢ¬ м Ғмҡ©</button>{isOv&&<button onClick={()=>{const n={...salOv};delete n[monthKey];uSalOv(n);close();}} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>кё°ліёк°’мңјлЎң мҙҲкё°нҷ”</button>}</div></div>);}

function TxM({OV,SH,I,close,th,addTx,updateTx,delTx,editTx,initDate,cats,incCats}){
  const isEdit=!!editTx;
  const[tp,setTp]=useState(editTx?.tp||'exp');
  const[amt,setAmt]=useState(editTx?.amt||'');
  const[cat,setCat]=useState(editTx?.cat||cats[0]?.name||'мӢқл№„');
  const[memo,setMemo]=useState(editTx?.memo||'');
  const[date,setDate]=useState(editTx?.date||initDate||TODAY);
  const[payType,setPayType]=useState(editTx?.payType||'cash');
  const iCats=tp==='exp'?cats:incCats;
  const save=()=>{if(!amt||Number(amt)<=0)return;const t={...(editTx||{}),id:editTx?.id||Date.now(),date,tp,amt:Number(amt),cat,memo,payType:tp==='exp'?payType:'cash'};isEdit?updateTx(t):addTx(t);close();};
  const acctTip=ACCT_CATS[cat];
  const tipMsg=acctTip==='savings_jar'?'рҹҗ· м§Җм¶ңвҶ’м ҖкёҲнҶө мқҙлҸҷ / мҲҳмһ…вҶ’мқём¶ң':acctTip==='parking'?'рҹ’і м§Җм¶ңвҶ’нҢҢнӮ№ мқҙлҸҷ / мҲҳмһ…вҶ’мқём¶ң':null;
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{isEdit?'вңҸпёҸ лӮҙм—ӯ мҲҳм •':'рҹ“қ лӮҙм—ӯ м¶”к°Җ'}</div>{isEdit&&<button onClick={()=>{delTx(editTx.id);close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>рҹ—‘ мӮӯм ң</button>}</div>
    <div style={{display:'flex',gap:8,marginBottom:12}}>{[['exp','рҹ’ё м§Җм¶ң'],['inc','рҹ’° мҲҳмһ…']].map(([v,lb])=>(<button key={v} onClick={()=>{setTp(v);if(!isEdit)setCat((v==='exp'?cats:incCats)[0]?.name||'кё°нғҖ');}} style={{flex:1,border:'none',borderRadius:12,padding:'10px',fontSize:12,fontWeight:700,cursor:'pointer',background:tp===v?th.primary:th.border,color:tp===v?'#fff':th.sub}}>{lb}</button>))}</div>
    {/* вҳ… лӮ м§ң/кёҲм•Ў л„Ҳл№„ нҶөмқј */}
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...I,marginBottom:10}}/>
    <input type="number" placeholder="кёҲм•Ў (мӣҗ)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...I,marginBottom:10}}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10}}>{iCats.map(c=>(<button key={c.id} onClick={()=>setCat(c.name)} style={{border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:cat===c.name?th.primary:th.border,color:cat===c.name?'#fff':th.primary,fontWeight:600}}>{c.icon} {c.name}</button>))}</div>
    {tipMsg&&<div style={{fontSize:10,color:th.primary,background:th.border,borderRadius:8,padding:'6px 10px',marginBottom:10}}>{tipMsg}</div>}
    {/* вҳ… мӢ мҡ©м№ҙл“ң/лІ•мқём№ҙл“ң м„ нғқ (м§Җм¶ңмқј л•Ңл§Ң) */}
    {tp==='exp'&&(<div style={{marginBottom:10}}>
      <div style={{fontSize:11,color:th.sub,marginBottom:6}}>кІ°м ң л°©лІ•</div>
      <div style={{display:'flex',gap:6}}>
        {[['cash','рҹ’ө нҳ„кёҲ/мІҙнҒ¬'],['credit','рҹ’і мӢ мҡ©м№ҙл“ң'],['biz','рҹҸў лІ•мқём№ҙл“ң']].map(([v,lb])=>(<button key={v} onClick={()=>setPayType(v)} style={{flex:1,border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:payType===v?th.primary:th.border,color:payType===v?'#fff':th.text,fontWeight:600}}>{lb}</button>))}
      </div>
      {payType==='credit'&&<div style={{fontSize:10,color:'#92400e',background:'#fef3c7',borderRadius:8,padding:'6px 10px',marginTop:6}}>рҹ’і мӢ мҡ©м№ҙл“ң вҶ’ лҢҖмӢңліҙл“ңм—җ мІӯкө¬ мҳҲм •мңјлЎң н‘ңмӢң, к°Җмҡ©кёҲм•Ўм—җм„ң мҰүмӢң м°Ёк°җлҗҳм§Җ м•Ҡм•„мҡ”</div>}
      {payType==='biz'&&<div style={{fontSize:10,color:'#1e40af',background:'#dbeafe',borderRadius:8,padding:'6px 10px',marginTop:6}}>рҹҸў лІ•мқём№ҙл“ң вҶ’ к°ңмқё к°Җмҡ©кёҲм•Ўм—җ мҳҒн–Ҙ м—ҶмқҢ. мҲҳмһ…мңјлЎң мһ…кёҲлҸ„ н•Ёк»ҳ кё°лЎқн•ҙмЈјм„ёмҡ”</div>}
    </div>)}
    <input type="text" placeholder="л©”лӘЁ (м„ нғқ)" value={memo} onChange={e=>setMemo(e.target.value)} style={{...I,marginBottom:14}}/>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{isEdit?'мҲҳм • м ҖмһҘ':'м¶”к°Җн•ҳкё°'}</button>
  </div></div>);
}

function CatEditM({OV,SH,I,close,th,cat,onSave}){
  const[name,setName]=useState(cat?.name||'');const[icon,setIcon]=useState(cat?.icon||'рҹ“Ұ');
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:16,color:th.text}}>{cat?'вңҸпёҸ м№ҙн…Ңкі лҰ¬ мҲҳм •':'вһ• м№ҙн…Ңкі лҰ¬ м¶”к°Җ'}</div>
    <div style={{display:'flex',gap:10,marginBottom:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>м•„мқҙмҪҳ</div><input value={icon} onChange={e=>setIcon(e.target.value)} style={{...I,textAlign:'center'}} placeholder="рҹҚҡ"/></div>
      <div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>мқҙлҰ„</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="м№ҙн…Ңкі лҰ¬лӘ…" style={I}/></div>
    </div>
    <div style={{fontSize:11,color:th.sub,background:th.border,borderRadius:8,padding:'8px 12px',marginBottom:14,lineHeight:2}}>рҹ’Ў мқҙлӘЁм§Җ мҳҲмӢң: рҹҚҡвҳ•рҹӣҚпёҸрҹҡҮрҹ“ұрҹҸ рҹҺ¬рҹ’Ҡрҹ’ірҹҗ·рҹ“Ұрҹ’°рҹ’ёвңҲпёҸрҹҺ®рҹ’„рҹҗ•рҹҺө</div>
    <button onClick={()=>{if(!name.trim())return;onSave({name:name.trim(),icon:icon.trim()||'рҹ“Ұ'});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{cat?'м ҖмһҘ':'м¶”к°Җ'}</button>
  </div></div>);
}

function FxCatEditM({OV,SH,I,close,th,cat,idx,fxCats,uFxCats}){
  const catName=typeof cat==='string'?cat:(cat?.name||'');
  const catIcon=typeof cat==='string'?'рҹ“Ң':(cat?.icon||'рҹ“Ң');
  const[v,setV]=useState(catName);
  const[ic,setIc]=useState(catIcon);
  const save=()=>{
    if(!v.trim())return;
    const item={name:v.trim(),icon:ic.trim()||'рҹ“Ң'};
    const n=cat!==null&&cat!==undefined?fxCats.map((x,i)=>i===idx?item:x):[...fxCats,item];
    uFxCats(n);close();
  };
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>{cat?'вңҸпёҸ кі м •м§Җм¶ң м№ҙн…Ңкі лҰ¬ мҲҳм •':'вһ• кі м •м§Җм¶ң м№ҙн…Ңкі лҰ¬ м¶”к°Җ'}</div>
    <div style={{display:'flex',gap:10,marginBottom:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>м•„мқҙмҪҳ</div><input value={ic} onChange={e=>setIc(e.target.value)} style={{...I,textAlign:'center'}} placeholder="рҹ“Ң"/></div>
      <div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>мқҙлҰ„</div><input value={v} onChange={e=>setV(e.target.value)} placeholder="м№ҙн…Ңкі лҰ¬лӘ…" style={I}/></div>
    </div>
    <div style={{fontSize:11,color:th.sub,background:th.border,borderRadius:8,padding:'8px 12px',marginBottom:14,lineHeight:2}}>рҹ’Ў м•„мқҙмҪҳ мҳҲмӢң: рҹ“ұрҹҸ рҹӣЎпёҸрҹ“ЎрҹҡҢрҹҸҰрҹӣ’рҹ“ҰрҹҸҘрҹҺ¬вңҲпёҸ</div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{cat?'м ҖмһҘ':'м¶”к°Җ'}</button>
  </div></div>);
}

function FxM({OV,SH,I,close,th,fx,uFx,item,fxCats}){
  const[name,setName]=useState(item?.name||'');const[amt,setAmt]=useState(item?.amount||'');const[day,setDay]=useState(item?.day||1);const[cat,setCat]=useState(item?.cat||fxCats[0]||'мғқнҷңл№„');
  const save=()=>{if(!name||!amt||Number(amt)<=0)return;uFx(item?fx.map(f=>f.id===item.id?{...f,name,amount:Number(amt),day:Number(day),cat}:f):[...fx,{id:Date.now(),name,amount:Number(amt),day:Number(day),cat}]);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{item?'вңҸпёҸ кі м •м§Җм¶ң мҲҳм •':'вһ• кі м •м§Җм¶ң м¶”к°Җ'}</div>{item&&<button onClick={()=>{uFx(fx.filter(f=>f.id!==item.id));close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>рҹ—‘ мӮӯм ң</button>}</div>
    <input placeholder="н•ӯлӘ©лӘ…" value={name} onChange={e=>setName(e.target.value)} style={{...I,marginBottom:10}}/>
    <input type="number" placeholder="кёҲм•Ў (мӣҗ)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...I,marginBottom:10}}/>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>кё°ліё м§Җм¶ңмқј</div><input type="number" min="1" max="31" value={day} onChange={e=>setDay(e.target.value)} style={I}/></div>
      <div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>м№ҙн…Ңкі лҰ¬</div><select value={cat} onChange={e=>setCat(e.target.value)} style={{...I}}>{(fxCats.length?fxCats:FX_CATS_I).map(c=><option key={c}>{c}</option>)}</select></div>
    </div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>м ҖмһҘ</button>
  </div></div>);
}

function FxMonthM({OV,SH,I,close,th,fxId,fxName,fxDefaultDay,fxDefaultAmt,monthKey,fxOv,uFxOv}){
  const ov=fxOv[monthKey]?.[fxId];const[d,setD]=useState(typeof ov==='number'?ov:(ov?.day??fxDefaultDay));const[a,setA]=useState(typeof ov==='number'?fxDefaultAmt:(ov?.amount??fxDefaultAmt));const isOv=!!ov;
  const save=()=>{uFxOv({...fxOv,[monthKey]:{...(fxOv[monthKey]||{}),[fxId]:{day:Number(d),amount:Number(a)}}});close();};
  const reset=()=>{const n={...fxOv};if(n[monthKey]){delete n[monthKey][fxId];if(!Object.keys(n[monthKey]).length)delete n[monthKey];}uFxOv(n);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>рҹ“Ң {fxName} вҖ” мқҙлІҲ лӢ¬ нҺём§‘</div>
    <div style={{fontSize:11,color:th.sub,marginBottom:14,lineHeight:1.6}}><b style={{color:th.primary}}>{monthKey}</b> мқҙлІҲ лӢ¬л§Ң ліҖкІҪлҸјмҡ”.<br/>кё°ліё: {fxDefaultDay}мқј / {won(fxDefaultAmt)}</div>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>м¶ңкёҲмқј</div><input type="number" min="1" max="31" value={d} onChange={e=>setD(e.target.value)} style={I}/></div>
      <div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>кёҲм•Ў</div><input type="number" value={a} onChange={e=>setA(e.target.value)} style={I}/></div>
    </div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>мқҙлІҲ лӢ¬ м Ғмҡ©</button>
    {isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>кё°ліёк°’мңјлЎң мҙҲкё°нҷ”</button>}
  </div></div>);
}

function IvM({OV,SH,I,close,th,iv,uIv,ivKey}){const item=iv[ivKey]||{name:ivKey,current:0,monthly:0};const[cur,setCur]=useState(item.current);const[mo,setMo]=useState(item.monthly);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>вңҸпёҸ {item.name} мҲҳм •</div><div style={{fontSize:11,color:th.sub,marginBottom:4}}>нҳ„мһ¬ мһ”м•Ў</div><input type="number" value={cur} onChange={e=>setCur(e.target.value)} style={{...I,marginBottom:10}}/>{item.monthly>0&&<><div style={{fontSize:11,color:th.sub,marginBottom:4}}>мӣ” лӮ©мһ…м•Ў</div><input type="number" value={mo} onChange={e=>setMo(e.target.value)} style={{...I,marginBottom:10}}/></>}<button onClick={()=>{uIv({...iv,[ivKey]:{...item,current:Number(cur),monthly:Number(mo)}});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginTop:4}}>м ҖмһҘ</button></div></div>);}
function WgM({OV,SH,I,close,th,wg,uWg}){const[t,setT]=useState(wg.target);const[y,setY]=useState(wg.year);const[m,setM]=useState(wg.month||12);const[n,setN]=useState(wg.name||'кІ°нҳј мһҗкёҲ');const MO=['1мӣ”','2мӣ”','3мӣ”','4мӣ”','5мӣ”','6мӣ”','7мӣ”','8мӣ”','9мӣ”','10мӣ”','11мӣ”','12мӣ”'];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>рҹ’Қ лӘ©н‘ң мҲҳм •</div><div style={{fontSize:11,color:th.sub,marginBottom:4}}>лӘ©н‘ң мқҙлҰ„</div><input value={n} onChange={e=>setN(e.target.value)} placeholder="кІ°нҳј мһҗкёҲ" style={{...I,marginBottom:10}}/><div style={{fontSize:11,color:th.sub,marginBottom:4}}>лӘ©н‘ң кёҲм•Ў</div><input type="number" value={t} onChange={e=>setT(e.target.value)} style={{...I,marginBottom:10}}/><div style={{display:'flex',gap:10,marginBottom:14}}><div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>лӘ©н‘ң м—°лҸ„</div><input type="number" value={y} min={2025} max={2040} onChange={e=>setY(e.target.value)} style={I}/></div><div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>лӘ©н‘ң мӣ”</div><select value={m} onChange={e=>setM(Number(e.target.value))} style={{...I,padding:'12px 6px'}}>{MO.map((lb,i)=><option key={i+1} value={i+1}>{lb}</option>)}</select></div></div><button onClick={()=>{if(t>0&&y>2024){uWg({target:Number(t),year:Number(y),month:Number(m),name:n.trim()||'кІ°нҳј мһҗкёҲ'});close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>м ҖмһҘ</button></div></div>);}
function AdjM({OV,SH,I,close,th,baseA,initAdj,uAdj}){const[v,setV]=useState(baseA-initAdj);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>рҹ’° мқҙлІҲ лӢ¬ мһ”м•Ў м„Өм •</div><div style={{fontSize:12,color:th.sub,marginBottom:14}}>кё°ліё к°Җмҡ© кёҲм•Ў: <b style={{color:th.primary}}>{won(baseA)}</b></div><input type="number" value={v} onChange={e=>setV(e.target.value)} style={{...I,marginBottom:6}}/><div style={{fontSize:11,color:th.sub,marginBottom:16}}>вҶ’ мқҙлҜё м“ҙ кёҲм•Ў <b style={{color:'#dc2626'}}>{won(Math.max(0,baseA-Number(v)))}</b> л°ҳмҳҒ</div><button onClick={()=>{uAdj(Math.max(0,baseA-Number(v)));close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>м Ғмҡ©н•ҳкё°</button></div></div>);}
function ThemeM({OV,SH,close,th,theme,uTheme}){const groups=[['кё°ліё н…Ңл§Ҳ',Object.values(THEMES).slice(0,10)],['рҹҺЁ нҢЁн„ҙ н…Ңл§Ҳ',Object.values(THEMES).slice(10)]];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>рҹҺЁ н…Ңл§Ҳ м„ нғқ (15к°Җм§Җ)</div>{groups.map(([gname,list])=>(<div key={gname} style={{marginBottom:14}}><div style={{fontSize:11,color:th.sub,fontWeight:600,marginBottom:8}}>{gname}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>{list.map(t=>(<button key={t.id} onClick={()=>{uTheme(t.id);close();}} style={{border:`3px solid ${theme===t.id?t.primary:'transparent'}`,borderRadius:14,padding:'10px',cursor:'pointer',background:t.bg,backgroundImage:t.pat||'none',backgroundSize:t.patSz||'auto',textAlign:'center'}}><div style={{background:t.grad,borderRadius:8,height:26,marginBottom:6}}/><div style={{fontSize:11,fontWeight:700,color:t.text}}>{t.name}</div>{theme===t.id&&<div style={{fontSize:9,color:t.primary,marginTop:2,fontWeight:600}}>вң“ нҳ„мһ¬</div>}</button>))}</div></div>))}</div></div>);}

function AppNameM({OV,SH,I,close,th,appName,uAppName}){const[v,setV]=useState(appName);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:10,color:th.text}}>рҹҸ  к°Җкі„л¶Җ мқҙлҰ„ мҲҳм •</div><input value={v} onChange={e=>setV(e.target.value)} placeholder="к°Җкі„л¶Җ мқҙлҰ„" style={{...I,marginBottom:14}}/><button onClick={()=>{if(v.trim()){uAppName(v.trim());close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>м ҖмһҘ</button></div></div>);}

root.render(<App/>);
</script>
