<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>혜진이의 가계부 💜</title>
  <meta name="theme-color" content="#7c3aed"/>

<body><div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect}=React;
const won=n=>(Math.abs(n||0)).toLocaleString('ko-KR')+'원';
const cw=n=>{const a=Math.abs(n||0);if(a>=10000000)return`${(a/10000000).toFixed(0)}천만`;if(a>=10000)return`${(a/10000).toFixed(a%10000===0?0:1)}만원`;if(a>=1000)return`${(a/1000).toFixed(0)}천원`;return`${a}원`;};
const dkey=d=>{const dt=d instanceof Date?d:new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};
const TODAY=dkey(new Date()),TODAY_DATE=new Date().getDate();

const KR_HOL=new Set(['2025-01-01','2025-01-28','2025-01-29','2025-01-30','2025-03-01','2025-03-03','2025-05-05','2025-05-06','2025-06-06','2025-08-15','2025-10-03','2025-10-05','2025-10-06','2025-10-07','2025-10-08','2025-10-09','2025-12-25','2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-03-01','2026-03-02','2026-05-05','2026-05-24','2026-05-25','2026-06-06','2026-08-15','2026-08-17','2026-09-28','2026-09-29','2026-09-30','2026-10-01','2026-10-03','2026-10-09','2026-12-25','2027-01-01']);
const isHol=d=>KR_HOL.has(dkey(d));
const isNW=d=>{const w=d.getDay();return w===0||w===6||isHol(d);};
function getSalDay(y,m){const d=new Date(y,m-1,21);while(isNW(d))d.setDate(d.getDate()-1);return d;}
function getCycle(y,m){const start=getSalDay(y,m);const nm=m===12?1:m+1,ny=m===12?y+1:y,ns=getSalDay(ny,nm);const end=new Date(ns);end.setDate(end.getDate()-1);const f=d=>`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;const dm=m===12?1:m+1,dy=m===12?y+1:y;return{start,end,y,m,label:`${dy}년 ${dm}월`,range:`${f(start)} ~ ${f(end)}`};}
function getCurCycle(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,sd=getSalDay(y,m);return n>=sd?getCycle(y,m):getCycle(m===1?y-1:y,m===1?12:m-1);}
const getFxOvDay=(f,mp,dim,ov)=>{const o=ov[mp]?.[f.id];if(!o)return Math.min(f.day,dim);if(typeof o==='number')return Math.min(o,dim);return Math.min(o.day??f.day,dim);};
const getFxOvAmt=(f,mp,ov)=>{const o=ov[mp]?.[f.id];if(!o||typeof o==='number')return f.amount;return o.amount??f.amount;};

const THEMES={
  lavender:{id:'lavender',name:'💜 라벤더',primary:'#8b5cf6',light:'#c4b5fd',bg:'#fbfaff',card:'#fff',grad:'linear-gradient(135deg,#7c3aed,#a78bfa)',text:'#374151',sub:'#9ca3af',border:'#ede9fe',green:'#059669'},
  rose:    {id:'rose',    name:'🌸 로즈',  primary:'#e879a0',light:'#fbcfe8',bg:'#fff9fc',card:'#fff',grad:'linear-gradient(135deg,#db2777,#f9a8d4)',text:'#374151',sub:'#9ca3af',border:'#fce7f3',green:'#059669'},
  peach:   {id:'peach',  name:'🍑 피치',  primary:'#f97316',light:'#fed7aa',bg:'#fffcf8',card:'#fff',grad:'linear-gradient(135deg,#ea580c,#fb923c)',text:'#374151',sub:'#9ca3af',border:'#ffedd5',green:'#059669'},
  sage:    {id:'sage',   name:'🌿 세이지', primary:'#16a34a',light:'#86efac',bg:'#f8fff9',card:'#fff',grad:'linear-gradient(135deg,#15803d,#4ade80)',text:'#374151',sub:'#9ca3af',border:'#dcfce7',green:'#2563eb'},
  sky:     {id:'sky',    name:'🩵 스카이', primary:'#0284c7',light:'#7dd3fc',bg:'#f5fbff',card:'#fff',grad:'linear-gradient(135deg,#0369a1,#38bdf8)',text:'#374151',sub:'#9ca3af',border:'#e0f2fe',green:'#059669'},
  aqua:    {id:'aqua',   name:'🌊 아쿠아', primary:'#0d9488',light:'#5eead4',bg:'#f3fffe',card:'#fff',grad:'linear-gradient(135deg,#0f766e,#2dd4bf)',text:'#374151',sub:'#9ca3af',border:'#ccfbf1',green:'#7c3aed'},
  blossom: {id:'blossom',name:'🌺 블로썸', primary:'#e11d48',light:'#fda4af',bg:'#fffbfb',card:'#fff',grad:'linear-gradient(135deg,#be123c,#fb7185)',text:'#374151',sub:'#9ca3af',border:'#ffe4e6',green:'#059669'},
  butter:  {id:'butter', name:'🍯 버터',   primary:'#ca8a04',light:'#fde68a',bg:'#fffffa',card:'#fff',grad:'linear-gradient(135deg,#a16207,#fbbf24)',text:'#374151',sub:'#9ca3af',border:'#fef9c3',green:'#059669'},
  lilac:   {id:'lilac',  name:'🪻 라일락', primary:'#9333ea',light:'#d8b4fe',bg:'#fefbff',card:'#fff',grad:'linear-gradient(135deg,#7e22ce,#c084fc)',text:'#374151',sub:'#9ca3af',border:'#f3e8ff',green:'#059669'},
  dark:    {id:'dark',   name:'🌙 다크',   primary:'#818cf8',light:'#c7d2fe',bg:'#0f172a',card:'#1e293b',grad:'linear-gradient(135deg,#1e1b4b,#4338ca)',text:'#f1f5f9',sub:'#64748b',border:'#334155',green:'#34d399'},
  cherry_dot:{id:'cherry_dot',name:'🌸 벚꽃 물방울',primary:'#f472b6',light:'#fbcfe8',bg:'#fff8fc',card:'#fffdfe',grad:'linear-gradient(135deg,#db2777,#f9a8d4)',text:'#374151',sub:'#9ca3af',border:'#fce7f3',green:'#059669',pat:'radial-gradient(circle, #f472b628 2px, transparent 2px)',patSz:'22px 22px'},
  star:    {id:'star',   name:'⭐ 별빛',   primary:'#f59e0b',light:'#fde68a',bg:'#fffef7',card:'#fffffe',grad:'linear-gradient(135deg,#b45309,#fbbf24)',text:'#374151',sub:'#9ca3af',border:'#fef3c7',green:'#059669',pat:'radial-gradient(circle, #fbbf2435 1.5px, transparent 1.5px), radial-gradient(circle, #f59e0b20 1px, transparent 1px)',patSz:'22px 22px, 11px 11px'},
  candy:   {id:'candy',  name:'🍭 캔디',   primary:'#ec4899',light:'#f9a8d4',bg:'#fff7fb',card:'#fffdfe',grad:'linear-gradient(135deg,#be185d,#f472b6)',text:'#374151',sub:'#9ca3af',border:'#fce7f3',green:'#059669',pat:'repeating-linear-gradient(45deg, #ec489918 0px, #ec489918 3px, transparent 3px, transparent 18px)',patSz:'auto'},
  bubble:  {id:'bubble', name:'🫧 버블',   primary:'#06b6d4',light:'#67e8f9',bg:'#f5feff',card:'#fdfeff',grad:'linear-gradient(135deg,#0e7490,#22d3ee)',text:'#374151',sub:'#9ca3af',border:'#cffafe',green:'#7c3aed',pat:'radial-gradient(circle, #06b6d432 3px, transparent 3px), radial-gradient(circle, #0891b220 1.5px, transparent 1.5px)',patSz:'32px 32px, 16px 16px'},
  forest_grid:{id:'forest_grid',name:'🌿 숲속 격자',primary:'#15803d',light:'#86efac',bg:'#f6fff9',card:'#fdfffe',grad:'linear-gradient(135deg,#14532d,#22c55e)',text:'#374151',sub:'#9ca3af',border:'#dcfce7',green:'#2563eb',pat:'linear-gradient(#15803d15 1px, transparent 1px), linear-gradient(90deg, #15803d10 1px, transparent 1px)',patSz:'24px 24px'},
};

const FX0=[{id:1,name:"유튜브",amount:14900,day:16,cat:"구독"},{id:2,name:"티빙",amount:5500,day:24,cat:"구독"},{id:3,name:"넷플릭스",amount:7000,day:12,cat:"구독"},{id:4,name:"월세",amount:170000,day:25,cat:"주거"},{id:5,name:"태우 여행통장",amount:100000,day:25,cat:"저축"},{id:6,name:"보험료",amount:174702,day:6,cat:"보험"},{id:7,name:"통신비",amount:13020,day:23,cat:"통신"},{id:8,name:"인터넷비",amount:23100,day:15,cat:"통신"},{id:9,name:"쿠팡",amount:7890,day:4,cat:"구독"},{id:10,name:"교통비",amount:75000,day:10,cat:"교통"},{id:11,name:"관리비",amount:200000,day:25,cat:"주거"}];

// ★ savings_jar 추가
const IV0={
  pension:    {name:"개인연금",    monthly:500000, current:7744856},
  youth:      {name:"청년도약계좌",monthly:700000, current:7000000},
  funds:      {name:"펀드",        monthly:350000, current:5711062},
  stocks:     {name:"주식",        monthly:1000000,current:18283826},
  parking:    {name:"파킹통장",    monthly:0,      current:1667322},
  savings_jar:{name:"저금통",      monthly:0,      current:0},
};

// ★ 저금통 카테고리 추가
const CATS_I=[{id:1,name:'식비',icon:'🍚'},{id:2,name:'카페',icon:'☕'},{id:3,name:'쇼핑',icon:'🛍️'},{id:4,name:'교통',icon:'🚇'},{id:5,name:'구독',icon:'📱'},{id:6,name:'생활비',icon:'🏠'},{id:7,name:'문화',icon:'🎬'},{id:8,name:'의료',icon:'💊'},{id:9,name:'파킹통장',icon:'💳'},{id:10,name:'저금통',icon:'🐷'},{id:11,name:'기타',icon:'📦'}];
const INC_I=[{id:101,name:'월급',icon:'💰'},{id:102,name:'이체',icon:'💸'},{id:103,name:'용돈',icon:'💵'},{id:104,name:'파킹통장',icon:'💳'},{id:105,name:'저금통',icon:'🐷'},{id:106,name:'기타',icon:'📦'}];

const CC=['#a78bfa','#f9a8d4','#86efac','#7dd3fc','#fde68a','#fca5a5','#6ee7b7','#fbbf24','#c4b5fd','#94a3b8'];
function Cd(th,x={}){return{background:th.card,borderRadius:16,padding:'14px',boxShadow:'0 2px 10px rgba(0,0,0,0.06)',marginBottom:10,...x};}
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const lv=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}};

// ★ 파킹통장/저금통 잔액 로직 헬퍼
// 지출(exp) = 해당 계좌로 이동 → 잔액 증가
// 수입(inc) = 해당 계좌에서 인출 → 잔액 감소
const ACCT_CATS={'파킹통장':'parking','저금통':'savings_jar'};
const applyAcct=(t,sign,base)=>{
  const k=ACCT_CATS[t.cat];
  if(!k)return base;
  const cur=base[k]?.current||0;
  const d=sign*(t.tp==='exp'?t.amt:-t.amt);
  return{...base,[k]:{...(base[k]||{name:k,monthly:0}),current:cur+d}};
};

// ── App ──────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState(0);
  const[sal,setSal]=useState(3600000);
  const[salOv,setSalOv]=useState({});
  const[fx,setFx]=useState(FX0);
  const[iv,setIv]=useState(IV0);
  const[txns,setTxns]=useState([]);
  const[wg,setWg]=useState({target:150000000,year:2029,month:12});
  const[theme,setTheme]=useState('lavender');
  const[initAdj,setInitAdj]=useState(0);
  const[fxOv,setFxOv]=useState({});
  const[cats,setCats]=useState(CATS_I);
  const[incCats,setIncCats]=useState(INC_I);
  const[rdy,setRdy]=useState(false);
  const[modal,setModal]=useState(null);
  const[noti,setNoti]=useState(null);
  const[aiText,setAiText]=useState('');
  const[aiLoad,setAiLoad]=useState(false);

  useEffect(()=>{
    [['hj9-sal',setSal],['hj9-salOv',setSalOv],['hj9-fx',setFx],
     ['hj9-tx',setTxns],['hj9-wg',setWg],['hj9-theme',setTheme],
     ['hj9-adj',setInitAdj],['hj9-fxov',setFxOv],
     ['hj9-cats',setCats],['hj9-incCats',setIncCats]
    ].forEach(([k,fn])=>{const v=lv(k);if(v)fn(v);});
    // iv는 새 키(savings_jar)가 없을 수 있으므로 기본값과 병합
    const savedIv=lv('hj9-iv');
    if(savedIv)setIv({...IV0,...savedIv});
    if([10,20,30].includes(TODAY_DATE)){const ln=lv('hj9-lastnoti');if(!ln||ln!==TODAY){setNoti('📊 오늘은 투자 내역 업데이트 날이에요! 자산 탭에서 잔고를 업데이트해 주세요 💜');sv('hj9-lastnoti',TODAY);}}
    setRdy(true);
  },[]);

  const us=(k,fn)=>v=>{fn(v);sv(k,v);};
  const uSal=us('hj9-sal',setSal),uSalOv=us('hj9-salOv',setSalOv),uFx=us('hj9-fx',setFx);
  const uIv=v=>{setIv(v);sv('hj9-iv',v);};
  const uWg=us('hj9-wg',setWg),uAdj=us('hj9-adj',setInitAdj),uTheme=us('hj9-theme',setTheme);
  const uFxOv=us('hj9-fxov',setFxOv),uCats=us('hj9-cats',setCats),uIncCats=us('hj9-incCats',setIncCats);

  // ★ 파킹통장/저금통 잔액 자동 반영
  const addTx=t=>{const n=[...txns,t];setTxns(n);sv('hj9-tx',n);uIv(applyAcct(t,1,iv));};
  const delTx=id=>{const t=txns.find(x=>x.id===id);const n=txns.filter(x=>x.id!==id);setTxns(n);sv('hj9-tx',n);if(t)uIv(applyAcct(t,-1,iv));};
  const updateTx=t=>{const old=txns.find(x=>x.id===t.id);let ni=iv;if(old)ni=applyAcct(old,-1,ni);ni=applyAcct(t,1,ni);const n=txns.map(x=>x.id===t.id?t:x);setTxns(n);sv('hj9-tx',n);uIv(ni);};
  const getIcon=name=>[...cats,...incCats].find(c=>c.name===name)?.icon||'📦';

  const th=THEMES[theme]||THEMES.lavender;
  const pr=getCurCycle();
  const salMK=dkey(pr.start).slice(0,7);
  const curSal=salOv[salMK]||sal;
  const fxSum=fx.reduce((s,f)=>s+f.amount,0);
  const ivDed=iv.youth.monthly+iv.funds.monthly+iv.stocks.monthly;
  const baseA=curSal-fxSum-ivDed;
  const pTx=txns.filter(t=>{const d=new Date(t.date);return d>=pr.start&&d<=pr.end;});
  const spnt=pTx.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const incd=pTx.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const avail=baseA-initAdj-spnt+incd;
  const spPct=Math.min(100,baseA>0?((initAdj+spnt-incd)/baseA)*100:0);
  const wFund=iv.stocks.current+iv.funds.current+iv.youth.current;
  // ★ tAss에 저금통 포함
  const tAss=wFund+iv.pension.current+iv.parking.current+(iv.savings_jar?.current||0);
  const now=new Date(),dLeft=Math.max(1,Math.ceil((pr.end-now)/86400000));
  const dayB=Math.floor(avail/dLeft);
  const wgMonth=wg.month||12;
  const mLeft=Math.max(1,(wg.year-now.getFullYear())*12+(wgMonth-(now.getMonth()+1)));
  const needMo=Math.max(0,Math.ceil((wg.target-wFund)/mLeft));
  const saveGap=needMo-ivDed;

  if(!rdy)return(<div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',background:'#faf5ff',flexDirection:'column',gap:12}}><div style={{fontSize:60}}>🌸</div><div style={{color:'#7c3aed',fontSize:15,fontWeight:700}}>가계부 불러오는 중...</div></div>);
  const ctx={sal,curSal,salOv,salMK,uSal,uSalOv,fx,iv,txns,pr,pTx,fxSum,ivDed,baseA,avail,spnt,incd,spPct,wFund,tAss,wg,dLeft,dayB,needMo,saveGap,mLeft,uFx,uIv,uWg,uAdj,addTx,delTx,updateTx,initAdj,fxOv,uFxOv,cats,incCats,uCats,uIncCats,getIcon,modal,setModal,aiText,setAiText,aiLoad,setAiLoad,th,theme,uTheme};
  const TABS=[['🏠','홈'],['📅','가계부'],['📌','고정'],['📈','자산'],['🤖','AI'],['⚙️','설정']];
  return(
    <div style={{fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif',background:th.bg,backgroundImage:th.pat||'none',backgroundSize:th.patSz||'auto',minHeight:'100vh',maxWidth:480,margin:'0 auto',paddingBottom:`calc(68px + var(--sab))`,transition:'background .3s'}}>
      <div style={{background:th.grad,paddingTop:`calc(14px + var(--sat))`,paddingBottom:14,paddingLeft:16,paddingRight:16,color:'#fff'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div><div style={{fontSize:15,fontWeight:800}}>💜 혜진이의 가계부</div><div style={{fontSize:11,opacity:.75,marginTop:2}}>{pr.label} · {pr.range}{salOv[salMK]?` · 이번달 월급 ${won(curSal)}`:''}</div></div>
          <button onClick={()=>setModal({type:'theme'})} style={{background:'rgba(255,255,255,.2)',border:'none',color:'#fff',borderRadius:20,padding:'5px 12px',fontSize:11,cursor:'pointer',fontWeight:600}}>🎨 테마</button>
        </div>
      </div>
      {noti&&(<div style={{background:th.primary,color:'#fff',padding:'10px 16px',fontSize:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>{noti}</span><button onClick={()=>setNoti(null)} style={{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:18}}>×</button></div>)}
      <div style={{padding:'12px 12px 0'}}>
        {tab===0&&<HomeTab {...ctx}/>}{tab===1&&<LedgerTab {...ctx}/>}{tab===2&&<FixedTab {...ctx}/>}
        {tab===3&&<AssetsTab {...ctx}/>}{tab===4&&<AITab {...ctx}/>}{tab===5&&<SettingsTab {...ctx}/>}
      </div>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:th.card,borderTop:`1px solid ${th.border}`,display:'flex',paddingTop:6,paddingBottom:`calc(8px + var(--sab))`,zIndex:100}}>
        {TABS.map(([ic,lb],i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,border:'none',background:'none',cursor:'pointer',padding:'2px 0',color:tab===i?th.primary:th.sub}}>
            <div style={{fontSize:18}}>{ic}</div><div style={{fontSize:8,fontWeight:tab===i?700:500,marginTop:2}}>{lb}</div>
          </button>
        ))}
      </div>
      {modal&&<Modals {...ctx}/>}
    </div>
  );
}

// ── 홈 탭 ─────────────────────────────────────────────────────
function HomeTab({curSal,fxSum,ivDed,baseA,avail,spnt,incd,spPct,wFund,tAss,wg,dLeft,dayB,needMo,saveGap,mLeft,pTx,iv,setModal,getIcon,th}){
  const wPct=Math.min(100,(wFund/wg.target)*100);
  const todayTx=pTx.filter(t=>t.date===TODAY);
  const todaySpnt=todayTx.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const byCat={};pTx.filter(t=>t.tp==='exp').forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amt;});
  const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const wgLabel=`${wg.year}년 ${wg.month||12}월`;
  return(<div>
    <div style={{background:th.grad,borderRadius:20,padding:'20px 18px',color:'#fff',marginBottom:10,boxShadow:'0 4px 20px rgba(0,0,0,.2)'}}>
      <div style={{fontSize:12,opacity:.85,fontWeight:500}}>🟢 이번 달 사용 가능 금액</div>
      <div style={{fontSize:34,fontWeight:800,marginTop:6,letterSpacing:-1,color:avail<0?'#fca5a5':'#fff'}}>{avail<0?'-':''}{won(avail)}</div>

    </div>
    <div style={{...Cd(th),background:`${th.primary}11`,border:`1.5px solid ${th.border}`}}>
      <div style={{fontSize:12,fontWeight:700,color:th.text,marginBottom:10}}>💡 결혼 자금 달성 플랜</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
        <div style={{background:th.card,borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:10,color:th.sub}}>목표 {wgLabel}까지</div><div style={{fontSize:16,fontWeight:800,color:th.primary,marginTop:3}}>{mLeft}개월</div></div>
        <div style={{background:th.card,borderRadius:12,padding:'10px',textAlign:'center'}}><div style={{fontSize:10,color:th.sub}}>필요 월 저축액</div><div style={{fontSize:16,fontWeight:800,color:th.primary,marginTop:3}}>{won(needMo)}</div></div>
      </div>
      <div style={{background:th.card,borderRadius:12,padding:'10px'}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}><span style={{color:th.sub}}>현재 월 투자액</span><span style={{fontWeight:700,color:th.text}}>{won(ivDed)}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}><span style={{color:th.sub}}>{saveGap>0?'💸 매달 부족':'✅ 초과 저축 중'}</span><span style={{fontWeight:800,color:saveGap>0?'#dc2626':th.green}}>{saveGap>0?`${won(saveGap)} 부족`:`${won(Math.abs(saveGap))} 초과`}</span></div>

}

function TxRow({t,onDel,onEdit,getIcon,th}){
  return(<div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}>
    <div style={{width:36,height:36,borderRadius:12,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{getIcon(t.cat)}</div>
    <div style={{flex:1,minWidth:0,cursor:onEdit?'pointer':'default'}} onClick={()=>onEdit&&onEdit(t)}><div style={{fontSize:12,fontWeight:600,color:th.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.memo||t.cat}</div><div style={{fontSize:10,color:th.sub}}>{t.cat} · {t.date}</div></div>
    <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
      <span style={{fontSize:13,fontWeight:700,color:t.tp==='exp'?'#dc2626':th.green}}>{t.tp==='exp'?'-':'+'}{won(t.amt)}</span>
      {onEdit&&<button onClick={()=>onEdit(t)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:th.sub,padding:'0 2px'}}>✏️</button>}
      {onDel&&<button onClick={()=>onDel(t.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:th.sub,padding:'0 2px'}}>×</button>}
    </div>
  </div>);
}

// ── 가계부 탭 ─────────────────────────────────────────────────
function LedgerTab({txns,delTx,updateTx,setModal,th,fx,fxOv,curSal,salOv,salMK,uSalOv,sal,iv,getIcon,cats,incCats}){
  const initVC=()=>{const c=getCurCycle();return{y:c.y,m:c.m};};
  const[vc,setVc]=useState(initVC);
  const[sel,setSel]=useState(TODAY);
  const[filter,setFilter]=useState('all');
  const cycle=getCycle(vc.y,vc.m);
  const cycSalMK=dkey(cycle.start).slice(0,7);
  const cycSal=salOv[cycSalMK]||sal;
  const prevC=()=>setVc(({y,m})=>({y:m===1?y-1:y,m:m===1?12:m-1}));
  const nextC=()=>setVc(({y,m})=>({y:m===12?y+1:y,m:m===12?1:m+1}));

  // ★ 이번 사이클 투자 항목 (월급일에 지출로 기록)
  const INV_ITEMS=[
    {name:'주식 투자',   amount:iv.stocks.monthly, icon:'📈', cat:'투자'},
    {name:'펀드 투자',   amount:iv.funds.monthly,  icon:'💼', cat:'투자'},
    {name:'청년도약계좌',amount:iv.youth.monthly,  icon:'🏦', cat:'투자'},
  ].filter(i=>i.amount>0);
  const ivTotal=INV_ITEMS.reduce((s,i)=>s+i.amount,0);

  const cells=[];
  for(let i=0;i<cycle.start.getDay();i++)cells.push(null);
  let cd=new Date(cycle.start);while(cd<=cycle.end){cells.push(new Date(cd));cd=new Date(cd);cd.setDate(cd.getDate()+1);}
  const dm={};
  txns.forEach(t=>{if(!dm[t.date])dm[t.date]={e:0,i:0};if(t.tp==='exp')dm[t.date].e+=t.amt;else dm[t.date].i+=t.amt;});
  cells.forEach(cellD=>{if(!cellD)return;const dk=dkey(cellD),cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fx.forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){if(!dm[dk])dm[dk]={e:0,i:0};dm[dk].e+=getFxOvAmt(f,mp,fxOv);}});});
  const salDk=dkey(cycle.start);
  if(!dm[salDk])dm[salDk]={e:0,i:0};
  dm[salDk].i+=cycSal;
  // ★ 투자금을 월급일 지출에 추가
  if(ivTotal>0)dm[salDk].e+=ivTotal;

  const cyTxns=txns.filter(t=>{const d=new Date(t.date);return d>=cycle.start&&d<=cycle.end;});
  let cyFxTotal=0,cyFxByCat={};
  cells.forEach(cellD=>{if(!cellD)return;const cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fx.forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){const a=getFxOvAmt(f,mp,fxOv);cyFxTotal+=a;cyFxByCat[f.cat]=(cyFxByCat[f.cat]||0)+a;}});});
  const cyTxExp=cyTxns.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const cyTxInc=cyTxns.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const cyTxByCat={};cyTxns.filter(t=>t.tp==='exp').forEach(t=>{cyTxByCat[t.cat]=(cyTxByCat[t.cat]||0)+t.amt;});
  // ★ 투자 통계 포함
  const allCyByCat={...cyFxByCat,...cyTxByCat};
  if(ivTotal>0)allCyByCat['투자']=(allCyByCat['투자']||0)+ivTotal;
  const cyTotalExp=cyTxExp+cyFxTotal+ivTotal;
  const cyTotalInc=cyTxInc+cycSal;

  const selTx=txns.filter(t=>t.date===sel).sort((a,b)=>a.id-b.id);
  const selD=new Date(sel),inCycle=selD>=cycle.start&&selD<=cycle.end;
  const selCm=selD.getMonth()+1,selCy=selD.getFullYear();
  const selMp=`${selCy}-${String(selCm).padStart(2,'0')}`,selDim=new Date(selCy,selCm,0).getDate();
  const selFx=inCycle?fx.filter(f=>getFxOvDay(f,selMp,selDim,fxOv)===selD.getDate()):[];
  const isSalDay=sel===salDk;
  const selTxExp=selTx.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const selTxInc=selTx.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const selFxTotal=selFx.reduce((s,f)=>s+getFxOvAmt(f,selMp,fxOv),0);
  const filteredTx=filter==='all'?selTx:selTx.filter(t=>t.tp===filter);
  const showFx=filter==='all'||filter==='exp',showSal=filter==='all'||filter==='inc';
  const showInv=isSalDay&&showFx;
  const hasAny=(showFx&&selFx.length>0)||showInv||(showSal&&isSalDay)||filteredTx.length>0;

  return(<div>
    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <button onClick={prevC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>‹</button>
        <div style={{textAlign:'center'}}><div style={{fontSize:14,fontWeight:700,color:th.text}}>{cycle.label}</div><div style={{fontSize:10,color:th.primary,fontWeight:600,marginTop:1}}>{cycle.range}</div></div>
        <button onClick={nextC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',margin:'8px 0 4px'}}>{['일','월','화','수','목','금','토'].map((d,i)=>(<div key={d} style={{textAlign:'center',fontSize:10,fontWeight:600,padding:'4px 0',color:i===0?'#ef4444':i===6?'#3b82f6':th.sub}}>{d}</div>))}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {cells.map((cellD,i)=>{
          if(!cellD)return <div key={`e${i}`}/>;
          const dk=dkey(cellD),isSel=sel===dk,isT=dk===TODAY,isH=isHol(cellD)||cellD.getDay()===0,isSat=cellD.getDay()===6,is2=cellD.getMonth()!==cycle.start.getMonth(),dd=dm[dk];
          const tc=isSel?'#fff':isT?th.primary:isH?'#ef4444':isSat?'#3b82f6':th.text;
          return(<div key={dk} onClick={()=>setSel(dk)} style={{cursor:'pointer',borderRadius:10,padding:'3px 1px',background:isSel?th.primary:is2?`${th.border}cc`:'transparent',textAlign:'center',minHeight:52}}>
            <div style={{fontSize:11,fontWeight:isT?800:500,color:tc}}>{cellD.getDate()}</div>
            {is2&&!isSel&&<div style={{fontSize:7,color:th.sub,opacity:.6}}>{cellD.getMonth()+1}월</div>}
            {dd?.e>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':'#dc2626',marginTop:1,lineHeight:1.2}}>-{cw(dd.e)}</div>}
            {dd?.i>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':th.green,lineHeight:1.2}}>+{cw(dd.i)}</div>}
          </div>);
        })}
      </div>
      <div style={{borderTop:`1px solid ${th.border}`,marginTop:10,paddingTop:10,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4}}>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>총 지출</div><div style={{fontSize:11,fontWeight:800,color:'#dc2626',marginTop:2}}>-{won(cyTotalExp)}</div><div style={{fontSize:8,color:th.sub}}>고정+투자 포함</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>총 수입</div><div style={{fontSize:11,fontWeight:800,color:th.green,marginTop:2}}>+{won(cyTotalInc)}</div><div style={{fontSize:8,color:th.sub}}>월급 포함</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>순 소비</div><div style={{fontSize:11,fontWeight:800,color:cyTotalExp-cyTotalInc>0?'#dc2626':th.green,marginTop:2}}>{won(Math.abs(cyTotalExp-cyTotalInc))}</div></div>
      </div>
    </div>

    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:th.text}}>📋 {sel} {isHol(selD)?'🎌':''}</div>
        <button onClick={()=>setModal({type:'txn',data:{date:sel}})} style={{background:th.primary,color:'#fff',border:'none',borderRadius:20,padding:'4px 12px',fontSize:11,cursor:'pointer',fontWeight:700}}>+ 추가</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:10}}>{[['all','전체'],['exp','💸 지출'],['inc','💰 수입']].map(([v,lb])=>(<button key={v} onClick={()=>setFilter(v)} style={{border:'none',borderRadius:20,padding:'4px 12px',fontSize:10,cursor:'pointer',fontWeight:600,background:filter===v?th.primary:th.border,color:filter===v?'#fff':th.sub}}>{lb}</button>))}</div>
      {/* 월급 */}
      {showSal&&isSalDay&&(<div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:`${th.green}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>💰</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>월급</span>{salOv[cycSalMK]&&<span style={{fontSize:9,color:'#ea580c',background:'#fff7ed',borderRadius:6,padding:'1px 5px',fontWeight:600}}>수정됨</span>}</div><div style={{fontSize:10,color:th.sub}}>{cycle.label} 급여일</div></div><span style={{fontSize:13,fontWeight:700,color:th.green}}>+{won(cycSal)}</span><button onClick={()=>setModal({type:'salOv',monthKey:cycSalMK,curVal:cycSal,defaultSal:sal})} style={{border:'none',background:th.border,borderRadius:8,padding:'3px 7px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>수정</button></div>)}
      {/* ★ 투자 출금 (월급일에만 표시) */}
      {showInv&&INV_ITEMS.map(inv=>(<div key={inv.name} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:`${th.primary}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{inv.icon}</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{inv.name}</span><span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>투자</span></div><div style={{fontSize:10,color:th.sub}}>월급일 자동 출금</div></div><span style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>-{won(inv.amount)}</span></div>))}
      {/* 고정지출 */}
      {showFx&&selFx.map(f=>{const effAmt=getFxOvAmt(f,selMp,fxOv),isOv=!!(fxOv[selMp]?.[f.id]);return(<div key={f.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>📌</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{f.name}</span><span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>고정</span>{isOv&&<span style={{fontSize:9,color:'#ea580c',background:'#fff7ed',borderRadius:6,padding:'1px 5px',fontWeight:600}}>수정됨</span>}</div><div style={{fontSize:10,color:th.sub}}>기본 {f.day}일</div></div><div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}><span style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>-{won(effAmt)}</span><button onClick={()=>setModal({type:'fxmonth',fxId:f.id,fxName:f.name,fxDefaultDay:f.day,fxDefaultAmt:f.amount,monthKey:selMp})} style={{border:'none',background:th.border,borderRadius:8,padding:'3px 7px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>편집</button></div></div>);})}
      {filteredTx.map(t=><TxRow key={t.id} t={t} onDel={delTx} onEdit={t=>setModal({type:'txn',editTx:t})} getIcon={getIcon} th={th}/>)}
      {!hasAny&&<div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'20px 0'}}>내역 없음 · 추가해 보세요 🌟</div>}
      {hasAny&&(<div style={{borderTop:`1px solid ${th.border}`,paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}>
        <span style={{color:'#dc2626'}}>지출 -{won(selTxExp+selFxTotal+(isSalDay&&showFx?ivTotal:0))}</span>
        <span style={{color:th.green}}>수입 +{won(selTxInc+(isSalDay&&showSal?cycSal:0))}</span>
      </div>)}
    </div>

// ── 모달 ──────────────────────────────────────────────────────
function Modals(props){
  const{modal,setModal,sal,uSal,salOv,uSalOv,txns,addTx,updateTx,delTx,fx,uFx,iv,uIv,wg,uWg,th,theme,uTheme,initAdj,uAdj,baseA,fxOv,uFxOv,cats,incCats}=props;
  const close=()=>setModal(null);
  const OV={position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'};
  const SH={background:th.card,borderRadius:'24px 24px 0 0',padding:'24px 20px',paddingBottom:`calc(24px + var(--sab))`,width:'100%',maxWidth:480,boxSizing:'border-box',maxHeight:'90vh',overflowY:'auto'};
  const I={width:'100%',border:`2px solid ${th.border}`,borderRadius:12,padding:'12px',fontSize:14,boxSizing:'border-box',outline:'none',fontFamily:'inherit',background:th.card,color:th.text};
  const p={OV,SH,I,close,th};
  if(modal.type==='sal')return <SalM {...p} sal={sal} uSal={uSal}/>;
  if(modal.type==='salOv')return <SalOvM {...p} monthKey={modal.monthKey} curVal={modal.curVal} defaultSal={modal.defaultSal} salOv={salOv} uSalOv={uSalOv}/>;
  if(modal.type==='txn')return <TxM {...p} addTx={addTx} updateTx={updateTx} delTx={delTx} editTx={modal.editTx} initDate={modal.data?.date} cats={cats} incCats={incCats}/>;
  if(modal.type==='fx')return <FxM {...p} fx={fx} uFx={uFx} item={modal.data}/>;
  if(modal.type==='iv')return <IvM {...p} iv={iv} uIv={uIv} ivKey={modal.key}/>;
  if(modal.type==='wg')return <WgM {...p} wg={wg} uWg={uWg}/>;
  if(modal.type==='theme')return <ThemeM {...p} theme={theme} uTheme={uTheme}/>;
  if(modal.type==='adj')return <AdjM {...p} baseA={baseA} initAdj={initAdj} uAdj={uAdj}/>;
  if(modal.type==='fxmonth')return <FxMonthM {...p} fxId={modal.fxId} fxName={modal.fxName} fxDefaultDay={modal.fxDefaultDay} fxDefaultAmt={modal.fxDefaultAmt} monthKey={modal.monthKey} fxOv={fxOv} uFxOv={uFxOv}/>;
  if(modal.type==='catEdit')return <CatEditM {...p} cat={modal.cat} onSave={modal.onSave}/>;
  return null;
}

function SalM({OV,SH,I,close,th,sal,uSal}){const[v,setV]=useState(sal);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>💰 기본 월급 수정</div><div style={{fontSize:11,color:th.sub,marginBottom:10}}>매달 기본으로 적용되는 월급이에요</div><input type="number" value={v} onChange={e=>setV(Number(e.target.value))} style={{...I,fontSize:18,marginBottom:14}}/><button onClick={()=>{if(v>0){uSal(v);close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}
function SalOvM({OV,SH,I,close,th,monthKey,curVal,defaultSal,salOv,uSalOv}){const[v,setV]=useState(curVal);const isOv=!!salOv[monthKey];const reset=()=>{const n={...salOv};delete n[monthKey];uSalOv(n);close();};return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>💰 이번 달 월급 수정</div><div style={{fontSize:11,color:th.sub,marginBottom:10}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경돼요. 기본: {won(defaultSal)}</div><input type="number" value={v} onChange={e=>setV(e.target.value)} style={{...I,fontSize:20,marginBottom:14}}/><button onClick={()=>{uSalOv({...salOv,[monthKey]:Number(v)});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>{isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}</div></div>);}

function TxM({OV,SH,I,close,th,addTx,updateTx,delTx,editTx,initDate,cats,incCats}){
  const isEdit=!!editTx;const[tp,setTp]=useState(editTx?.tp||'exp');const[amt,setAmt]=useState(editTx?.amt||'');const[cat,setCat]=useState(editTx?.cat||cats[0]?.name||'식비');const[memo,setMemo]=useState(editTx?.memo||'');const[date,setDate]=useState(editTx?.date||initDate||TODAY);
  const iCats=tp==='exp'?cats:incCats;
  const save=()=>{if(!amt||Number(amt)<=0)return;const t={...(editTx||{}),id:editTx?.id||Date.now(),date,tp,amt:Number(amt),cat,memo};isEdit?updateTx(t):addTx(t);close();};
  // ★ 저금통/파킹통장 안내
  const acctTip=ACCT_CATS[cat];
  const tipMsg=acctTip==='savings_jar'?'🐷 지출로 입력하면 저금통에 저장돼요. 수입으로 입력하면 저금통에서 인출돼요.':acctTip==='parking'?'💳 지출→파킹통장으로 이동 / 수입→파킹통장에서 인출':null;
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{isEdit?'✏️ 내역 수정':'📝 내역 추가'}</div>{isEdit&&<button onClick={()=>{delTx(editTx.id);close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}</div>
    <div style={{display:'flex',gap:8,marginBottom:12}}>{[['exp','💸 지출'],['inc','💰 수입']].map(([v,lb])=>(<button key={v} onClick={()=>{setTp(v);if(!isEdit)setCat((v==='exp'?cats:incCats)[0]?.name||'기타');}} style={{flex:1,border:'none',borderRadius:12,padding:'10px',fontSize:12,fontWeight:700,cursor:'pointer',background:tp===v?th.primary:th.border,color:tp===v?'#fff':th.sub}}>{lb}</button>))}</div>
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...I,marginBottom:10}}/>
    <input type="number" placeholder="금액 (원)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...I,fontSize:18,marginBottom:10}}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10}}>{iCats.map(c=>(<button key={c.id} onClick={()=>setCat(c.name)} style={{border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:cat===c.name?th.primary:th.border,color:cat===c.name?'#fff':th.primary,fontWeight:600}}>{c.icon} {c.name}</button>))}</div>
    {tipMsg&&<div style={{fontSize:10,color:th.primary,background:th.border,borderRadius:8,padding:'6px 10px',marginBottom:10}}>{tipMsg}</div>}
    <input type="text" placeholder="메모 (선택)" value={memo} onChange={e=>setMemo(e.target.value)} style={{...I,marginBottom:14}}/>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{isEdit?'수정 저장':'추가하기'}</button>
  </div></div>);
}

function CatEditM({OV,SH,I,close,th,cat,onSave}){const[name,setName]=useState(cat?.name||'');const[icon,setIcon]=useState(cat?.icon||'📦');const save=()=>{if(!name.trim())return;onSave({name:name.trim(),icon:icon.trim()||'📦'});close();};return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:16,color:th.text}}>{cat?'✏️ 카테고리 수정':'➕ 카테고리 추가'}</div><div style={{display:'flex',gap:10,marginBottom:10}}><div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>아이콘</div><input value={icon} onChange={e=>setIcon(e.target.value)} style={{...I,fontSize:26,textAlign:'center'}} placeholder="🍚"/></div><div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>이름</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="카테고리명" style={I}/></div></div><div style={{...I,marginBottom:14,fontSize:11,color:th.sub,background:th.border,border:'none',lineHeight:2}}>💡 이모지: 🍚☕🛍️🚇📱🏠🎬💊💳🐷📦💰💸✈️🎮💄🐕🎵📚🏋️</div><button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{cat?'저장':'추가'}</button></div></div>);}
function FxM({OV,SH,I,close,th,fx,uFx,item}){const[name,setName]=useState(item?.name||'');const[amt,setAmt]=useState(item?.amount||'');const[day,setDay]=useState(item?.day||1);const[cat,setCat]=useState(item?.cat||'생활비');const FXCATS=['구독','주거','보험','통신','교통','저축','생활비','기타'];const save=()=>{if(!name||!amt||Number(amt)<=0)return;uFx(item?fx.map(f=>f.id===item.id?{...f,name,amount:Number(amt),day:Number(day),cat}:f):[...fx,{id:Date.now(),name,amount:Number(amt),day:Number(day),cat}]);close();};return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>{item?'✏️ 고정지출 수정':'➕ 고정지출 추가'}</div><input placeholder="항목명" value={name} onChange={e=>setName(e.target.value)} style={{...I,marginBottom:10}}/><input type="number" placeholder="금액 (원)" value={amt} onChange={e=>setAmt(e.target.value)} style={{...I,fontSize:18,marginBottom:10}}/><div style={{display:'flex',gap:10,marginBottom:14}}><div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>기본 지출일</div><input type="number" min="1" max="31" value={day} onChange={e=>setDay(e.target.value)} style={I}/></div><div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>카테고리</div><select value={cat} onChange={e=>setCat(e.target.value)} style={{...I}}>{FXCATS.map(c=><option key={c}>{c}</option>)}</select></div></div><button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}
function FxMonthM({OV,SH,I,close,th,fxId,fxName,fxDefaultDay,fxDefaultAmt,monthKey,fxOv,uFxOv}){const ov=fxOv[monthKey]?.[fxId];const[d,setD]=useState(typeof ov==='number'?ov:(ov?.day??fxDefaultDay));const[a,setA]=useState(typeof ov==='number'?fxDefaultAmt:(ov?.amount??fxDefaultAmt));const isOv=!!ov;const save=()=>{uFxOv({...fxOv,[monthKey]:{...(fxOv[monthKey]||{}),[fxId]:{day:Number(d),amount:Number(a)}}});close();};const reset=()=>{const n={...fxOv};if(n[monthKey]){delete n[monthKey][fxId];if(!Object.keys(n[monthKey]).length)delete n[monthKey];}uFxOv(n);close();};return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>📌 {fxName} 이번 달 수정</div><div style={{fontSize:12,color:th.sub,marginBottom:14,lineHeight:1.6}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경돼요.<br/>기본: {fxDefaultDay}일 / {won(fxDefaultAmt)}</div><div style={{display:'flex',gap:10,marginBottom:14}}><div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>출금일</div><input type="number" min="1" max="31" value={d} onChange={e=>setD(e.target.value)} style={{...I,fontSize:20,textAlign:'center'}}/></div><div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>금액</div><input type="number" value={a} onChange={e=>setA(e.target.value)} style={{...I,fontSize:16}}/></div></div><button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>{isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}</div></div>);}
function IvM({OV,SH,I,close,th,iv,uIv,ivKey}){const item=iv[ivKey]||{name:ivKey,current:0,monthly:0};const[cur,setCur]=useState(item.current);const[mo,setMo]=useState(item.monthly);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>✏️ {item.name} 수정</div><div style={{fontSize:11,color:th.sub,marginBottom:4}}>현재 잔액</div><input type="number" value={cur} onChange={e=>setCur(e.target.value)} style={{...I,fontSize:18,marginBottom:10}}/>{item.monthly>0&&<><div style={{fontSize:11,color:th.sub,marginBottom:4}}>월 납입액</div><input type="number" value={mo} onChange={e=>setMo(e.target.value)} style={{...I,fontSize:18,marginBottom:10}}/></>}<button onClick={()=>{uIv({...iv,[ivKey]:{...item,current:Number(cur),monthly:Number(mo)}});close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginTop:4}}>저장</button></div></div>);}
function WgM({OV,SH,I,close,th,wg,uWg}){const[t,setT]=useState(wg.target);const[y,setY]=useState(wg.year);const[m,setM]=useState(wg.month||12);const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>💍 결혼 자금 목표 수정</div><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 금액</div><input type="number" value={t} onChange={e=>setT(e.target.value)} style={{...I,fontSize:18,marginBottom:10}}/><div style={{display:'flex',gap:10,marginBottom:14}}><div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 연도</div><input type="number" value={y} min={2025} max={2040} onChange={e=>setY(e.target.value)} style={I}/></div><div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 월</div><select value={m} onChange={e=>setM(Number(e.target.value))} style={{...I,padding:'12px 6px'}}>{MO.map((lb,i)=><option key={i+1} value={i+1}>{lb}</option>)}</select></div></div><div style={{fontSize:12,color:th.primary,background:th.border,borderRadius:10,padding:'8px 12px',marginBottom:14}}>목표: {y}년 {m}월까지 {won(Number(t))} 모으기</div><button onClick={()=>{if(t>0&&y>2024){uWg({target:Number(t),year:Number(y),month:Number(m)});close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}
function AdjM({OV,SH,I,close,th,baseA,initAdj,uAdj}){const[v,setV]=useState(baseA-initAdj);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>💰 이번 달 잔액 설정</div><div style={{fontSize:12,color:th.sub,marginBottom:14,lineHeight:1.6}}>기본 가용 금액은 <b style={{color:th.primary}}>{won(baseA)}</b>예요.</div><input type="number" value={v} onChange={e=>setV(e.target.value)} style={{...I,fontSize:20,marginBottom:6}}/><div style={{fontSize:11,color:th.sub,marginBottom:16}}>→ 이미 쓴 금액 <b style={{color:'#dc2626'}}>{won(Math.max(0,baseA-Number(v)))}</b> 반영</div><button onClick={()=>{uAdj(Math.max(0,baseA-Number(v)));close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>적용하기</button></div></div>);}
function ThemeM({OV,SH,close,th,theme,uTheme}){const groups=[['기본 테마',Object.values(THEMES).slice(0,10)],['🎨 패턴 테마',Object.values(THEMES).slice(10)]];return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>🎨 테마 선택 (15가지)</div>{groups.map(([gname,list])=>(<div key={gname} style={{marginBottom:14}}><div style={{fontSize:11,color:th.sub,fontWeight:600,marginBottom:8}}>{gname}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>{list.map(t=>(<button key={t.id} onClick={()=>{uTheme(t.id);close();}} style={{border:`3px solid ${theme===t.id?t.primary:'transparent'}`,borderRadius:14,padding:'10px',cursor:'pointer',background:t.bg,backgroundImage:t.pat||'none',backgroundSize:t.patSz||'auto',textAlign:'center'}}><div style={{background:t.grad,borderRadius:8,height:26,marginBottom:6}}/><div style={{fontSize:11,fontWeight:700,color:t.text}}>{t.name}</div>{theme===t.id&&<div style={{fontSize:9,color:t.primary,marginTop:2,fontWeight:600}}>✓ 현재</div>}</button>))}</div></div>))}</div></div>);}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
