const dkey=d=>{const dt=d instanceof Date?d:new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};
const mkey=d=>{const dt=d instanceof Date?d:new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;};
const TODAY=dkey(new Date()),TDN=new Date().getDate(),MTODAY=mkey(new Date());

function getNextMonth(mk){const[y,m]=mk.split('-').map(Number);return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
function getPrevMonth(mk){const[y,m]=mk.split('-').map(Number);return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;}

const KR_HOL=new Set(['2025-01-01','2025-01-28','2025-01-29','2025-01-30','2025-03-01','2025-03-03','2025-05-05','2025-05-06','2025-06-06','2025-08-15','2025-10-03','2025-10-05','2025-10-06','2025-10-07','2025-10-08','2025-10-09','2025-12-25','2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-03-01','2026-03-02','2026-05-05','2026-05-25','2026-06-06','2026-08-15','2026-08-17','2026-09-24','2026-09-25','2026-09-26','2026-09-28','2026-10-03','2026-10-05','2026-10-09','2026-12-25','2027-01-01','2027-02-06','2027-02-07','2027-02-08','2027-02-09','2027-03-01','2027-05-05','2027-05-13','2027-06-06','2027-06-07','2027-08-15','2027-08-16','2027-10-03','2027-10-04','2027-10-09','2027-10-11','2027-10-13','2027-10-14','2027-10-15','2027-12-25','2027-12-27']);
const isHol=d=>KR_HOL.has(dkey(d));
const isNW=d=>{const w=d.getDay();return w===0||w===6||isHol(d);};
function getSalDay(y,m){const d=new Date(y,m-1,21);while(isNW(d))d.setDate(d.getDate()-1);return d;}
function getCycle(y,m){const start=getSalDay(y,m);const nm=m===12?1:m+1,ny=m===12?y+1:y,ns=getSalDay(ny,nm);const end=new Date(ns);end.setDate(end.getDate()-1);const f=d=>`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;const dm=m===12?1:m+1,dy=m===12?y+1:y;return{start,end,y,m,label:`${dy}년 ${dm}월`,range:`${f(start)} ~ ${f(end)}`};}
function getCurCycle(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,sd=getSalDay(y,m);return n>=sd?getCycle(y,m):getCycle(m===1?y-1:y,m===1?12:m-1);}

// ── fx 이력 기반 헬퍼 ─────────────────────────────────────────
// fx.valueHistory = [{validFrom:'YYYY-MM', amount:X, day:Y}] (ASC 정렬)
// fx.deletedFrom = null | 'YYYY-MM' (해당 월부터 삭제)
function getFxForMonth(f,mk){
  if(f.deletedFrom&&mk>=f.deletedFrom)return null;
  const hist=(f.valueHistory||[]).slice().sort((a,b)=>a.validFrom.localeCompare(b.validFrom));
  let result=null;
  for(const h of hist){if(h.validFrom<=mk)result=h;else break;}
  return result||{amount:f.amount,day:f.day};
}
// fxOv 위에 올라타는 최종값
const getFxOvDay=(f,mp,dim,ov,base)=>{const o=ov[mp]?.[f.id];if(!o)return Math.min(base?.day??f.day,dim);if(typeof o==='number')return Math.min(o,dim);return Math.min(o.day??(base?.day??f.day),dim);};
const getFxOvAmt=(f,mp,ov,base)=>{const o=ov[mp]?.[f.id];if(!o)return base?.amount??f.amount;if(typeof o==='number')return base?.amount??f.amount;return o.amount??(base?.amount??f.amount);};

  cherry_dot:{id:'cherry_dot',name:'🌸 벚꽃',primary:'#f472b6',light:'#fbcfe8',bg:'#fff8fc',card:'#fffdfe',grad:'linear-gradient(135deg,#db2777,#f9a8d4)',text:'#374151',sub:'#9ca3af',border:'#fce7f3',green:'#059669',pat:'radial-gradient(circle,#f472b628 2px,transparent 2px)',patSz:'22px 22px'},
  star:    {id:'star',   name:'⭐ 별빛',   primary:'#f59e0b',light:'#fde68a',bg:'#fffef7',card:'#fffffe',grad:'linear-gradient(135deg,#b45309,#fbbf24)',text:'#374151',sub:'#9ca3af',border:'#fef3c7',green:'#059669',pat:'radial-gradient(circle,#fbbf2435 1.5px,transparent 1.5px)',patSz:'22px 22px'},
  candy:   {id:'candy',  name:'🍭 캔디',   primary:'#ec4899',light:'#f9a8d4',bg:'#fff7fb',card:'#fffdfe',grad:'linear-gradient(135deg,#be185d,#f472b6)',text:'#374151',sub:'#9ca3af',border:'#fce7f3',green:'#059669',pat:'repeating-linear-gradient(45deg,#ec489918 0,#ec489918 3px,transparent 3px,transparent 18px)',patSz:'auto'},
  bubble:  {id:'bubble', name:'🫧 버블',   primary:'#06b6d4',light:'#67e8f9',bg:'#f5feff',card:'#fdfeff',grad:'linear-gradient(135deg,#0e7490,#22d3ee)',text:'#374151',sub:'#9ca3af',border:'#cffafe',green:'#7c3aed',pat:'radial-gradient(circle,#06b6d432 3px,transparent 3px)',patSz:'32px 32px'},
  forest_grid:{id:'forest_grid',name:'🌿 숲속',primary:'#15803d',light:'#86efac',bg:'#f6fff9',card:'#fdfffe',grad:'linear-gradient(135deg,#14532d,#22c55e)',text:'#374151',sub:'#9ca3af',border:'#dcfce7',green:'#2563eb',pat:'linear-gradient(#15803d15 1px,transparent 1px),linear-gradient(90deg,#15803d10 1px,transparent 1px)',patSz:'24px 24px'},
};

// valueHistory 포함 초기 데이터
const mkFx=f=>({...f,valueHistory:[{validFrom:'2000-01',amount:f.amount,day:f.day}],deletedFrom:null});
const FX0=[{id:1,name:"유튜브",amount:14900,day:16,cat:"구독"},{id:2,name:"티빙",amount:5500,day:24,cat:"구독"},{id:3,name:"넷플릭스",amount:7000,day:12,cat:"구독"},{id:4,name:"월세",amount:170000,day:25,cat:"주거"},{id:5,name:"태우 여행통장",amount:100000,day:25,cat:"저축"},{id:6,name:"보험료",amount:174702,day:6,cat:"보험"},{id:7,name:"통신비",amount:13020,day:23,cat:"통신"},{id:8,name:"인터넷비",amount:23100,day:15,cat:"통신"},{id:9,name:"쿠팡",amount:7890,day:4,cat:"구독"},{id:10,name:"교통비",amount:75000,day:10,cat:"교통"},{id:11,name:"관리비",amount:200000,day:25,cat:"주거"}].map(mkFx);
const IV0={pension:{name:"개인연금",monthly:500000,current:7744856},youth:{name:"청년도약계좌",monthly:700000,current:7000000},funds:{name:"펀드",monthly:350000,current:5711062},stocks:{name:"주식",monthly:1000000,current:18283826},parking:{name:"파킹통장",monthly:0,current:1667322},savings_jar:{name:"저금통",monthly:0,current:0}};
const CATS_I=[{id:1,name:'식비',icon:'🍚'},{id:2,name:'카페',icon:'☕'},{id:3,name:'쇼핑',icon:'🛍️'},{id:4,name:'교통',icon:'🚇'},{id:5,name:'구독',icon:'📱'},{id:6,name:'생활비',icon:'🏠'},{id:7,name:'문화',icon:'🎬'},{id:8,name:'의료',icon:'💊'},{id:9,name:'파킹통장',icon:'💳'},{id:10,name:'저금통',icon:'🐷'},{id:11,name:'기타',icon:'📦'}];
const INC_I=[{id:101,name:'월급',icon:'💰'},{id:102,name:'이체',icon:'💸'},{id:103,name:'용돈',icon:'💵'},{id:104,name:'파킹통장',icon:'💳'},{id:105,name:'저금통',icon:'🐷'},{id:106,name:'기타',icon:'📦'}];
const FX_CATS_I=[{name:'구독',icon:'📱'},{name:'주거',icon:'🏠'},{name:'보험',icon:'🛡️'},{name:'통신',icon:'📡'},{name:'교통',icon:'🚌'},{name:'저축',icon:'🏦'},{name:'생활비',icon:'🛒'},{name:'기타',icon:'📦'}];
const CC=['#a78bfa','#f9a8d4','#86efac','#7dd3fc','#fde68a','#fca5a5','#6ee7b7','#fbbf24','#c4b5fd','#94a3b8'];
const ACCT_CATS={'파킹통장':'parking','저금통':'savings_jar'};
const STATS_EXCL=new Set(['투자','저금통']);

function Cd(th,x={}){return{background:th.card,borderRadius:16,padding:'14px',boxShadow:'0 2px 10px rgba(0,0,0,0.06)',marginBottom:10,...x};}
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const lv=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}};
const applyAcct=(t,sign,base)=>{const k=ACCT_CATS[t.cat];if(!k||!base[k])return base;const d=sign*(t.tp==='exp'?t.amt:-t.amt);return{...base,[k]:{...base[k],current:base[k].current+d}};};

function NumInp({label,val,onChange,unit,th}){
  return(<div style={{marginBottom:10}}><div style={{fontSize:12,color:th.sub,marginBottom:4}}>{label}</div><div style={{display:'flex',alignItems:'center',gap:8}}><input type="number" value={val} min={0} onChange={e=>{e.stopPropagation();onChange(Number(e.target.value));}} onClick={e=>e.stopPropagation()} style={{flex:1,border:`2px solid ${th.border}`,borderRadius:12,padding:'10px 12px',outline:'none',background:th.card,color:th.text,width:'100%'}}/>{unit&&<span style={{fontSize:13,color:th.sub,flexShrink:0}}>{unit}</span>}</div></div>);
}

// ── App ──────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState(0);
  const[appName,setAppName]=useState('내집마련');
  const[sal,setSal]=useState(3600000);
  const[salOv,setSalOv]=useState({});
  const[fx,setFx]=useState(FX0);
  const[iv,setIv]=useState(IV0);
  const[txns,setTxns]=useState([]);
  const[wg,setWg]=useState({target:150000000,year:2029,month:12,name:'결혼 자금'});
  const[theme,setTheme]=useState('lavender');
  const[initAdj,setInitAdj]=useState(0);
  const[fxOv,setFxOv]=useState({});
  const[cats,setCats]=useState(CATS_I);
  const[incCats,setIncCats]=useState(INC_I);
  const[fxCats,setFxCats]=useState(FX_CATS_I);
  const[simData,setSimData]=useState({sal:3600000,salRate:30,bonus:0,bonusRate:50});
  const[rdy,setRdy]=useState(false);
  const[modal,setModal]=useState(null);
  const[noti,setNoti]=useState(null);
  const[aiText,setAiText]=useState('');
  const[aiLoad,setAiLoad]=useState(false);

  useEffect(()=>{
    [['hj9-appName',setAppName],['hj9-sal',setSal],['hj9-salOv',setSalOv],
     ['hj9-tx',setTxns],['hj9-wg',setWg],['hj9-theme',setTheme],
     ['hj9-adj',setInitAdj],['hj9-fxov',setFxOv],['hj9-cats',setCats],
     ['hj9-incCats',setIncCats],['hj9-fxCats',setFxCats],['hj9-simData',setSimData]
    ].forEach(([k,fn])=>{const v=lv(k);if(v)fn(v);});
    // fx 로드 + valueHistory 없는 항목 마이그레이션
    const sf=lv('hj9-fx');
    if(sf)setFx(sf.map(f=>({...f,valueHistory:f.valueHistory||[{validFrom:'2000-01',amount:f.amount,day:f.day}],deletedFrom:f.deletedFrom||null})));
    const si=lv('hj9-iv');if(si)setIv({...IV0,...si});
    if([10,20,30].includes(TDN)){const ln=lv('hj9-lastnoti');if(!ln||ln!==TODAY){setNoti('📊 오늘은 투자 내역 업데이트 날이에요!');sv('hj9-lastnoti',TODAY);}}
    setRdy(true);
  },[]);

  const us=(k,fn)=>v=>{fn(v);sv(k,v);};
  const uAppName=us('hj9-appName',setAppName),uSal=us('hj9-sal',setSal),uSalOv=us('hj9-salOv',setSalOv);
  const uIv=v=>{setIv(v);sv('hj9-iv',v);};
  const uFx=v=>{setFx(v);sv('hj9-fx',v);};
  const uWg=us('hj9-wg',setWg),uAdj=us('hj9-adj',setInitAdj),uTheme=us('hj9-theme',setTheme);
  const uFxOv=us('hj9-fxov',setFxOv),uCats=us('hj9-cats',setCats),uIncCats=us('hj9-incCats',setIncCats);
  const uFxCats=us('hj9-fxCats',setFxCats),uSimData=us('hj9-simData',setSimData);

  const addTx=t=>{const n=[...txns,t];setTxns(n);sv('hj9-tx',n);uIv(applyAcct(t,1,iv));};
  const delTx=id=>{const t=txns.find(x=>x.id===id);const n=txns.filter(x=>x.id!==id);setTxns(n);sv('hj9-tx',n);if(t)uIv(applyAcct(t,-1,iv));};
  const updateTx=t=>{const old=txns.find(x=>x.id===t.id);let ni=iv;if(old)ni=applyAcct(old,-1,ni);ni=applyAcct(t,1,ni);const n=txns.map(x=>x.id===t.id?t:x);setTxns(n);sv('hj9-tx',n);uIv(ni);};
  const getIcon=name=>[...cats,...incCats].find(c=>c.name===name)?.icon||'📦';
  const getFxCatIcon=name=>fxCats.find(c=>c.name===name)?.icon||'📌';

  const th=THEMES[theme]||THEMES.lavender;
  const pr=getCurCycle();
  const salMK=mkey(pr.start);
  const curSal=salOv[salMK]||sal;

  // ★ fxSum: 현재 사이클 월 기준 이력 반영
  const activeFx=fx.filter(f=>!f.deletedFrom||salMK<f.deletedFrom);
  const fxSum=activeFx.reduce((s,f)=>{const v=getFxForMonth(f,salMK);return v?s+v.amount:s;},0);
  const ivDed=iv.youth.monthly+iv.funds.monthly+iv.stocks.monthly;
  const baseA=curSal-fxSum-ivDed;
  const pTx=txns.filter(t=>{const d=new Date(t.date);return d>=pr.start&&d<=pr.end;});
  const spnt=pTx.filter(t=>t.tp==='exp'&&(!t.payType||t.payType==='cash')).reduce((s,t)=>s+t.amt,0);
  const incd=pTx.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const creditPending=pTx.filter(t=>t.tp==='exp'&&t.payType==='credit').reduce((s,t)=>s+t.amt,0);
  const avail=baseA-initAdj-spnt+incd;
  const spPct=Math.min(100,baseA>0?((initAdj+spnt-incd)/baseA)*100:0);
  const wFund=iv.stocks.current+iv.funds.current+iv.youth.current;
  const tAss=wFund+iv.pension.current+iv.parking.current+(iv.savings_jar?.current||0);
  const now=new Date(),dLeft=Math.max(1,Math.ceil((pr.end-now)/86400000));
  const dayB=Math.floor(avail/dLeft);
  const wgMonth=wg.month||12;
  const mLeft=Math.max(1,(wg.year-now.getFullYear())*12+(wgMonth-(now.getMonth()+1)));
  const needMo=Math.max(0,Math.ceil((wg.target-wFund)/mLeft));
  const saveGap=needMo-ivDed;
  const billingLabel=`${nextBillingDate().getMonth()+1}월 ${CREDIT_DAY}일`;

  if(!rdy)return(<div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',background:'#faf5ff',flexDirection:'column',gap:12}}><div style={{fontSize:60}}>🌸</div><div style={{color:'#7c3aed',fontSize:15,fontWeight:700}}>불러오는 중...</div></div>);

  const ctx={appName,uAppName,sal,curSal,salOv,salMK,uSal,uSalOv,fx,activeFx,iv,txns,pr,pTx,fxSum,ivDed,baseA,avail,spnt,incd,spPct,creditPending,billingLabel,wFund,tAss,wg,dLeft,dayB,needMo,saveGap,mLeft,uFx,uIv,uWg,uAdj,addTx,delTx,updateTx,initAdj,fxOv,uFxOv,cats,incCats,uCats,uIncCats,fxCats,uFxCats,getFxCatIcon,simData,uSimData,getIcon,modal,setModal,aiText,setAiText,aiLoad,setAiLoad,th,theme,uTheme};
  const TABS=[['🏠','홈'],['📅','가계부'],['📌','고정'],['📈','자산'],['🤖','AI'],['⚙️','설정']];

  return(

// ── 가계부 ─────────────────────────────────────────────────────
function LedgerTab({txns,delTx,updateTx,setModal,th,fx,fxOv,curSal,salOv,salMK,uSalOv,sal,iv,getIcon,cats,incCats}){
  const initVC=()=>{const c=getCurCycle();return{y:c.y,m:c.m};};
  const[vc,setVc]=useState(initVC);
  const[sel,setSel]=useState(TODAY);
  const[txFilter,setTxFilter]=useState('all');
  const[statsFx,setStatsFx]=useState(true);
  const cycle=getCycle(vc.y,vc.m);
  const cycMK=mkey(cycle.start);
  const cycSal=salOv[cycMK]||sal;
  const prevC=()=>setVc(({y,m})=>({y:m===1?y-1:y,m:m===1?12:m-1}));
  const nextC=()=>setVc(({y,m})=>({y:m===12?y+1:y,m:m===12?1:m+1}));

  // ★ 사이클 기준 활성 fx (이력 반영)
  const cyActiveFx=fx.filter(f=>!f.deletedFrom||cycMK<f.deletedFrom);

  const INV=[{name:'주식 투자',amount:iv.stocks.monthly,icon:'📈'},{name:'펀드 투자',amount:iv.funds.monthly,icon:'💼'},{name:'청년도약계좌',amount:iv.youth.monthly,icon:'🏦'}].filter(i=>i.amount>0);
  const ivTotal=INV.reduce((s,i)=>s+i.amount,0);

  const cells=[];
  for(let i=0;i<cycle.start.getDay();i++)cells.push(null);
  let cd=new Date(cycle.start);while(cd<=cycle.end){cells.push(new Date(cd));cd=new Date(cd);cd.setDate(cd.getDate()+1);}

  const dm={};
  txns.forEach(t=>{if(!dm[t.date])dm[t.date]={e:0,i:0};if(t.tp==='exp')dm[t.date].e+=t.amt;else dm[t.date].i+=t.amt;});
  cells.forEach(cellD=>{if(!cellD)return;const dk=dkey(cellD),cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();
    cyActiveFx.forEach(f=>{
      const base=getFxForMonth(f,mp);
      if(!base)return;
      const ed=getFxOvDay(f,mp,dim,fxOv,base);
      if(ed===cellD.getDate()){if(!dm[dk])dm[dk]={e:0,i:0};dm[dk].e+=getFxOvAmt(f,mp,fxOv,base);}
    });
  });
  const salDk=dkey(cycle.start);
  if(!dm[salDk])dm[salDk]={e:0,i:0};dm[salDk].i+=cycSal;
  if(ivTotal>0)dm[salDk].e=(dm[salDk].e||0)+ivTotal;

  const cyTxns=txns.filter(t=>{const d=new Date(t.date);return d>=cycle.start&&d<=cycle.end;});
  let cyFxTotal=0,cyFxByCat={};
  cells.forEach(cellD=>{if(!cellD)return;const cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();
    cyActiveFx.forEach(f=>{
      const base=getFxForMonth(f,mp);if(!base)return;
      const ed=getFxOvDay(f,mp,dim,fxOv,base);
      if(ed===cellD.getDate()){const a=getFxOvAmt(f,mp,fxOv,base);cyFxTotal+=a;cyFxByCat[f.cat]=(cyFxByCat[f.cat]||0)+a;}
    });
  });
  const cyTxExp=cyTxns.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const cyTxInc=cyTxns.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const cyTotalExp=cyTxExp+cyFxTotal+ivTotal,cyTotalInc=cyTxInc+cycSal;

  const statsTxByCat={};cyTxns.filter(t=>t.tp==='exp'&&!STATS_EXCL.has(t.cat)).forEach(t=>{statsTxByCat[t.cat]=(statsTxByCat[t.cat]||0)+t.amt;});
  const statsMap=statsFx?{...cyFxByCat,...statsTxByCat}:{...statsTxByCat};
  const statsTotal=Object.values(statsMap).reduce((s,v)=>s+v,0);

  const selTx=txns.filter(t=>t.date===sel).sort((a,b)=>a.id-b.id);
  const selD=new Date(sel),inCycle=selD>=cycle.start&&selD<=cycle.end;
  const selCm=selD.getMonth()+1,selCy=selD.getFullYear();
  const selMp=`${selCy}-${String(selCm).padStart(2,'0')}`,selDim=new Date(selCy,selCm,0).getDate();
  const selFx=inCycle?cyActiveFx.filter(f=>{const base=getFxForMonth(f,selMp);return base&&getFxOvDay(f,selMp,selDim,fxOv,base)===selD.getDate();}):[];
  const isSalDay=sel===salDk;
  const selTxExp=selTx.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const selTxInc=selTx.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const selFxTotal=selFx.reduce((s,f)=>{const base=getFxForMonth(f,selMp);return base?s+getFxOvAmt(f,selMp,fxOv,base):s;},0);
  const filteredTx=txFilter==='all'?selTx:selTx.filter(t=>t.tp===txFilter);
  const showFx=txFilter==='all'||txFilter==='exp',showSal=txFilter==='all'||txFilter==='inc',showInv=isSalDay&&showFx;
  const hasAny=(showFx&&selFx.length>0)||showInv||(showSal&&isSalDay)||filteredTx.length>0;

  return(<div>
    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <button onClick={prevC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>‹</button>
        <div style={{textAlign:'center'}}><div style={{fontSize:14,fontWeight:700,color:th.text}}>{cycle.label}</div><div style={{fontSize:10,color:th.primary,fontWeight:600,marginTop:1}}>{cycle.range}</div></div>
        <button onClick={nextC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',margin:'8px 0 4px'}}>{['일','월','화','수','목','금','토'].map((d,i)=>(<div key={d} style={{textAlign:'center',fontSize:10,fontWeight:600,padding:'4px 0',color:i===0?'#ef4444':i===6?'#3b82f6':th.sub}}>{d}</div>))}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {cells.map((cellD,i)=>{
          if(!cellD)return <div key={`e${i}`}/>;
          const dk=dkey(cellD),isSel=sel===dk,isT=dk===TODAY,isH=isHol(cellD)||cellD.getDay()===0,isSat=cellD.getDay()===6,is2=cellD.getMonth()!==cycle.start.getMonth(),dd=dm[dk];
          const tc=isSel?'#fff':isT?th.primary:isH?'#ef4444':isSat?'#3b82f6':th.text;
          return(<div key={dk} onClick={()=>setSel(dk)} style={{cursor:'pointer',borderRadius:10,padding:'3px 1px',background:isSel?th.primary:is2?`${th.border}cc`:'transparent',textAlign:'center',minHeight:52}}>
            <div style={{fontSize:11,fontWeight:isT?800:500,color:tc}}>{cellD.getDate()}</div>
            {is2&&!isSel&&<div style={{fontSize:7,color:th.sub,opacity:.6}}>{cellD.getMonth()+1}월</div>}
            {dd?.e>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':'#dc2626',lineHeight:1.2}}>-{cw(dd.e)}</div>}
            {dd?.i>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':th.green,lineHeight:1.2}}>+{cw(dd.i)}</div>}
          </div>);
        })}
      </div>
      <div style={{borderTop:`1px solid ${th.border}`,marginTop:10,paddingTop:10,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4}}>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>총 수입</div><div style={{fontSize:11,fontWeight:800,color:th.green,marginTop:2}}>+{won(cyTotalInc)}</div><div style={{fontSize:8,color:th.sub}}>월급 포함</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>총 지출</div><div style={{fontSize:11,fontWeight:800,color:'#dc2626',marginTop:2}}>-{won(cyTotalExp)}</div><div style={{fontSize:8,color:th.sub}}>고정+투자 포함</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>순 소비</div><div style={{fontSize:11,fontWeight:800,color:cyTotalExp-cyTotalInc>0?'#dc2626':th.green,marginTop:2}}>{won(Math.abs(cyTotalExp-cyTotalInc))}</div></div>
      </div>
    </div>

    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:th.text}}>📋 {sel} {isHol(selD)?'🎌':''}</div>
        <button onClick={()=>setModal({type:'txn',data:{date:sel}})} style={{background:th.primary,color:'#fff',border:'none',borderRadius:20,padding:'4px 12px',fontSize:11,cursor:'pointer',fontWeight:700}}>+ 추가</button>
