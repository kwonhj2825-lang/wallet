// 연도별 fetch (중복 방지), 주말→다음 평일 대체 로직 포함
async function fetchHolidaysForYear(year){
  if(loadedYears.has(year))return;
  loadedYears.add(year);
  try{
    const res=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
    if(!res.ok)throw new Error('api fail');
    const data=await res.json();
    data.forEach(h=>{
      if(h.date)KR_HOL.add(h.date);
      // 주말에 떨어진 공휴일은 다음 평일을 대체공휴일로 추가 (근사치)
      const d=new Date(h.date);
      if(d.getDay()===0){ // 일요일 → 월요일
        const nd=new Date(d);nd.setDate(nd.getDate()+1);
        KR_HOL.add(dkey(nd));
      }
      // 토요일 대체는 공휴일 종류에 따라 다름(설·추석·어린이날만)
      const needSatSub=/Seol|Chuseok|Children|설날|추석|어린이/i.test((h.localName||'')+(h.name||''));
      if(d.getDay()===6&&needSatSub){
        const nd=new Date(d);nd.setDate(nd.getDate()+2);
        KR_HOL.add(dkey(nd));
      }
    });
  }catch(e){
    // fallback 유지
    console.warn('holiday API failed for',year,e);
  }
}
const isHol=d=>KR_HOL.has(dkey(d));
function getNextMK(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1;return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
const fxActForMon=(fx,mk)=>fx.filter(f=>!f.df||mk<f.df);
const isNW=d=>{const w=d.getDay();return w===0||w===6||isHol(d);};
function getSalDay(y,m,day=21){const dim=new Date(y,m,0).getDate();const d=new Date(y,m-1,Math.min(Math.max(1,day),dim));while(isNW(d))d.setDate(d.getDate()-1);return d;}
function getCycle(y,m,day=21){
  const start=getSalDay(y,m,day);const nm=m===12?1:m+1,ny=m===12?y+1:y,ns=getSalDay(ny,nm,day);
  const end=new Date(ns);end.setDate(end.getDate()-1);
  const f=d=>`${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  const dm=m===12?1:m+1,dy=m===12?y+1:y;
  return{start,end,y,m,label:`${dy}년 ${dm}월`,range:`${f(start)} ~ ${f(end)}`};
}
function getCurCycle(day=21){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,sd=getSalDay(y,m,day);return n>=sd?getCycle(y,m,day):getCycle(m===1?y-1:y,m===1?12:m-1,day);}
const getFxOvDay=(f,mp,dim,ov)=>{const o=ov[mp]?.[f.id];if(!o)return Math.min(f.day,dim);if(typeof o==='number')return Math.min(o,dim);return Math.min(o.day??f.day,dim);};
const getFxOvAmt=(f,mp,ov)=>{const o=ov[mp]?.[f.id];if(!o||typeof o==='number')return f.amount;return o.amount??f.amount;};
// 이번달 카드 청구일
// 신용카드 청구일(기본 26일). 사용자가 설정 탭에서 변경 가능.
const CREDIT_DAY_DEFAULT=26;
const CUTOFF_DAY_DEFAULT=12; // 결제금액 확정일 기본값 (카드사별 상이, 보통 결제일 2주 전)
const nextBillingDate=day=>{const n=new Date(),d=n.getDate();const cd=Math.max(1,Math.min(31,Number(day)||CREDIT_DAY_DEFAULT));return d>cd?new Date(n.getFullYear(),n.getMonth()+1,cd):new Date(n.getFullYear(),n.getMonth(),cd);};
// ★ 신용카드 지출의 실제 통장 출금일 계산
// - 지출일이 cutoffDay 이전(포함)이면 → 이번 달 billingDay에 출금
// - 지출일이 cutoffDay 이후면 → 다음 달 billingDay에 출금
function creditBillingDateFor(txDateStr,cutoffDay,billingDay){
  const txDt=new Date(txDateStr);
  const y=txDt.getFullYear(),m=txDt.getMonth()+1,d=txDt.getDate();
  const dim=new Date(y,m,0).getDate();
  const cd=Math.max(1,Math.min(31,Number(cutoffDay)||CUTOFF_DAY_DEFAULT));
  const bd=Math.max(1,Math.min(31,Number(billingDay)||CREDIT_DAY_DEFAULT));
  const effCutoff=Math.min(cd,dim);
  if(d<=effCutoff){
    return new Date(y,m-1,Math.min(bd,dim));
  }else{
    const ny=m===12?y+1:y,nm=m===12?1:m+1;
    const ndim=new Date(ny,nm,0).getDate();
    return new Date(ny,nm-1,Math.min(bd,ndim));
  }
}
// ★ 신용카드 결제 주기 계산: cutoffDay를 기준으로 "이번 결제 확정 구간" / "다음 결제 진행 중 구간" 을 구분
// 확정일 기준 월별 구간:
//   직전 cutoff(past) < 이번 결제에 포함되는 거래 <= 가장 최근 과거 cutoff
//   가장 최근 과거 cutoff < 다음 결제에 포함되는 거래 <= 현재
function creditPeriods(cutoffDay,today){
  const cd=Math.max(1,Math.min(31,Number(cutoffDay)||CUTOFF_DAY_DEFAULT));
  const clamp=(y,m)=>{const dim=new Date(y,m,0).getDate();return Math.min(cd,dim);};
  const y=today.getFullYear(),m=today.getMonth()+1;
  const thisMonthCutoff=new Date(y,m-1,clamp(y,m));
  let pastCutoff,nextCutoff;
  if(today>=thisMonthCutoff){
    pastCutoff=thisMonthCutoff;
    const ny=m===12?y+1:y,nm=m===12?1:m+1;
    nextCutoff=new Date(ny,nm-1,clamp(ny,nm));
  }else{
    nextCutoff=thisMonthCutoff;
    const py=m===1?y-1:y,pm=m===1?12:m-1;
    pastCutoff=new Date(py,pm-1,clamp(py,pm));
  }
  // pastCutoff 한 달 전 = 이번 결제 구간의 시작점
  const ppm=pastCutoff.getMonth()+1-1<=0?12:pastCutoff.getMonth(),ppy=pastCutoff.getMonth()===0?pastCutoff.getFullYear()-1:pastCutoff.getFullYear();
  const prevCutoff=new Date(ppy,ppm-1,clamp(ppy,ppm));
  return{prevCutoff,pastCutoff,nextCutoff};
}

// 기존 데이터(role 없이 저장된 것)도 이름이 '파킹통장'/'저금통'이면 role로 인식
function findRole(catName,catsList,incCatsList){
  const found=[...catsList,...incCatsList].find(c=>c.name===catName);
  if(found?.role)return found.role;
  // 하위호환: 이름이 '파킹통장'이면 parking, '저금통'이면 jar
  if(catName==='파킹통장')return'parking';
  if(catName==='저금통')return'jar';
  return null;
}
// ★ role에 해당하는 투자 카테고리(isParking/isJar 플래그)의 첫 번째 iv 항목 key 찾기
function findIvKeyByRole(role,iv,ivCats){
  if(!role)return null;
  const flag=role==='parking'?'isParking':role==='jar'?'isJar':null;
  if(!flag)return null;
  const targetCat=ivCats.find(c=>c[flag]);
  if(!targetCat)return null;
  // 해당 카테고리에 속한 iv 항목들 중 첫 번째
  const candidates=Object.keys(iv).filter(k=>iv[k]?.cat===targetCat.name);
  return candidates[0]||null;
}
// ★ 자동연동: 거래 t가 추가/삭제될 때 iv 잔액 조정

// 월 납입액이 있는 모든 항목은 출금일이 지나갈 때마다 current += monthly 됨 (변동성 여부 무관)

// - 월말이 payDay보다 짧으면 해당 월의 마지막 날에 매칭 (min(payDay, dim))
// - lastApplied가 없으면 오늘로 초기화 (과거 소급 적용 안 함)
// 변동성(volatile=true) 항목은 자동 증액된 기준값 위에 사용자가 실제 시장가로 수동 업데이트
function applyIvAutoGrow(ivObj,today,primaryDay){
  if(!ivObj||typeof ivObj!=='object')return ivObj;
  const out={...ivObj};
  let changed=false;
  Object.keys(out).forEach(k=>{
    const item=out[k];
    if(!item)return;
    const monthly=Number(item.monthly||0);
    if(monthly<=0)return;
    const payDay=item.payDay==null?Number(primaryDay||21):Number(item.payDay);
    if(!item.lastApplied){
      out[k]={...item,lastApplied:dkey(today)};changed=true;return;
    }
    const last=new Date(item.lastApplied);
    if(isNaN(last.getTime())){out[k]={...item,lastApplied:dkey(today)};changed=true;return;}
    const iter=new Date(last);iter.setDate(iter.getDate()+1);
    let accum=0;let newLast=new Date(last);
    while(iter<=today){
      const dim=new Date(iter.getFullYear(),iter.getMonth()+1,0).getDate();
      const eff=Math.min(Math.max(1,payDay),dim);
      if(iter.getDate()===eff){accum+=monthly;newLast=new Date(iter);}
      iter.setDate(iter.getDate()+1);
    }
    if(accum>0){
      out[k]={...item,current:Number(item.current||0)+accum,lastApplied:dkey(newLast)};
      changed=true;
    }
  });
  return changed?out:ivObj;
}

function applyAcct(t,sign,base,cats,incCats,ivCats){
  const role=findRole(t.cat,cats,incCats);
  const key=findIvKeyByRole(role,base,ivCats);
  if(!key||!base[key])return base;
  const d=sign*(t.tp==='exp'?t.amt:-t.amt);
  return{...base,[key]:{...base[key],current:base[key].current+d}};
}

// beforeunload 시에는 flushCloudSync로 즉시 전송 (페이지 닫기 전에 손실 방지)
let _cloudSyncTimer=null;
let _cloudSyncPaused=false;
function _syncNow(){
  const FB=window.__FB;
  if(!FB||!FB.auth||!FB.auth.currentUser)return null;
  const uid=FB.auth.currentUser.uid;
  const payload={};
  BACKUP_KEYS.forEach(k=>{const v=lv(k);if(v!==null&&v!==undefined)payload[k]=v;});
  payload.__updatedAt=FB.serverTimestamp();
  payload.__appVersion=APP_VERSION;
  return FB.setDoc(FB.doc(FB.db,'users',uid),payload,{merge:true}).then(()=>{
    if(window.__onCloudSynced)window.__onCloudSynced();
  }).catch(e=>{
    console.warn('cloud sync failed:',e&&e.code,e&&e.message);
    if(window.__onCloudSyncError)window.__onCloudSyncError((e&&e.code)||e&&e.message||'failed');
  });
}
function scheduleCloudSync(){
  if(_cloudSyncPaused)return;
  const FB=window.__FB;
  if(!FB||!FB.auth||!FB.auth.currentUser)return;
  clearTimeout(_cloudSyncTimer);
  _cloudSyncTimer=setTimeout(_syncNow,300);
}
function flushCloudSync(){
  if(_cloudSyncPaused)return;
  clearTimeout(_cloudSyncTimer);
  _syncNow();
}
window.__scheduleCloudSync=scheduleCloudSync;
window.__flushCloudSync=flushCloudSync;
window.__setCloudSyncPaused=v=>{_cloudSyncPaused=v;};
// 페이지 닫기 직전 pending sync flush (best-effort)
window.addEventListener('beforeunload',()=>{try{flushCloudSync();}catch(e){}});

// 앱에서 사용하는 모든 localStorage 키 목록
const BACKUP_KEYS=['hj9-sal','hj9-salOv','hj9-tx','hj9-wg','hj9-theme','hj9-adj','hj9-adjMK','hj9-fxov','hj9-appname','hj9-cats','hj9-incCats','hj9-fxCats','hj9-simdata','hj9-ivov','hj9-fx','hj9-fxin','hj9-fxinov','hj9-iv','hj9-ivCats','hj9-lastnoti','hj9-lastBackup','hj9-creditDay','hj9-cutoffDay','hj9-lastAssetCheck'];
const APP_VERSION='1.0.0';
function exportBackup(){
  const data={version:APP_VERSION,exportedAt:new Date().toISOString(),keys:{}};
  BACKUP_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!==null)data.keys[k]=v;});
  return data;
}
function downloadBackup(){
  const data=exportBackup();
  const ts=new Date().toISOString().slice(0,10);
  const name=(lv('hj9-appname')||'내집마련').replace(/[^\w가-힣]/g,'_');
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${name}-백업-${ts}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  sv('hj9-lastBackup',new Date().toISOString());
}
function importBackup(data){
  // 기본 검증
  if(!data||typeof data!=='object'||!data.keys||typeof data.keys!=='object')throw new Error('잘못된 백업 파일이에요');
  // 기존 앱 키만 복원 (다른 건 무시해서 오염 방지)
  let count=0;
  Object.entries(data.keys).forEach(([k,v])=>{
    if(!BACKUP_KEYS.includes(k))return;
    if(typeof v!=='string')return;
    try{JSON.parse(v);localStorage.setItem(k,v);count++;}catch(e){}
  });
  return count;
}

// ── 가계부 탭 ─────────────────────────────────────────────────
function LedgerTab({txns,delTx,updateTx,setModal,th,fx,fxOv,curSal,salOv,salMK,uSalOv,sal,iv,ivOv,uIvOv,getIcon,cats,incCats,wedKeys,fxIn,fxInOv,primaryDay}){
  const initVC=()=>{const c=getCurCycle(primaryDay);return{y:c.y,m:c.m};};
  const[vc,setVc]=useState(initVC);
  const[sel,setSel]=useState(TODAY);
  const[txFilter,setTxFilter]=useState('all');
  const[statsFx,setStatsFx]=useState(true); // 소비통계 고정비용 포함 여부
  const[searchQ,setSearchQ]=useState(''); // 거래 검색 쿼리
  const searching=searchQ.trim().length>0;

  // 이 연도 공휴일 로드 (비동기)
  useEffect(()=>{fetchHolidaysForYear(vc.y);fetchHolidaysForYear(vc.y+1);},[vc.y]);

  const cycle=getCycle(vc.y,vc.m,primaryDay);
  const cycSalMK=dkey(cycle.start).slice(0,7);
  // 해당 사이클의 활성 고정수입 목록 (월별 override 반영)
  const activeFxIn=(fxIn||[]).filter(f=>!f.df);
  const getInAmt=f=>{const ov=(fxInOv||{})[cycSalMK]?.[f.id];return(ov!==undefined&&ov!==null)?Number(ov):Number(f.amount||0);};
  const cycSal=activeFxIn.reduce((s,f)=>s+getInAmt(f),0);
  const prevC=()=>setVc(({y,m})=>({y:m===1?y-1:y,m:m===1?12:m-1}));
  const nextC=()=>setVc(({y,m})=>({y:m===12?y+1:y,m:m===12?1:m+1}));

  const getInvAmt=key=>ivOv[cycSalMK]?.[key]??iv[key]?.monthly??0;
  // 투자 항목 중 월 납입 있는 것만 (ivKey별로 동적). payDay는 null이면 월급일.
  // fromCash=false 항목은 "계좌 밖 적립"이므로 가계부 지출 기록에서 제외
  const INV_ITEMS=Object.keys(iv).filter(k=>(iv[k]?.monthly||0)>0&&iv[k]?.fromCash!==false).map(k=>({name:iv[k].name,amount:getInvAmt(k),icon:iv[k].ic||'💰',ivKey:k,def:iv[k].monthly,payDay:iv[k].payDay??null}));
  const ivTotal=INV_ITEMS.reduce((s,i)=>s+i.amount,0);

  const cells=[];
  for(let i=0;i<cycle.start.getDay();i++)cells.push(null);
  let cd=new Date(cycle.start);while(cd<=cycle.end){cells.push(new Date(cd));cd=new Date(cd);cd.setDate(cd.getDate()+1);}

  const dm={};
  txns.forEach(t=>{if(!dm[t.date])dm[t.date]={e:0,i:0};if(t.tp==='exp')dm[t.date].e+=t.amt;else dm[t.date].i+=t.amt;});
  cells.forEach(cellD=>{if(!cellD)return;const dk=dkey(cellD),cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fxActForMon(fx,mp).forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){if(!dm[dk])dm[dk]={e:0,i:0};dm[dk].e+=getFxOvAmt(f,mp,fxOv);}});});
  const salDk=dkey(cycle.start);
  // ── 고정수입 각각을 해당 입금일 셀에 주입 ──
  // 한 사이클 안에서 각 fxIn의 입금일은 단 한 번만 등장한다.
  const getFxInCellDate=f=>{
    for(const c of cells){if(!c)continue;const dim=new Date(c.getFullYear(),c.getMonth()+1,0).getDate();const eff=Math.min(Math.max(1,f.day||1),dim);if(c.getDate()===eff)return c;}
    return null;
  };
  activeFxIn.forEach(f=>{const c=getFxInCellDate(f);if(!c)return;const dk=dkey(c);if(!dm[dk])dm[dk]={e:0,i:0};dm[dk].i+=getInAmt(f);});
  // 투자 출금: payDay가 null이면 월급일, 아니면 해당 날짜 (cycle 내에서 찾음)
  INV_ITEMS.forEach(inv=>{
    if(inv.payDay==null){
      // 월급일에 출금
      if(!dm[salDk])dm[salDk]={e:0,i:0};
      dm[salDk].e+=inv.amount;
    }else{
      // cycle 안에서 inv.payDay와 일치하는 첫번째 날 찾기
      for(const cellD of cells){
        if(!cellD)continue;
        const dim=new Date(cellD.getFullYear(),cellD.getMonth()+1,0).getDate();
        const effDay=Math.min(inv.payDay,dim);
        if(cellD.getDate()===effDay){
          const dk=dkey(cellD);
          if(!dm[dk])dm[dk]={e:0,i:0};
          dm[dk].e+=inv.amount;
          break;
        }
      }
    }
  });

  const cycleStartDk=dkey(cycle.start),cycleEndDk=dkey(cycle.end);
  const cyTxns=txns.filter(t=>t.date>=cycleStartDk&&t.date<=cycleEndDk);
  let cyFxTotal=0,cyFxByCat={};
  cells.forEach(cellD=>{if(!cellD)return;const cm=cellD.getMonth()+1,cy=cellD.getFullYear();const mp=`${cy}-${String(cm).padStart(2,'0')}`,dim=new Date(cy,cm,0).getDate();fxActForMon(fx,mp).forEach(f=>{const ed=getFxOvDay(f,mp,dim,fxOv);if(ed===cellD.getDate()){const a=getFxOvAmt(f,mp,fxOv);cyFxTotal+=a;cyFxByCat[f.cat]=(cyFxByCat[f.cat]||0)+a;}});});
  const cyTxExp=cyTxns.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const cyTxInc=cyTxns.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const cyTotalExp=cyTxExp+cyFxTotal+ivTotal;
  const cyTotalInc=cyTxInc+cycSal;
  // ★ 순 소비: 고정지출·투자·법인카드 제외, 현금+신용카드만
  const cyPersonalSpnt=cyTxns.filter(t=>t.tp==='exp'&&t.payType!=='biz'&&t.cat!=='저금통').reduce((s,t)=>s+t.amt,0);

  // ★ 소비 통계 (투자/저금통 제외, 고정비용 toggle)
  const statsTxByCat={};
  cyTxns.filter(t=>t.tp==='exp'&&!STATS_EXCL.has(t.cat)).forEach(t=>{statsTxByCat[t.cat]=(statsTxByCat[t.cat]||0)+t.amt;});
  const statsMap=statsFx?{...cyFxByCat,...statsTxByCat}:{...statsTxByCat};
  const statsTotal=Object.values(statsMap).reduce((s,v)=>s+v,0);

  const selTx=txns.filter(t=>t.date===sel).sort((a,b)=>a.id-b.id);
  const selD=new Date(sel),inCycle=sel>=cycleStartDk&&sel<=cycleEndDk;

  const selMp=`${selCy}-${String(selCm).padStart(2,'0')}`,selDim=new Date(selCy,selCm,0).getDate();
  const selFx=inCycle?fxActForMon(fx,selMp).filter(f=>getFxOvDay(f,selMp,selDim,fxOv)===selD.getDate()):[];
  // 선택 날짜에 입금되는 고정수입 항목들
  const selFxIn=inCycle?activeFxIn.filter(f=>{const eff=Math.min(Math.max(1,f.day||1),selDim);return selD.getDate()===eff;}):[];
  const selFxInTotal=selFxIn.reduce((s,f)=>s+getInAmt(f),0);
  const isSalDay=selFxIn.length>0;
  // 선택 날짜에 출금되는 투자 항목 필터링: payDay가 null이면 salDk, 아니면 해당 날짜
  const selInvItems=inCycle?INV_ITEMS.filter(inv=>{
    if(inv.payDay==null)return sel===salDk;
    const effDay=Math.min(inv.payDay,selDim);
    return selD.getDate()===effDay;
  }):[];
  const selTxExp=selTx.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const selTxInc=selTx.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);
  const selFxTotal=selFx.reduce((s,f)=>s+getFxOvAmt(f,selMp,fxOv),0);
  const selInvTotal=selInvItems.reduce((s,i)=>s+i.amount,0);
  const filteredTx=txFilter==='all'?selTx:selTx.filter(t=>t.tp===txFilter);
  const showFx=txFilter==='all'||txFilter==='exp',showSal=txFilter==='all'||txFilter==='inc',showInv=selInvItems.length>0&&showFx;
  const hasAny=(showFx&&selFx.length>0)||showInv||(showSal&&selFxIn.length>0)||filteredTx.length>0;

  // ★ 검색: 메모 + 카테고리 + 금액(문자열 포함)으로 필터
  const searchResults=(()=>{
    if(!searching)return[];
    const q=searchQ.trim().toLowerCase();
    const qNum=q.replace(/[^0-9]/g,'');
    return txns.filter(t=>{
      const inMemo=(t.memo||'').toLowerCase().includes(q);
      const inCat=(t.cat||'').toLowerCase().includes(q);
      const inAmt=qNum&&String(t.amt).includes(qNum);
      return inMemo||inCat||inAmt;
    }).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id); // 최신순
  })();
  const searchExp=searchResults.filter(t=>t.tp==='exp').reduce((s,t)=>s+t.amt,0);
  const searchInc=searchResults.filter(t=>t.tp==='inc').reduce((s,t)=>s+t.amt,0);

  return(<div>
    {/* ★ 검색창 */}
    <div style={Cd(th,{marginBottom:10})}>
      <div style={{display:'flex',alignItems:'center',gap:8,background:th.border,borderRadius:12,padding:'8px 12px'}}>
        <span style={{fontSize:16}}>🔍</span>
        <input type="text" value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="메모·카테고리·금액 검색" style={{flex:1,border:'none',outline:'none',background:'transparent',color:th.text,fontSize:14,padding:'2px 0'}}/>
        {searching&&<button onClick={()=>setSearchQ('')} style={{border:'none',background:'transparent',color:th.sub,cursor:'pointer',fontSize:18,padding:0,lineHeight:1}}>×</button>}
      </div>
      {searching&&(
        <div style={{fontSize:10,color:th.sub,marginTop:8,display:'flex',justifyContent:'space-between'}}>
          <span>{searchResults.length}개 결과</span>
          {searchResults.length>0&&<span><span style={{color:'#dc2626'}}>-{won(searchExp)}</span> · <span style={{color:th.green}}>+{won(searchInc)}</span></span>}
        </div>
      )}
    </div>

    {/* ★ 검색 결과 */}
    {searching&&(
      <div style={Cd(th)}>
        {searchResults.length===0?
          <div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'30px 0'}}>검색 결과가 없어요 🔍</div>
          :searchResults.map(t=><TxRow key={t.id} t={t} onEdit={t=>setModal({type:'txn',editTx:t})} getIcon={getIcon} th={th}/>)
        }
      </div>
    )}

    {!searching&&<>
    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <button onClick={prevC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>‹</button>
        <div style={{textAlign:'center'}}><div style={{fontSize:14,fontWeight:700,color:th.text}}>{cycle.label}</div><div style={{fontSize:10,color:th.primary,fontWeight:600,marginTop:1}}>{cycle.range}</div></div>
        <button onClick={nextC} style={{border:'none',background:th.border,borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:16,color:th.text}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',margin:'8px 0 4px'}}>
        {['일','월','화','수','목','금','토'].map((d,i)=>(<div key={d} style={{textAlign:'center',fontSize:10,fontWeight:600,padding:'4px 0',color:i===0?'#ef4444':i===6?'#3b82f6':th.sub}}>{d}</div>))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {cells.map((cellD,i)=>{
          if(!cellD)return <div key={`e${i}`}/>;
          const dk=dkey(cellD),isSel=sel===dk,isT=dk===TODAY,isH=isHol(cellD)||cellD.getDay()===0,isSat=cellD.getDay()===6,is2=cellD.getMonth()!==cycle.start.getMonth(),dd=dm[dk];
          const tc=isSel?'#fff':isT?th.primary:isH?'#ef4444':isSat?'#3b82f6':th.text;
          return(<div key={dk} onClick={()=>setSel(dk)} style={{cursor:'pointer',borderRadius:10,padding:'3px 1px',background:isSel?th.primary:is2?`${th.border}cc`:'transparent',textAlign:'center',minHeight:52}}>
            <div style={{fontSize:11,fontWeight:isT?800:500,color:tc}}>{cellD.getDate()}</div>
            {is2&&!isSel&&<div style={{fontSize:7,color:th.sub,opacity:.6}}>{cellD.getMonth()+1}월</div>}
            {dd?.e>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':'#dc2626',lineHeight:1.2}}>-{cw(dd.e)}</div>}
            {dd?.i>0&&<div style={{fontSize:7,color:isSel?'rgba(255,255,255,.9)':th.green,lineHeight:1.2}}>+{cw(dd.i)}</div>}
          </div>);
        })}
      </div>
      {/* ★ 달력 하단: 수입 → 지출 → 순소비 순서 */}
      <div style={{borderTop:`1px solid ${th.border}`,marginTop:10,paddingTop:10,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4}}>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>총 수입</div><div style={{fontSize:11,fontWeight:800,color:th.green,marginTop:2}}>+{won(cyTotalInc)}</div><div style={{fontSize:8,color:th.sub}}>고정수입 포함</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>총 지출</div><div style={{fontSize:11,fontWeight:800,color:'#dc2626',marginTop:2}}>-{won(cyTotalExp)}</div><div style={{fontSize:8,color:th.sub}}>고정+투자 포함</div></div>
        <div style={{textAlign:'center'}}><div style={{fontSize:9,color:th.sub}}>순 소비</div><div style={{fontSize:11,fontWeight:800,color:'#dc2626',marginTop:2}}>{won(cyPersonalSpnt)}</div></div>

    </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:th.text}}>📋 {sel} {isHol(selD)?'🎌':''}</div>
        <button onClick={()=>setModal({type:'txn',data:{date:sel}})} style={{background:th.primary,color:'#fff',border:'none',borderRadius:20,padding:'4px 12px',fontSize:11,cursor:'pointer',fontWeight:700}}>+ 추가</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:10}}>{[['all','전체'],['exp','💸 지출'],['inc','💰 수입']].map(([v,lb])=>(<button key={v} onClick={()=>setTxFilter(v)} style={{border:'none',borderRadius:20,padding:'4px 12px',fontSize:10,cursor:'pointer',fontWeight:600,background:txFilter===v?th.primary:th.border,color:txFilter===v?'#fff':th.sub}}>{lb}</button>))}</div>
      {showSal&&selFxIn.map(f=>{const effAmt=getInAmt(f);const isOv=(fxInOv||{})[cycSalMK]?.[f.id]!==undefined;return(<div key={f.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:`${th.green}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>💰</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{f.name}</span>{f.primary&&<span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>주 수입</span>}{isOv&&<span style={{fontSize:9,color:'#ea580c',background:'#fff7ed',borderRadius:6,padding:'1px 5px',fontWeight:600}}>수정됨</span>}</div><div style={{fontSize:10,color:th.sub}}>매월 {f.day}일 입금 / 기본 {won(f.amount)}</div></div><span style={{fontSize:13,fontWeight:700,color:th.green}}>+{won(effAmt)}</span><button onClick={()=>setModal({type:'fxInOv',fxInId:f.id,fxInName:f.name,defaultAmt:f.amount,monthKey:cycSalMK})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>수정</button></div>);})}
      {showInv&&selInvItems.map(inv=>(<div key={inv.ivKey} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:`${th.primary}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{inv.icon}</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{inv.name}</span><span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>투자</span>{ivOv[cycSalMK]?.[inv.ivKey]!==undefined&&<span style={{fontSize:9,color:'#ea580c',background:'#fff7ed',borderRadius:6,padding:'1px 5px',fontWeight:600}}>수정됨</span>}</div><div style={{fontSize:10,color:th.sub}}>{inv.payDay==null?'월급일 자동 출금':`매월 ${inv.payDay}일 자동 출금`}</div></div><div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}><span style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>-{won(inv.amount)}</span><button onClick={()=>setModal({type:'ivOv',ivKey:inv.ivKey,ivName:inv.name,monthKey:cycSalMK,defaultAmt:inv.def})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>수정</button></div></div>))}
      {/* ★ 고정지출 - 통일된 편집 버튼 */}
      {showFx&&selFx.map(f=>{const effAmt=getFxOvAmt(f,selMp,fxOv),isOv=!!(fxOv[selMp]?.[f.id]);return(<div key={f.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${th.border}`}}><div style={{width:36,height:36,borderRadius:12,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>📌</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><span style={{fontSize:12,fontWeight:600,color:th.text}}>{f.name}</span><span style={{fontSize:9,color:th.primary,background:th.border,borderRadius:6,padding:'1px 5px',fontWeight:600}}>고정</span>{isOv&&<span style={{fontSize:9,color:'#ea580c',background:'#fff7ed',borderRadius:6,padding:'1px 5px',fontWeight:600}}>수정됨</span>}</div><div style={{fontSize:10,color:th.sub}}>기본 {f.day}일 / {won(f.amount)}</div></div><div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}><span style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>-{won(effAmt)}</span><button onClick={()=>setModal({type:'fxmonth',fxId:f.id,fxName:f.name,fxDefaultDay:f.day,fxDefaultAmt:f.amount,monthKey:selMp})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>수정</button></div></div>);})}
      {filteredTx.map(t=><TxRow key={t.id} t={t} onEdit={t=>setModal({type:'txn',editTx:t})} getIcon={getIcon} th={th}/>)}
      {!hasAny&&<div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'20px 0'}}>내역 없음 · 추가해 보세요 🌟</div>}
      {hasAny&&(<div style={{borderTop:`1px solid ${th.border}`,paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}><span style={{color:'#dc2626'}}>지출 -{won(selTxExp+selFxTotal+(showFx?selInvTotal:0))}</span><span style={{color:th.green}}>수입 +{won(selTxInc+(showSal?selFxInTotal:0))}</span></div>)}
    </div>

    {/* ★ 소비 통계 - 투자/저금통 제외, 고정비용 toggle */}
    <div style={Cd(th)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:th.text}}>📊 {cycle.label} 소비 통계</div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setStatsFx(true)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:10,cursor:'pointer',fontWeight:600,background:statsFx?th.primary:th.border,color:statsFx?'#fff':th.sub}}>고정 포함</button>
          <button onClick={()=>setStatsFx(false)} style={{border:'none',borderRadius:20,padding:'3px 10px',fontSize:10,cursor:'pointer',fontWeight:600,background:!statsFx?th.primary:th.border,color:!statsFx?'#fff':th.sub}}>고정 제외</button>
        </div>
      </div>
      {Object.keys(statsMap).length===0?<div style={{color:th.sub,fontSize:12,textAlign:'center',padding:'16px 0'}}>이번 달 지출 내역이 없어요 🌱</div>:
      Object.entries(statsMap).sort((a,b)=>b[1]-a[1]).map(([cat,amt],i)=>{const pct=statsTotal>0?(amt/statsTotal*100).toFixed(1):'0';return(<div key={cat} style={{marginBottom:10}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:16}}>{getIcon(cat)||'📦'}</span><span style={{fontSize:12,fontWeight:600,color:th.text}}>{cat}</span></div><div><span style={{fontSize:12,fontWeight:700,color:th.primary}}>{won(amt)}</span><span style={{fontSize:10,color:th.sub,marginLeft:6}}>{pct}%</span></div></div><div style={{background:th.border,borderRadius:999,height:8,overflow:'hidden'}}><div style={{background:CC[i%CC.length],height:'100%',width:`${pct}%`,borderRadius:999}}/></div></div>);})}
      {statsTotal>0&&<div style={{borderTop:`1px solid ${th.border}`,paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}><span style={{color:th.sub}}>{statsFx?'고정 포함':'고정 제외'} 합계</span><span style={{color:'#dc2626'}}>{won(statsTotal)}</span></div>}
    </div>
    </>}
  </div>);
}

// ── 고정지출 탭 ─────────────────────────────────────────────
function FixedTab({fx,fxSum,uFx,fxIn,uFxIn,setModal,fxCats,th}){
  const[openInc,setOpenInc]=useState(true);
  const[openExp,setOpenExp]=useState(true);
  const activeFx=fx.filter(f=>!f.df);
  const activeIn=(fxIn||[]).filter(f=>!f.df);
  const incSum=activeIn.reduce((s,f)=>s+(f.amount||0),0);
  const net=incSum-fxSum;
  const byCat={};activeFx.forEach(f=>{byCat[f.cat]=byCat[f.cat]||[];byCat[f.cat].push(f);});
  const getCatIcon=name=>{const c=fxCats.find(x=>(typeof x==='string'?x:x.name)===name);return typeof c==='object'?c.icon||'📌':'📌';};
  const delIn=f=>{if(!confirm(`"${f.name}" 고정 수입을 삭제할까요?`))return;uFxIn((fxIn||[]).filter(x=>x.id!==f.id));};
  return(<div>
    <div style={{fontSize:18,fontWeight:800,color:th.text,margin:'2px 2px 12px'}}>📌 고정비용</div>
    <div style={{display:'flex',gap:8,marginBottom:8}}>
      <div style={{flex:1,background:`linear-gradient(135deg,${th.green},#34d399)`,borderRadius:14,padding:'14px',color:'#fff',minWidth:0}}>
        <div style={{fontSize:10,opacity:.85}}>💵 고정 수입 합계</div>
        <div style={{fontSize:20,fontWeight:800,marginTop:4,wordBreak:'break-all'}}>{won(incSum)}</div>
        <div style={{fontSize:10,opacity:.7,marginTop:2}}>{activeIn.length}개 항목</div>
      </div>
      <div style={{flex:1,background:th.grad,borderRadius:14,padding:'14px',color:'#fff',minWidth:0}}>
        <div style={{fontSize:10,opacity:.85}}>📌 고정 지출 합계</div>
        <div style={{fontSize:20,fontWeight:800,marginTop:4,wordBreak:'break-all'}}>{won(fxSum)}</div>
        <div style={{fontSize:10,opacity:.7,marginTop:2}}>{activeFx.length}개 항목</div>
      </div>
    </div>
    <div style={{background:th.card,borderRadius:12,padding:'10px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',boxShadow:'0 2px 10px rgba(0,0,0,0.05)',marginBottom:12}}>
      <div style={{fontSize:11,color:th.sub,fontWeight:600}}>월 순액 (수입 − 지출)</div>
      <div style={{fontSize:15,fontWeight:800,color:net>=0?th.green:'#dc2626'}}>{net>=0?'+':'−'}{won(net)}</div>
    </div>

    <div style={{...Cd(th),padding:0,overflow:'hidden'}}>
      <div style={{width:'100%',background:`linear-gradient(135deg,${th.green},#34d399)`,padding:'9px 14px',color:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <div onClick={()=>setOpenInc(o=>!o)} style={{flex:1,cursor:'pointer',fontSize:12,fontWeight:800}}>💵 고정 수입</div>
        <button onClick={()=>setModal({type:'fxIn',data:null})} title="고정 수입 추가" style={{width:24,height:24,borderRadius:12,background:'rgba(255,255,255,0.25)',border:'none',color:'#fff',cursor:'pointer',fontSize:15,fontWeight:700,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
        <div onClick={()=>setOpenInc(o=>!o)} style={{fontSize:20,fontWeight:700,transition:'transform 0.2s',transform:openInc?'rotate(180deg)':'rotate(0deg)',cursor:'pointer',flexShrink:0}}>▾</div>
      </div>
      {openInc&&(<div style={{padding:14,background:th.card}}>
        {activeIn.length===0?(

// ── 자산 탭 ─────────────────────────────────────────────────
function AssetsTab({iv,wFund,tAss,uIv,setModal,wg,wgUnset,uWg,needMo,mLeft,th,wedKeys,ivCats,wedCatName}){
  const wPct=wgUnset?0:Math.min(100,(wFund/wg.target)*100);
  const wgLabel=wgUnset?'미설정':`${wg.year}년 ${wg.month||12}월`;
  const wgName=wg.name||'목표자금';
  const wedIcon=ivCats.find(c=>c.isWedding)?.icon||'💍';
  // 카테고리별 그룹핑 (ivCats 순서대로, 마지막에 "알 수 없음" 카테고리)
  const ivEntries=Object.entries(iv);
  const byCat={};
  const catNames=ivCats.map(c=>c.name);
  ivEntries.forEach(([k,v])=>{const c=v?.cat||'기타';if(!byCat[c])byCat[c]=[];byCat[c].push([k,v]);});
  const orderedCats=ivCats.filter(c=>byCat[c.name]).map(c=>c.name).concat(Object.keys(byCat).filter(c=>!catNames.includes(c)));
  const getCatObj=name=>ivCats.find(c=>c.name===name)||{name,icon:'📊',isWedding:false};
  const handleDel=k=>{if(!confirm(`${iv[k]?.name||k} 항목을 삭제할까요?`))return;const n={...iv};delete n[k];uIv(n);};
  return(<div>
    <div style={{background:`linear-gradient(135deg,${th.green},#34d399)`,borderRadius:16,padding:'16px',color:'#fff',marginBottom:10}}><div style={{fontSize:11,opacity:.85}}>💰 총 자산 현황</div><div style={{fontSize:28,fontWeight:800,marginTop:4}}>{won(tAss)}</div><div style={{fontSize:10,opacity:.7,marginTop:2}}>{wedCatName||'목표자금'} {won(wFund)}</div></div>
    {wgUnset?(
      <div style={{...Cd(th),border:`1.5px dashed ${th.light}`,background:`${th.primary}08`,cursor:'pointer',textAlign:'center',padding:'20px 16px'}} onClick={()=>setModal({type:'wg'})}>
        <div style={{fontSize:28,marginBottom:6}}>🎯</div>
        <div style={{fontSize:13,fontWeight:800,color:th.primary,marginBottom:4}}>목표 설정하기</div>
        <div style={{fontSize:10,color:th.sub,lineHeight:1.5}}>언제까지 얼마 모을지 설정하면<br/>달성 플랜이 자동으로 계산돼요</div>
      </div>
    ):(
      <div style={Cd(th)}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:th.text}}>{wedIcon} {wgName} 달성</div><button onClick={()=>setModal({type:'wg'})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>목표 수정</button></div><div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:th.sub,marginBottom:8}}><span>현재 {won(wFund)}</span><span>목표 {won(wg.target)}</span></div><div style={{background:th.border,borderRadius:999,height:10,overflow:'hidden'}}><div style={{background:th.grad,height:'100%',width:`${wPct}%`,borderRadius:999}}/></div><div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginTop:6}}><span style={{color:th.primary,fontWeight:700}}>{wPct.toFixed(1)}% 달성</span><span style={{color:th.sub}}>{wgLabel}까지 · {mLeft}개월 · 월 {won(needMo)} 필요</span></div></div>
    )}

    {/* ★ 투자/자산 추가 버튼 */}
    <button onClick={()=>setModal({type:'iv',key:null})} style={{width:'100%',background:th.border,border:`2px dashed ${th.light}`,borderRadius:14,padding:'12px',fontSize:12,color:th.primary,cursor:'pointer',fontWeight:700,marginBottom:10}}>+ 새 투자/자산 항목 추가</button>

    {/* ★ 빈 상태 안내 */}
    {Object.keys(iv).length===0&&(
      <div style={{...Cd(th),textAlign:'center',padding:'28px 16px',border:`1.5px dashed ${th.border}`}}>
        <div style={{fontSize:36,marginBottom:8}}>🪙</div>
        <div style={{fontSize:13,fontWeight:700,color:th.text,marginBottom:4}}>아직 등록된 자산이 없어요</div>
        <div style={{fontSize:11,color:th.sub,lineHeight:1.6}}>위 <b>"+ 새 투자/자산 항목 추가"</b> 버튼으로<br/>적금·파킹통장·주식 등을 추가해 보세요.</div>
      </div>
    )}

    {/* ★ 카테고리별 항목 리스트 */}
    {orderedCats.map(catName=>{
      const catObj=getCatObj(catName);
      return(
      <div key={catName} style={Cd(th)}>
        <div style={{fontSize:11,fontWeight:700,color:th.sub,marginBottom:8}}>{catObj.icon} {catName}</div>
        {byCat[catName].map(([k,item])=>{
          const isParking=catName==='파킹';
          const isJar=catName==='저금통';
          return(
          <div key={k} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${th.border}`}}>
            <div style={{width:40,height:40,borderRadius:14,background:th.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{item.ic||'💰'}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:th.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</span>
                {item.fromCash===false&&<span style={{fontSize:9,color:'#059669',background:'#d1fae5',borderRadius:6,padding:'1px 5px',fontWeight:700,flexShrink:0}}>✨ 계좌 밖</span>}
              </div>
              <div style={{fontSize:10,color:th.sub}}>{item.monthly>0?`월 ${won(item.monthly)} · ${item.payDay==null?'월급일':`매월 ${item.payDay}일`} ${item.fromCash===false?'적립':'출금'}`:isParking?'지출 선택시 자동 연동':isJar?'지출→저금 / 수입→인출':'—'}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:14,fontWeight:800,color:catObj.isWedding?th.primary:isParking?th.green:isJar?'#f472b6':th.primary}}>{won(item.current)}</div>
              <div style={{display:'flex',gap:4,marginTop:2,justifyContent:'flex-end'}}>
                <button onClick={()=>setModal({type:'iv',key:k})} style={{border:'none',background:th.border,borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:th.primary,fontWeight:600}}>수정</button>
                <button onClick={()=>handleDel(k)} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'4px 8px',fontSize:10,cursor:'pointer',color:'#dc2626',fontWeight:600}}>삭제</button>
              </div>
            </div>
          </div>
        );})}
      </div>
    );})}
  </div>);
}

      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:th.sub,marginBottom:4}}>결제일 (통장 출금)</div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <input className="compact" onFocus={e=>e.target.select()} type="number" min="1" max="31" value={creditDay} onChange={e=>{const v=Math.max(1,Math.min(31,Number(e.target.value)||1));uCreditDay(v);}} style={{flex:1,width:'100%',border:`1.5px solid ${th.border}`,borderRadius:8,padding:'6px 10px',outline:'none',background:th.card,color:th.text,textAlign:'left'}}/>

function Modals(props){
  const{modal,setModal,appName,uAppName,sal,uSal,salOv,uSalOv,txns,addTx,updateTx,delTx,fx,uFx,fxIn,uFxIn,fxInOv,uFxInOv,iv,uIv,ivOv,uIvOv,wg,uWg,th,theme,uTheme,initAdj,uAdj,baseA,fxOv,uFxOv,cats,incCats,fxCats,uFxCats,ivCats,uIvCats}=props;
  const close=()=>setModal(null);
  const OV={position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'};
  const SH={background:th.card,borderRadius:'24px 24px 0 0',padding:'24px 20px',paddingBottom:`calc(24px + var(--sab))`,width:'100%',maxWidth:480,boxSizing:'border-box',maxHeight:'90vh',overflowY:'auto'};
  const I={width:'100%',border:`2px solid ${th.border}`,borderRadius:12,padding:'12px 14px',boxSizing:'border-box',outline:'none',fontFamily:'inherit',background:th.card,color:th.text,display:'block'};
  const p={OV,SH,I,close,th};
  if(modal.type==='appName')return <AppNameM {...p} appName={appName} uAppName={uAppName}/>;
  if(modal.type==='txn')return <TxM {...p} addTx={addTx} updateTx={updateTx} delTx={delTx} editTx={modal.editTx} initDate={modal.data?.date} cats={cats} incCats={incCats}/>;
  if(modal.type==='fx')return <FxM {...p} fx={fx} uFx={uFx} item={modal.data} fxCats={fxCats}/>;
  if(modal.type==='fxIn')return <FxInM {...p} fxIn={fxIn||[]} uFxIn={uFxIn} fxInOv={fxInOv||{}} uFxInOv={uFxInOv} item={modal.data}/>;
  if(modal.type==='fxInOv')return <FxInOvM {...p} fxInId={modal.fxInId} fxInName={modal.fxInName} defaultAmt={modal.defaultAmt} monthKey={modal.monthKey} fxInOv={fxInOv||{}} uFxInOv={uFxInOv}/>;
  if(modal.type==='iv')return <IvM {...p} iv={iv} uIv={uIv} ivKey={modal.key} ivCats={ivCats}/>;
  if(modal.type==='wg')return <WgM {...p} wg={wg} uWg={uWg}/>;
  if(modal.type==='theme')return <ThemeM {...p} theme={theme} uTheme={uTheme}/>;
  if(modal.type==='adj')return <AdjM {...p} baseA={baseA} initAdj={initAdj} uAdj={uAdj}/>;
  if(modal.type==='fxmonth')return <FxMonthM {...p} fxId={modal.fxId} fxName={modal.fxName} fxDefaultDay={modal.fxDefaultDay} fxDefaultAmt={modal.fxDefaultAmt} monthKey={modal.monthKey} fxOv={fxOv} uFxOv={uFxOv}/>;
  if(modal.type==='ivOv')return <IvOvM {...p} iv={iv} ivOv={ivOv} uIvOv={uIvOv} ivKey={modal.ivKey} ivName={modal.ivName} monthKey={modal.monthKey} defaultAmt={modal.defaultAmt}/>;
  if(modal.type==='catEdit')return <CatEditM {...p} cat={modal.cat} onSave={modal.onSave}/>;
  if(modal.type==='fxCatEdit')return <FxCatEditM {...p} cat={modal.cat} idx={modal.idx} fxCats={fxCats} uFxCats={uFxCats}/>;
  if(modal.type==='ivCatEdit')return <IvCatEditM {...p} cat={modal.cat} ivCats={ivCats} uIvCats={uIvCats}/>;
  return null;
}


function TxM({OV,SH,I,close,th,addTx,updateTx,delTx,editTx,initDate,cats,incCats}){
  const isEdit=!!editTx;
  const[tp,setTp]=useState(editTx?.tp||'exp');
  const[amt,setAmt]=useState(editTx?.amt||0);
  const[cat,setCat]=useState(editTx?.cat||cats[0]?.name||'식비');
  const[memo,setMemo]=useState(editTx?.memo||'');
  const[date,setDate]=useState(editTx?.date||initDate||TODAY);
  const[payType,setPayType]=useState(editTx?.payType||'cash');
  const iCats=tp==='exp'?cats:incCats;
  const save=()=>{if(!amt||Number(amt)<=0)return;const t={...(editTx||{}),id:editTx?.id||uid(),date,tp,amt:Number(amt),cat,memo,payType:tp==='exp'?payType:'cash'};isEdit?updateTx(t):addTx(t);close();};
  const acctRole=findRole(cat,cats,incCats);
  const tipMsg=acctRole==='jar'?'🐷 지출→저금통 이동 / 수입→인출':acctRole==='parking'?'💳 지출→파킹 이동 / 수입→인출':null;
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{isEdit?'✏️ 내역 수정':'➕ 내역 추가'}</div>{isEdit&&<button onClick={()=>{if(!confirm(`이 거래 내역을 삭제할까요?\n${editTx.date} · ${editTx.cat} · ${won(editTx.amt)}`))return;delTx(editTx.id);close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}</div>
    <div style={{display:'flex',gap:8,marginBottom:12}}>{[['exp','💸 지출'],['inc','💰 수입']].map(([v,lb])=>(<button key={v} onClick={()=>{setTp(v);if(!isEdit)setCat((v==='exp'?cats:incCats)[0]?.name||'기타');}} style={{flex:1,border:'none',borderRadius:12,padding:'10px',fontSize:12,fontWeight:700,cursor:'pointer',background:tp===v?th.primary:th.border,color:tp===v?'#fff':th.sub}}>{lb}</button>))}</div>
    {/* ★ 날짜/금액 너비 통일 */}
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...I,marginBottom:10}}/>
    <MoneyInput placeholder="금액 (원)" value={amt} onChange={setAmt} style={{...I,marginBottom:10}}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10}}>{iCats.map(c=>(<button key={c.id} onClick={()=>setCat(c.name)} style={{border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:cat===c.name?th.primary:th.border,color:cat===c.name?'#fff':th.primary,fontWeight:600}}>{c.icon} {c.name}</button>))}</div>
    {tipMsg&&<div style={{fontSize:10,color:th.primary,background:th.border,borderRadius:8,padding:'6px 10px',marginBottom:10}}>{tipMsg}</div>}
    {/* ★ 신용카드/법인카드 선택 (지출일 때만) */}
    {tp==='exp'&&(<div style={{marginBottom:10}}>
      <div style={{fontSize:11,color:th.sub,marginBottom:6}}>결제 방법</div>
      <div style={{display:'flex',gap:6}}>
        {[['cash','💵 현금/체크'],['credit','💳 신용카드']].map(([v,lb])=>(<button key={v} onClick={()=>setPayType(v)} style={{flex:1,border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:payType===v?th.primary:th.border,color:payType===v?'#fff':th.text,fontWeight:600}}>{lb}</button>))}
      </div>
      {payType==='credit'&&<div style={{fontSize:10,color:'#92400e',background:'#fef3c7',borderRadius:8,padding:'6px 10px',marginTop:6}}>💳 신용카드 → 가용금액에서 즉시 차감돼요. 청구일(설정 탭 기준)엔 통장에서 실제 출금만 이뤄집니다.</div>}
    </div>)}
    <input type="text" placeholder="메모 (선택)" value={memo} onChange={e=>setMemo(e.target.value)} style={{...I,marginBottom:14}}/>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{isEdit?'수정 저장':'추가하기'}</button>
  </div></div>);
}

function FxCatEditM({OV,SH,I,close,th,cat,idx,fxCats,uFxCats}){
  const catName=typeof cat==='string'?cat:(cat?.name||'');
  const catIcon=typeof cat==='string'?'📌':(cat?.icon||'📌');
  const[v,setV]=useState(catName);
  const[ic,setIc]=useState(catIcon);
  const save=()=>{
    if(!v.trim())return;
    const item={name:v.trim(),icon:ic.trim()||'📌'};
    const n=cat!==null&&cat!==undefined?fxCats.map((x,i)=>i===idx?item:x):[...fxCats,item];
    uFxCats(n);close();
  };
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>{cat?'✏️ 카테고리 수정':'➕ 고정지출 카테고리 추가'}</div>
    <div style={{display:'flex',gap:10,marginBottom:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>아이콘</div><input value={ic} onChange={e=>setIc(e.target.value)} style={{...I,textAlign:'center'}} placeholder="📌"/></div>
      <div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>이름</div><input value={v} onChange={e=>setV(e.target.value)} placeholder="카테고리명" style={I}/></div>
    </div>
    <div style={{fontSize:11,color:th.sub,background:th.border,borderRadius:8,padding:'8px 12px',marginBottom:14,lineHeight:2}}>💡 아이콘 예시: 📱🏠🛡️📡🚌🏦🛒📦🏥🎬✈️</div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{cat?'저장':'추가'}</button>
  </div></div>);
}

// ★ 투자 카테고리 편집 모달
function IvCatEditM({OV,SH,I,close,th,cat,ivCats,uIvCats}){
  const isNew=!cat;
  const[name,setName]=useState(cat?.name||'');
  const[icon,setIcon]=useState(cat?.icon||'📊');
  const[isWed,setIsWed]=useState(cat?.isWedding||false);
  const[isPark,setIsPark]=useState(cat?.isParking||false);
  const[isJar,setIsJar]=useState(cat?.isJar||false);
  const save=()=>{
    if(!name.trim())return;
    const trimmedName=name.trim();
    // 같은 이름이 이미 존재하는지 체크 (자기 자신 제외)
    if(ivCats.some(c=>c.name===trimmedName&&c.id!==cat?.id)){
      alert('같은 이름의 카테고리가 이미 있어요.');
      return;
    }
    // 각 플래그는 한 카테고리만 — true로 설정하면 다른 것들은 false로
    let newList;
    const buildUpdate=()=>({name:trimmedName,icon:icon.trim()||'📊',isWedding:isWed,isParking:isPark,isJar});
    if(isNew){
      const newCat={id:'iv_'+uid(),...buildUpdate()};
      newList=ivCats.map(c=>({...c,
        isWedding:isWed?false:c.isWedding,
        isParking:isPark?false:c.isParking,
        isJar:isJar?false:c.isJar,
      })).concat(newCat);
    }else{
      newList=ivCats.map(c=>{
        if(c.id===cat.id)return{...c,...buildUpdate()};
        return{...c,
          isWedding:isWed?false:c.isWedding,
          isParking:isPark?false:c.isParking,
          isJar:isJar?false:c.isJar,
        };
      });
    }
    // 최소한 하나의 isWedding=true는 유지되도록 보장
    if(!newList.some(c=>c.isWedding)&&newList.length>0){
      newList[0]={...newList[0],isWedding:true};
    }
    uIvCats(newList);
    close();
  };
  const del=()=>{
    if(ivCats.length<=1){alert('카테고리는 최소 1개는 있어야 해요.');return;}
    if(!confirm(`'${cat.name}' 카테고리를 삭제할까요? 이 분류의 항목들은 자동으로 다른 카테고리로 이동돼요.`))return;
    let newList=ivCats.filter(c=>c.id!==cat.id);
    // 목표 자금 카테고리를 지우면 첫 번째를 목표로 승격
    if(cat.isWedding&&newList.length>0){
      newList[0]={...newList[0],isWedding:true};
    }
    uIvCats(newList);
    close();
  };
  // 체크박스 행 컴포넌트
  const FlagRow=({checked,onChange,label,desc,emoji})=>(
    <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',padding:'10px 12px',background:checked?`${th.primary}15`:th.border,borderRadius:12,border:`1.5px solid ${checked?th.primary:'transparent'}`,marginBottom:6}}>
      <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)} style={{width:18,height:18,accentColor:th.primary,cursor:'pointer'}}/>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:th.text}}>{emoji} {label}</div>
        <div style={{fontSize:10,color:th.sub,marginTop:2}}>{desc}</div>
      </div>
    </label>
  );
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div style={{fontSize:16,fontWeight:700,color:th.text}}>{isNew?'➕ 투자 카테고리 추가':'✏️ 투자 카테고리 수정'}</div>
      {!isNew&&<button onClick={del} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}
    </div>
    <div style={{display:'flex',gap:10,marginBottom:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>아이콘</div><input value={icon} onChange={e=>setIcon(e.target.value)} style={{...I,textAlign:'center'}} placeholder="📊"/></div>
      <div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>이름</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="예: 결혼자금, 내집마련, 노후준비" style={I}/></div>
    </div>
    <div style={{fontSize:11,color:th.sub,marginBottom:6}}>🏷️ 특수 역할 (선택)</div>

function FxM({OV,SH,I,close,th,fx,uFx,item,fxCats}){
  const[name,setName]=useState(item?.name||'');const[amt,setAmt]=useState(item?.amount||0);const[day,setDay]=useState(item?.day||1);const[cat,setCat]=useState(item?.cat||(typeof fxCats[0]==='string'?fxCats[0]:fxCats[0]?.name)||'생활비');
  const save=()=>{if(!name||!amt||Number(amt)<=0)return;uFx(item?fx.map(f=>f.id===item.id?{...f,name,amount:Number(amt),day:Number(day),cat}:f):[...fx,{id:uid(),name,amount:Number(amt),day:Number(day),cat}]);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{item?'✏️ 고정지출 수정':'➕ 고정지출 추가'}</div>{item&&<button onClick={()=>{if(!confirm(`"${item.name}" 고정지출을 완전히 삭제할까요?`))return;uFx(fx.filter(f=>f.id!==item.id));close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}</div>
    <input placeholder="항목명" value={name} onChange={e=>setName(e.target.value)} style={{...I,marginBottom:10,textAlign:'left'}}/>
    <MoneyInput placeholder="금액 (원)" value={amt} onChange={setAmt} style={{...I,marginBottom:10,textAlign:'left'}}/>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>기본 지출일</div><input onFocus={e=>e.target.select()} type="number" min="1" max="31" value={day} onChange={e=>setDay(e.target.value)} style={{...I,textAlign:'left'}}/></div>
      <div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>카테고리</div><select value={cat} onChange={e=>setCat(e.target.value)} style={{...I}}>{(fxCats.length?fxCats:FX_CATS_I).map((c,i)=>{const nm=typeof c==='string'?c:c.name;return <option key={i} value={nm}>{nm}</option>;})}</select></div>
    </div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button>
  </div></div>);
}

function FxInM({OV,SH,I,close,th,fxIn,uFxIn,fxInOv,uFxInOv,item}){
  const activeList=(fxIn||[]).filter(f=>!f.df);
  const currentPrimary=activeList.find(f=>f.primary);
  const isOnlyActive=activeList.length===0||(item&&activeList.length===1&&activeList[0].id===item.id);
  const[name,setName]=useState(item?.name||'');const[amt,setAmt]=useState(item?.amount||0);const[day,setDay]=useState(item?.day||1);
  const[primary,setPrimary]=useState(item?!!item.primary:false);
  // 편집 모드에서 이 항목에 월별 override가 존재하는지 확인 (있으면 편집 시 자동 초기화)
  const hasOverride=item&&fxInOv&&Object.values(fxInOv).some(m=>m&&m[item.id]!==undefined);
  const save=()=>{
    if(!name||!amt||Number(amt)<=0)return;
    // 주 수입 체크: 이 항목을 primary로 만들고 나머지는 해제
    const mkPrimary=primary||isOnlyActive; // 유일한 활성 항목이면 강제 primary
    let next;
    if(item){
      next=fxIn.map(f=>f.id===item.id?{...f,name,amount:Number(amt),day:Number(day),primary:mkPrimary}:(mkPrimary?{...f,primary:false}:f));
      // 금액이 변경된 경우 월별 override 전부 초기화 (편집이 즉시 반영되도록)
      if(uFxInOv&&fxInOv&&Number(amt)!==Number(item.amount||0)){
        const clean={};
        Object.keys(fxInOv).forEach(mk=>{
          const cp={...(fxInOv[mk]||{})};
          if(cp[item.id]!==undefined)delete cp[item.id];
          if(Object.keys(cp).length>0)clean[mk]=cp;
        });
        uFxInOv(clean);
      }
    }else{
      const newItem={id:uid(),name,amount:Number(amt),day:Number(day),df:null,primary:mkPrimary};
      next=mkPrimary?[...fxIn.map(f=>({...f,primary:false})),newItem]:[...fxIn,newItem];
    }
    uFxIn(next);close();
  };
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div style={{fontSize:16,fontWeight:700,color:th.text}}>{item?'✏️ 고정수입 수정':'➕ 고정수입 추가'}</div>{item&&<button onClick={()=>{if(!confirm(`"${item.name}" 고정수입을 삭제할까요?`))return;uFxIn(fxIn.filter(f=>f.id!==item.id));close();}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}</div>
    <input placeholder="항목명 (예: 월급, 용돈)" value={name} onChange={e=>setName(e.target.value)} style={{...I,marginBottom:10,textAlign:'left'}}/>
    <MoneyInput placeholder="금액 (원)" value={amt} onChange={setAmt} style={{...I,marginBottom:10,textAlign:'left'}}/>
    <div style={{marginBottom:14}}>
      <div style={{fontSize:11,color:th.sub,marginBottom:4}}>매월 입금일 (1~31)</div>
      <input onFocus={e=>e.target.select()} type="number" min="1" max="31" value={day} onChange={e=>setDay(e.target.value)} style={{...I,textAlign:'left'}}/>
    </div>
    <label style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',border:`1.5px solid ${primary?th.primary:th.border}`,borderRadius:12,marginBottom:14,cursor:isOnlyActive?'default':'pointer',background:primary?`${th.primary}0d`:th.card}}>
      <input type="checkbox" checked={primary||isOnlyActive} disabled={isOnlyActive} onChange={e=>setPrimary(e.target.checked)} style={{marginTop:2,width:16,height:16,accentColor:th.primary,cursor:isOnlyActive?'default':'pointer'}}/>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:th.text}}>⭐ 주 수입으로 설정</div>
        <div style={{fontSize:10,color:th.sub,marginTop:2,lineHeight:1.5}}>가계부의 <b>사이클 기준일</b>이 이 항목의 입금일로 정해집니다. 한 항목만 지정할 수 있어요.{currentPrimary&&currentPrimary.id!==item?.id&&!isOnlyActive&&<><br/>현재 주 수입: <b style={{color:th.primary}}>{currentPrimary.name}</b> (체크 시 교체)</>}{isOnlyActive&&<><br/>유일한 활성 항목이라 자동으로 주 수입이 됩니다.</>}</div>
      </div>
    </label>
    <button onClick={save} style={{width:'100%',background:th.green,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button>
  </div></div>);
}

function FxInOvM({OV,SH,I,close,th,fxInId,fxInName,defaultAmt,monthKey,fxInOv,uFxInOv}){
  const ov=fxInOv[monthKey]?.[fxInId];
  const[a,setA]=useState(ov!==undefined&&ov!==null?Number(ov):Number(defaultAmt||0));
  const isOv=ov!==undefined&&ov!==null;
  const save=()=>{uFxInOv({...fxInOv,[monthKey]:{...(fxInOv[monthKey]||{}),[fxInId]:Number(a)}});close();};
  const reset=()=>{const n={...fxInOv};if(n[monthKey]){delete n[monthKey][fxInId];if(!Object.keys(n[monthKey]).length)delete n[monthKey];}uFxInOv(n);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>💵 {fxInName} — 이번 달 수정</div>
    <div style={{fontSize:11,color:th.sub,marginBottom:14,lineHeight:1.6}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경돼요.<br/>기본: {won(defaultAmt)}</div>
    <div style={{marginBottom:14}}>
      <div style={{fontSize:11,color:th.sub,marginBottom:4}}>금액</div>
      <MoneyInput value={a} onChange={setA} style={{...I,textAlign:'left'}}/>
    </div>
    <button onClick={save} style={{width:'100%',background:th.green,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>
    {isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}
  </div></div>);
}

function FxMonthM({OV,SH,I,close,th,fxId,fxName,fxDefaultDay,fxDefaultAmt,monthKey,fxOv,uFxOv}){
  const ov=fxOv[monthKey]?.[fxId];const[d,setD]=useState(typeof ov==='number'?ov:(ov?.day??fxDefaultDay));const[a,setA]=useState(typeof ov==='number'?fxDefaultAmt:(ov?.amount??fxDefaultAmt));const isOv=!!ov;
  const save=()=>{uFxOv({...fxOv,[monthKey]:{...(fxOv[monthKey]||{}),[fxId]:{day:Number(d),amount:Number(a)}}});close();};
  const reset=()=>{const n={...fxOv};if(n[monthKey]){delete n[monthKey][fxId];if(!Object.keys(n[monthKey]).length)delete n[monthKey];}uFxOv(n);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>📌 {fxName} — 이번 달 수정</div>
    <div style={{fontSize:11,color:th.sub,marginBottom:14,lineHeight:1.6}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경돼요.<br/>기본: {fxDefaultDay}일 / {won(fxDefaultAmt)}</div>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>출금일</div><input onFocus={e=>e.target.select()} type="number" min="1" max="31" value={d} onChange={e=>setD(e.target.value)} style={I}/></div>
      <div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>금액</div><MoneyInput value={a} onChange={setA} style={I}/></div>
    </div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>
    {isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}
  </div></div>);
}

// ★ 투자/자산 모달: 추가/수정 모두 지원
function IvM({OV,SH,I,close,th,iv,uIv,ivKey,ivCats}){
  const isNew=!ivKey;
  const defaultCat=ivCats[0]?.name||'기타';
  const item=isNew?{name:'',current:0,monthly:0,ic:'💰',cat:defaultCat,payDay:null,fromCash:true}:(iv[ivKey]||{name:ivKey,current:0,monthly:0,ic:'💰',cat:ivCats[ivCats.length-1]?.name||'기타',payDay:null,fromCash:true});
  const[name,setName]=useState(item.name);
  const[ic,setIc]=useState(item.ic||'💰');
  const[cat,setCat]=useState(item.cat||defaultCat);
  const[cur,setCur]=useState(item.current||0);
  const[mo,setMo]=useState(item.monthly||0);
  // payDay: null = 월급일, 숫자 = 매월 해당 날짜
  const[useSalDay,setUseSalDay]=useState(item.payDay==null);
  const[payDay,setPayDay]=useState(item.payDay??25);
  // 출금 방식: true = 내 계좌에서 차감 / false = 계좌와 무관 (세전 공제·회사 매칭 등)
  const[fromCash,setFromCash]=useState(item.fromCash!==false); // 기본 true
  const wedCat=ivCats.find(c=>c.isWedding);
  const save=()=>{
    if(!name.trim())return;
    const newKey=isNew?('iv_'+uid()):ivKey;
    const pd=useSalDay?null:Math.max(1,Math.min(31,Number(payDay)||1));
    const prev=iv[newKey]||{};
    const next={name:name.trim(),current:Number(cur),monthly:Number(mo),ic:ic.trim()||'💰',cat,payDay:pd,fromCash};
    // 월 납입액 있는 항목은 자동 증액 대상 — lastApplied 관리
    if(Number(mo)>0){
      next.lastApplied=prev.lastApplied||dkey(new Date());
    }
    // 저장 시점을 "자산 확인" 시점으로 기록 — 주간 알림 재설정
    if(window.__touchAssetCheck)window.__touchAssetCheck();
    uIv({...iv,[newKey]:next});
    close();
  };
  // 카테고리 개수에 따라 그리드 열 수 동적 계산 (최대 5열)
  const cols=Math.min(5,Math.max(2,ivCats.length));
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div style={{fontSize:16,fontWeight:700,color:th.text}}>{isNew?'➕ 새 투자/자산 추가':`✏️ ${item.name} 수정`}</div>
      {!isNew&&<button onClick={()=>{if(confirm(`${item.name} 삭제할까요?`)){const n={...iv};delete n[ivKey];uIv(n);close();}}} style={{border:'none',background:'#fef2f2',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer',color:'#dc2626',fontWeight:600}}>🗑 삭제</button>}
    </div>
    <div style={{display:'flex',gap:10,marginBottom:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>아이콘</div><input value={ic} onChange={e=>setIc(e.target.value)} style={{...I,textAlign:'center'}} placeholder="📈"/></div>
      <div style={{flex:3}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>이름</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="예: ISA 계좌" style={I}/></div>
    </div>
    <div style={{fontSize:11,color:th.sub,marginBottom:4}}>분류</div>
    <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:6,marginBottom:10}}>{ivCats.map(c=>(<button key={c.id} onClick={()=>setCat(c.name)} style={{border:'none',borderRadius:10,padding:'7px 4px',fontSize:10,cursor:'pointer',background:cat===c.name?th.primary:th.border,color:cat===c.name?'#fff':th.text,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.icon} {c.name}</button>))}</div>
    <div style={{fontSize:11,color:th.sub,marginBottom:4}}>현재 잔액</div>
    <MoneyInput value={cur} onChange={setCur} style={{...I,marginBottom:10}}/>
    <div style={{fontSize:11,color:th.sub,marginBottom:4}}>월 납입액 (없으면 0)</div>
    <MoneyInput value={mo} onChange={setMo} style={{...I,marginBottom:10}}/>
    {/* ★ 출금일: 항상 표시 (월 납입액 유무와 무관하게 설정 가능) */}
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,color:th.sub,marginBottom:6}}>출금일</div>
      <div style={{display:'flex',gap:6,marginBottom:useSalDay?0:8}}>
        <button onClick={()=>setUseSalDay(true)} style={{flex:1,border:'none',borderRadius:10,padding:'8px 4px',fontSize:11,cursor:'pointer',background:useSalDay?th.primary:th.border,color:useSalDay?'#fff':th.text,fontWeight:600}}>💰 월급일에 출금</button>
        <button onClick={()=>setUseSalDay(false)} style={{flex:1,border:'none',borderRadius:10,padding:'8px 4px',fontSize:11,cursor:'pointer',background:!useSalDay?th.primary:th.border,color:!useSalDay?'#fff':th.text,fontWeight:600}}>📅 직접 지정</button>
      </div>
      {!useSalDay&&(
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <input onFocus={e=>e.target.select()} type="number" min="1" max="31" value={payDay} onChange={e=>setPayDay(e.target.value)} style={{...I,flex:1,textAlign:'left'}}/>
          <span style={{fontSize:12,color:th.sub,flexShrink:0}}>일</span>
        </div>
      )}
    </div>
    {/* ★ 출금 방식 토글: 내 계좌 차감 vs 계좌 밖 적립 (월 납입액 있을 때만 의미있음) */}
    <div style={{marginBottom:14}}>
      <div style={{fontSize:11,color:th.sub,marginBottom:6}}>출금 방식</div>
      <div style={{display:'flex',gap:6}}>
        <button onClick={()=>setFromCash(true)} style={{flex:1,border:'none',borderRadius:10,padding:'8px 4px',fontSize:11,cursor:'pointer',background:fromCash?th.primary:th.border,color:fromCash?'#fff':th.text,fontWeight:600}}>📤 계좌 차감</button>
        <button onClick={()=>setFromCash(false)} style={{flex:1,border:'none',borderRadius:10,padding:'8px 4px',fontSize:11,cursor:'pointer',background:!fromCash?th.primary:th.border,color:!fromCash?'#fff':th.text,fontWeight:600}}>✨ 계좌 밖 적립</button>
      </div>
      <div style={{fontSize:10,color:th.sub,marginTop:6,lineHeight:1.5}}>
        {fromCash?'월 납입액이 출금일에 지출로 기록되어 가용 금액에서 차감됩니다.':'지출로 기록되지 않고 잔액만 증가해요. 세전 공제 연금·회사 매칭 등에 적합.'}
      </div>
    </div>
    <div style={{fontSize:10,color:th.sub,background:th.border,borderRadius:8,padding:'8px 12px',marginBottom:14,lineHeight:1.6}}>💡 "{wedCat?.name||'목표자금'}" 분류에 넣으면 목표자금에 자동 합산돼요. 월 납입액이 있으면 선택한 출금일에 자동 지출로 기록돼요.</div>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{isNew?'추가':'저장'}</button>
  </div></div>);
}
function WgM({OV,SH,I,close,th,wg,uWg}){const[t,setT]=useState(wg.target||0);const[y,setY]=useState(wg.year||'');const[m,setM]=useState(wg.month||12);const[n,setN]=useState(wg.name||'');const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];const isNew=!wg.target||!wg.year||!wg.name;return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>🎯 {isNew?'목표 설정':'목표 수정'}</div><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 이름</div><input value={n} onChange={e=>setN(e.target.value)} placeholder="예: 결혼 자금, 내집마련, 노후준비" style={{...I,marginBottom:10}}/><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 금액</div><MoneyInput value={t} onChange={setT} style={{...I,marginBottom:10}}/><div style={{display:'flex',gap:10,marginBottom:14}}><div style={{flex:2}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 연도</div><input onFocus={e=>e.target.select()} type="number" value={y} min={2025} max={2040} placeholder={String(new Date().getFullYear()+3)} onChange={e=>setY(e.target.value)} style={I}/></div><div style={{flex:1}}><div style={{fontSize:11,color:th.sub,marginBottom:4}}>목표 월</div><select value={m} onChange={e=>setM(Number(e.target.value))} style={{...I,padding:'12px 6px'}}>{MO.map((lb,i)=><option key={i+1} value={i+1}>{lb}</option>)}</select></div></div><button onClick={()=>{if(Number(t)>0&&Number(y)>2024&&n.trim()){uWg({target:Number(t),year:Number(y),month:Number(m),name:n.trim()});close();}else{alert('이름·금액·연도를 모두 입력해 주세요.');}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}
function AdjM({OV,SH,I,close,th,baseA,initAdj,uAdj}){
  const[v,setV]=useState(baseA-initAdj);
  const isAdjusted=initAdj>0;
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>💰 이번 달 잔액 설정</div>
    <div style={{fontSize:12,color:th.sub,marginBottom:14}}>기본 가용 금액: <b style={{color:th.primary}}>{won(baseA)}</b></div>
    <MoneyInput value={v} onChange={setV} style={{...I,marginBottom:6,textAlign:'left'}}/>
    <div style={{fontSize:11,color:th.sub,marginBottom:16}}>→ 이미 쓴 금액 <b style={{color:'#dc2626'}}>{won(Math.max(0,baseA-Number(v)))}</b> 반영</div>
    <button onClick={()=>{uAdj(Math.max(0,baseA-Number(v)));close();}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>적용하기</button>
    {isAdjusted&&(
      <button onClick={()=>{uAdj(0);close();}} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer',fontWeight:600}}>🔄 초기화 (자동 계산값으로 되돌리기)</button>
    )}
  </div></div>);
}
function ThemeM({OV,SH,close,th,theme,uTheme}){
  const groups=[['기본 테마',Object.values(THEMES).slice(0,10)],['🎨 패턴 테마',Object.values(THEMES).slice(10)]];
  // grad 문자열에서 시작/끝 색상 뽑아 작은 점 표시
  const extractColors=t=>{
    const m=(t.grad||'').match(/#[0-9a-fA-F]{6}/g)||[];
    return{c1:m[0]||t.primary,c2:m[1]||t.light,c3:t.primary,c4:t.light};
  };
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:14,color:th.text}}>🎨 테마 선택 ({Object.keys(THEMES).length}가지)</div>
    {groups.map(([gname,list])=>(
      <div key={gname} style={{marginBottom:14}}>
        <div style={{fontSize:11,color:th.sub,fontWeight:600,marginBottom:8}}>{gname}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
          {list.map(t=>{
            const {c1,c2,c3,c4}=extractColors(t);
            const sel=theme===t.id;
            return(
              <button key={t.id} onClick={()=>{uTheme(t.id);close();}} style={{border:`2px solid ${sel?t.primary:'#e5e7eb'}`,borderRadius:12,padding:'8px 6px',cursor:'pointer',background:'#fff',display:'flex',flexDirection:'column',gap:6,alignItems:'center',transition:'all .15s',minWidth:0,boxShadow:sel?`0 0 0 3px ${t.primary}20`:'none'}}>
                <div style={{width:'100%',height:24,borderRadius:8,background:t.grad,backgroundImage:t.pat?`${t.grad},${t.pat}`:t.grad,backgroundSize:t.patSz||'auto'}}/>
                <div style={{display:'flex',gap:3,width:'100%',justifyContent:'center'}}>
                  {[c1,c2,c3,c4].map((c,i)=>(<div key={i} style={{width:10,height:10,borderRadius:5,background:c,border:'1px solid rgba(0,0,0,0.05)'}}/>))}
                </div>
                <div style={{fontSize:10,fontWeight:sel?800:600,color:'#374151',textAlign:'center',lineHeight:1.2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',width:'100%'}}>{t.name}</div>
              </button>
            );
          })}
        </div>
      </div>
    ))}
  </div></div>);
}

function IvOvM({OV,SH,I,close,th,iv,ivOv,uIvOv,ivKey,ivName,monthKey,defaultAmt}){
  const ov=ivOv[monthKey]?.[ivKey];
  const[v,setV]=useState(ov??defaultAmt);
  const isOv=ov!==undefined;
  const save=()=>{uIvOv({...ivOv,[monthKey]:{...(ivOv[monthKey]||{}),[ivKey]:Number(v)}});close();};
  const reset=()=>{const n={...ivOv};if(n[monthKey]){delete n[monthKey][ivKey];if(!Object.keys(n[monthKey]).length)delete n[monthKey];}uIvOv(n);close();};
  return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}>
    <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:th.text}}>{ivName} — 이번 달 수정</div>
    <div style={{fontSize:11,color:th.sub,marginBottom:14,lineHeight:1.6}}><b style={{color:th.primary}}>{monthKey}</b> 이번 달만 변경돼요.<br/>기본: {won(defaultAmt)}</div>
    <MoneyInput value={v} onChange={setV} style={{...I,marginBottom:14}}/>
    <button onClick={save} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:8}}>이번 달 적용</button>
    {isOv&&<button onClick={reset} style={{width:'100%',background:th.border,color:th.sub,border:'none',borderRadius:12,padding:'11px',fontSize:12,cursor:'pointer'}}>기본값으로 초기화</button>}
  </div></div>);
}

function AppNameM({OV,SH,I,close,th,appName,uAppName}){const[v,setV]=useState(appName);return(<div style={OV} onClick={close}><div style={SH} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:700,marginBottom:10,color:th.text}}>🏠 가계부 이름 수정</div><input value={v} onChange={e=>setV(e.target.value)} placeholder="가계부 이름" style={{...I,marginBottom:14}}/><button onClick={()=>{if(v.trim()){uAppName(v.trim());close();}}} style={{width:'100%',background:th.primary,color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>저장</button></div></div>);}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
